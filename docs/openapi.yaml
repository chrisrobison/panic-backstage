            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      operationId: contractTemplates_create
      summary: Create a contract template
      description: >-
        Optionally wires clause modules in the same call via `modules`. Requires the global
        `manage_contract_library` capability.
      tags:
        - Contract Templates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContractTemplateInput'
      responses:
        '200':
          description: Template created.
          content:
            application/json:
