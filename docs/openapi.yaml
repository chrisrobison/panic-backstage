          type: integer
    post:
      operationId: messages_markUnread
      summary: Mark a message unread
      description: Recipient only — 403 if the caller is not the recipient.
      tags:
        - Messages
      responses:
        '200':
          description: Marked unread
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageActionResult'
        '403':
          description: Not authenticated, or caller is not the recipient
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Message not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/feed:
    get:
      operationId: feed_index
      summary: JSON discovery index of the public syndication feeds
      description: >-
        Public — no authentication. Only events with public_visibility = 1 are ever exposed (the
        same gate PublicEvents uses); canceled events are excluded. `upcoming` is the count of
        events matching the current query params (venue/days/past/limit) — the same filter set
        accepted by the .ics/.rss formats below. Each of the three feed formats is also reachable
        under a friendlier, non-/api path — /feeds/public-events.ics, /feeds/public-events.rss,
        /feeds/public-events.json — routed to this same Feed endpoint (see src/Kernel.php); use
        whichever URL reads better in context, the data and gating are identical.
      tags:
        - Feeds
      security: []
      parameters:
        - name: venue
          in: query
          description: Restrict to one venue by slug.
          schema:
            type: string
        - name: days
          in: query
          description: Only events within the next N days (default is all upcoming).
          schema:
            type: integer
        - name: past
          in: query
          description: Include past events too (default is upcoming only).
          schema:
            type: string
            enum:
              - '0'
              - '1'
        - name: limit
          in: query
          schema:
            type: integer
            default: 500
            maximum: 1000
      responses:
        '200':
          description: Feed discovery index
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedIndex'
  /api/feed/events.ics:
    get:
      operationId: feed_ics
      summary: iCalendar (RFC 5545) subscription feed of public events
      description: >-
        Public — no authentication. Same public_visibility/canceled gating and venue/days/past/limit
        query params as GET /api/feed. Event start/end times are resolved to absolute UTC instants
        using the venue's own timezone (or America/Los_Angeles if unset/invalid), so calendar
        clients render correct local times without needing a VTIMEZONE block. Events lacking an
        explicit end_time get a synthetic 3-hour duration. Content lines are CRLF-terminated and
        folded at 75 octets per RFC 5545. Response is cacheable (Cache-Control: public,
        max-age=900).
      tags:
        - Feeds
      security: []
      parameters:
        - name: venue
          in: query
          schema:
            type: string
        - name: days
          in: query
          schema:
            type: integer
        - name: past
          in: query
          schema:
            type: string
            enum:
              - '0'
              - '1'
        - name: limit
          in: query
          schema:
            type: integer
            default: 500
            maximum: 1000
      responses:
        '200':
          description: iCalendar document (filename events.ics, served inline)
          content:
            text/calendar:
              schema:
                type: string
  /api/feed/events.rss:
    get:
      operationId: feed_rss
      summary: RSS 2.0 feed of public events
      description: >-
        Public — no authentication. Same public_visibility/canceled gating and venue/days/past/limit
        query params as GET /api/feed. Each item's description is an HTML CDATA block (date/time,
        venue location, flyer image, public description, ticket link); an <enclosure> is included
        when an approved flyer asset exists. Response is cacheable (Cache-Control: public,
        max-age=900).
      tags:
        - Feeds
      security: []
      parameters:
        - name: venue
          in: query
          schema:
            type: string
        - name: days
          in: query
          schema:
            type: integer
        - name: past
          in: query
          schema:
            type: string
            enum:
              - '0'
              - '1'
        - name: limit
          in: query
          schema:
            type: integer
            default: 500
            maximum: 1000
      responses:
        '200':
          description: RSS 2.0 document (filename events.rss, served inline)
          content:
            application/rss+xml:
              schema:
                type: string
  /api/feed/events.json:
    get:
      operationId: feed_json
      summary: Structured JSON feed for embeddable "upcoming events" widgets
      description: >-
        Public — no authentication. Same public_visibility/canceled gating and venue/days/past/limit
        query params as GET /api/feed. Shaped for the <mab-events-carousel> web component
        (public/assets/mab-events-carousel.js), which mirrors this straight into DOM cards that
        reuse themab.org's own markup/class names — see docs on that component for the drop-in
        embed snippet. Unlike the .ics/.rss formats, the response carries
        `Access-Control-Allow-Origin: *` because it's fetched by browser JS running on the venue's
        own marketing site (a different origin); the data is already fully public, so there is no
        confidentiality reason to restrict the origin, and no cookie/credential is ever sent.
        Response is cacheable (Cache-Control: public, max-age=300).
      tags:
        - Feeds
      security: []
      parameters:
        - name: venue
          in: query
          schema:
            type: string
        - name: days
          in: query
          schema:
            type: integer
        - name: past
          in: query
          schema:
            type: string
            enum:
              - '0'
              - '1'
        - name: limit
          in: query
          schema:
            type: integer
            default: 500
            maximum: 1000
      responses:
        '200':
          description: Structured event list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WidgetEventsFeed'
  /api/invite/{token}:
    parameters:
      - name: token
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: inviteAccept_preview
      summary: Preview an event-collaborator invite before accepting it
      description: >-
        Public — no authentication (this is the invite recipient's first contact with the app,
        before they have any account/session). Only unused, unexpired invites (used_at IS NULL AND
        expires_at > NOW()) are returned; this is a different, top-level flow from the admin-side
        /api/events/{id}/invites resource that creates these invites.
      tags:
        - Invite Accept
      security: []
      responses:
        '200':
          description: Invite preview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteAcceptPreview'
        '404':
          description: Invite not found, already used, or expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      operationId: inviteAccept_accept
      summary: Accept an event-collaborator invite
      description: >-
        Public — no authentication required to call it (that's the point: this is how an invited
        collaborator gets their first account/session). If no user exists yet for the invite's
        email, one is created with no password (name optional in the body, falls back to the invite
        email; role comes from the invite, not the request body). The user (new or existing) is
        added to event_collaborators for the invite's event (INSERT IGNORE — safe to call more than
        once) and the invite is marked used_at = NOW(). A refresh token and access token pair is
        issued immediately, logging the caller straight into their new/existing account.
      tags:
        - Invite Accept
      security: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Only used when this invite's email does not already have a user account.
      responses:
        '200':
          description: Invite accepted; account created/linked and session issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteAcceptResult'
        '404':
          description: Invite not found, already used, or expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /super:
    get:
      operationId: superAdmin_ui
      summary: Super-admin HTML console
      description: >-
        Serves a small self-contained HTML/JS admin UI (login form + tenant table) that drives the
        JSON endpoints below via `fetch()`. `GET /super/tenants` renders the identical page. Not
        part of the JSON API contract — included for completeness since it is a real routed
        response. Only reachable when multi-tenant SaaS mode is enabled (`SUPER_DB_NAME` set) -- see
        README "Multi-Tenant / SaaS Mode".
      tags:
        - Super Admin
      security: []
      responses:
        '200':
          description: The super-admin console page.
          content:
            text/html:
              schema:
                type: string
  /api/super/venues:
    get:
      operationId: superAdmin_listVenues
      summary: Public venue directory (central login picker)
      description: >-
        Read-only, unauthenticated directory of every active tenant with at least one domain.
        Deliberately minimal — exposes only display name and the tenant's own login URL, never
        internal fields like database name or status. Served from any hostname, before tenant
        resolution, so a marketing site can `fetch()` it cross-origin (responds with
        `Access-Control-Allow-Origin: *`).
      tags:
        - Super Admin
      security: []
      responses:
        '200':
          description: List of active tenants.
          content:
            application/json:
              schema:
                type: object
                required:
                  - venues
                properties:
                  venues:
                    type: array
                    items:
                      $ref: '#/components/schemas/SuperVenue'
  /api/super/login:
    post:
      operationId: superAdmin_login
      summary: Authenticate as a super admin
      description: >-
        Verifies email/password against `super_admin_users` and, on success, starts a PHP session
        (cookie name `backstage_super_sid`) carrying `{id, email, display_name}`. This is the ONLY
        auth mechanism for the `/api/super/*` routes below -- it is a server-side session cookie,
        not the venue-staff Bearer JWT used everywhere else in this API.
      tags:
        - Super Admin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: Authenticated; session cookie set.
          content:
            application/json:
              schema:
                type: object
                required:
                  - user
                properties:
                  user:
                    $ref: '#/components/schemas/SuperAdminUser'
        '401':
          description: Invalid credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Email and/or password missing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/super/logout:
    post:
      operationId: superAdmin_logout
      summary: End the super-admin session
      description: >-
        Clears the session. Always returns `{"ok": true}`, even if no session was active -- no auth
        precondition is enforced.
      tags:
        - Super Admin
      security: []
      responses:
        '200':
          description: Logged out.
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                properties:
                  ok:
                    type: boolean
                    enum:
                      - true
  /api/super/me:
    get:
      operationId: superAdmin_me
      summary: Current super-admin session info
      tags:
        - Super Admin
      security:
        - superAdminSession: []
      responses:
        '200':
          description: The signed-in super admin.
          content:
            application/json:
              schema:
                type: object
                required:
                  - user
                properties:
                  user:
                    $ref: '#/components/schemas/SuperAdminUser'
        '401':
          description: No active super-admin session.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/super/tenants:
    get:
      operationId: superAdmin_listTenants
      summary: List all tenants
      description: Ordered by `created_at DESC`; each tenant includes its `domains`.
      tags:
        - Super Admin
      security:
        - superAdminSession: []
      responses:
        '200':
          description: All tenants.
          content:
            application/json:
              schema:
                type: object
                required:
                  - tenants
                properties:
                  tenants:
                    type: array
                    items:
                      $ref: '#/components/schemas/SuperTenant'
        '401':
          description: No active super-admin session.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      operationId: superAdmin_createTenant
      summary: Create and provision a new tenant
      description: >-
        Creates the `tenants` row, then synchronously provisions the tenant database (creates it if
        missing, loads `database/schema.sql`, applies outstanding migrations, and seeds demo data +
        an initial admin login for a genuinely new tenant). `slug` is lowercased and sanitized to
        `[a-z0-9_-]`. `database_name` is auto-derived from `slug` as `panic_backstage_{slug}` when
        omitted, and must otherwise match `^[A-Za-z0-9_]+$`. Returns 409 if the slug or database
        name is already taken. If provisioning itself throws after the row is inserted, the tenant
        is left in `provisioning` status and a 500 is returned with the partial tenant row (the row
        already exists, so retry via `POST /api/super/tenants/{id}/provision` rather than creating
        again).
      tags:
        - Super Admin
      security:
        - superAdminSession: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - slug
                - name
              properties:
                slug:
                  type: string
                  description: URL key; sanitized to lowercase `[a-z0-9_-]` server-side.
                name:
                  type: string
                  description: Display name.
                database_name:
                  type: string
                  description: >-
                    Auto-derived as `panic_backstage_{slug}` if omitted. Must match
                    `^[A-Za-z0-9_]+$` if supplied.
                admin_name:
                  type: string
                  nullable: true
                admin_email:
                  type: string
                  format: email
                  nullable: true
                  description: Used to personalize the seeded demo admin login.
      responses:
        '201':
          description: Tenant created and provisioned.
          content:
            application/json:
              schema:
                type: object
                required:
                  - tenant
                properties:
                  tenant:
                    $ref: '#/components/schemas/SuperTenant'
                  seeded:
                    $ref: '#/components/schemas/SuperSeeded'
        '409':
          description: A tenant with that slug or database name already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Missing/invalid `slug`, `name`, `admin_email`, or `database_name`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Tenant row created but database provisioning failed.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Error'
                  - type: object
                    properties:
                      tenant:
                        $ref: '#/components/schemas/SuperTenant'
  /api/super/tenants/{id}:
    get:
      operationId: superAdmin_getTenant
      summary: Fetch one tenant
      tags:
        - Super Admin
      security:
        - superAdminSession: []
      parameters:
        - $ref: '#/components/parameters/SuperTenantId'
      responses:
        '200':
          description: The tenant, with its domains.
          content:
            application/json:
              schema:
                type: object
                required:
                  - tenant
                properties:
                  tenant:
                    $ref: '#/components/schemas/SuperTenant'
        '404':
          description: Tenant not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    patch:
      operationId: superAdmin_updateTenant
      summary: Update a tenant's name and/or status
      description: Only `name` and `status` are mutable via this route.
      tags:
        - Super Admin
      security:
        - superAdminSession: []
      parameters:
        - $ref: '#/components/parameters/SuperTenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              properties:
                name:
                  type: string
                status:
                  type: string
                  enum:
                    - active
                    - suspended
                    - provisioning
      responses:
        '200':
          description: Updated tenant, with its domains.
          content:
            application/json:
              schema:
                type: object
                required:
                  - tenant
                properties:
                  tenant:
                    $ref: '#/components/schemas/SuperTenant'
        '404':
          description: Tenant not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: No recognized fields supplied, or invalid `status` value.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/super/tenants/{id}/provision:
    post:
      operationId: superAdmin_provisionTenant
      summary: Re-run the provisioner for an existing tenant
      description: >-
        Idempotent: safe to call again on an already-provisioned tenant (only creates/applies what's
        missing). Sets `status` back to `active` on success. Only returns a `seeded` admin login if
        this tenant had no data yet (e.g. recovering from a provision that failed before seeding
        ran) -- a normal re-provision of a live tenant will not re-seed.
      tags:
        - Super Admin
      security:
        - superAdminSession: []
      parameters:
        - $ref: '#/components/parameters/SuperTenantId'
      responses:
        '200':
          description: Provisioned; updated tenant returned.
          content:
            application/json:
              schema:
                type: object
                required:
                  - tenant
                properties:
                  tenant:
                    $ref: '#/components/schemas/SuperTenant'
                  seeded:
                    $ref: '#/components/schemas/SuperSeeded'
        '404':
          description: Tenant not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Provisioning failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/super/tenants/{id}/domains:
    post:
      operationId: superAdmin_addDomain
      summary: Add a domain alias to a tenant
      description: >-
        Domain must be a valid hostname and unique across ALL tenants (409 if already registered).
        Setting `is_primary: true` demotes any existing primary domain for this tenant first.
      tags:
        - Super Admin
      security:
        - superAdminSession: []
      parameters:
        - $ref: '#/components/parameters/SuperTenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - domain
              properties:
                domain:
                  type: string
                  description: Lowercased server-side before storage.
                is_primary:
                  type: boolean
                  default: false
      responses:
        '201':
          description: Domain added.
          content:
            application/json:
              schema:
                type: object
                required:
                  - domain
                properties:
                  domain:
                    $ref: '#/components/schemas/SuperDomain'
        '404':
          description: Tenant not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Domain already registered (to any tenant).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Missing or invalid `domain`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/super/tenants/{id}/domains/{domainId}:
    delete:
      operationId: superAdmin_deleteDomain
      summary: Remove a domain alias from a tenant
      tags:
        - Super Admin
      security:
        - superAdminSession: []
      parameters:
        - $ref: '#/components/parameters/SuperTenantId'
        - name: domainId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Domain removed.
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                properties:
                  ok:
                    type: boolean
                    enum:
                      - true
        '404':
          description: Tenant not found, or domain does not belong to this tenant.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
