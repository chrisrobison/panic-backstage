    post:
      operationId: crm_followups_run
      summary: Send reminder emails for due/overdue CRM follow-up tasks
      description: >-
        Sends one summary reminder email per assignee for `client_notes` tasks of type
        `task`/`followup` that are unfinished and due today or up to 7 days overdue (capped at 50
        rows per run). Access is intended to be either an authenticated `venue_admin` session or a
        matching `X-Cron-Secret` header (compared with `hash_equals` against the `CRON_SECRET` env
        var) for unattended daily cron invocation. # TODO: Kernel.php's isPublic() allow-list does
        NOT include CrmFollowups::class, so an # unauthenticated request (no Bearer token) is
        rejected with 401 by the kernel before # this class's own X-Cron-Secret check ever runs —
        the cron-secret path documented in # the class docblock appears unreachable for a truly
        anonymous caller. Confirm with # the cron/deploy setup (does the cron job send a Bearer
        token too?) before relying on # X-Cron-Secret alone.
      tags:
        - Contacts
      parameters:
        - name: X-Cron-Secret
          in: header
          description: >-
            Shared secret matching the CRON_SECRET env var; alternative to a venue_admin session
            (see TODO above).
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Reminders sent.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CrmFollowupResult'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Caller is neither a venue_admin nor supplied a valid X-Cron-Secret.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /contacts:
    get:
      operationId: contacts_list
      summary: List / search marketing contacts
      description: >-
        Requires the `manage_contacts` global capability. Paginated (default limit 50, max 200).
        Also accepts `min_spend`, `min_events`, `min_tickets` filter params (shared with the
        mailing-list bulk-add/segment criteria builder — see `ContactFilters`) even though the
        Contacts page UI doesn't currently expose them. `stats` reflects the whole `contacts` table,
        independent of the active filter.
      tags:
        - Contacts
      parameters:
        - name: q
          in: query
          description: Free-text match across first/last/full name, email, phone.
          schema:
            type: string
        - name: opted
          in: query
          description: Exact match on marketing_opted_in (0 or 1).
          schema:
            type: string
            enum:
              - '0'
              - '1'
        - name: min_spend
          in: query
          description: usd_spend >= value.
          schema:
            type: number
        - name: min_events
          in: query
          description: events_count >= value.
          schema:
            type: number
        - name: min_tickets
          in: query
          description: tickets_count >= value.
          schema:
            type: number
        - name: sort
          in: query
          schema:
            type: string
            enum:
              - last_name
              - first_name
              - email
              - usd_spend
              - tickets_count
              - events_count
              - last_interaction
              - created_at
            default: last_name
        - name: dir
          in: query
          schema:
            type: string
            enum:
              - asc
              - desc
            default: asc
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
      responses:
        '200':
          description: Paginated contacts plus table-wide stats.
          content:
            application/json:
              schema:
                type: object
                properties:
                  contacts:
                    type: array
                    items:
                      $ref: '#/components/schemas/Contact'
                  total:
                    type: integer
                  page:
                    type: integer
                  limit:
                    type: integer
                  pages:
                    type: integer
                  sort:
                    type: object
                    properties:
                      key:
                        type: string
                      dir:
                        type: string
                  stats:
                    type: object
                    properties:
                      total:
                        type: integer
                      opted_in:
                        type: integer
                      total_spend:
                        type: number
                      total_tickets:
                        type: integer
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Missing the manage_contacts capability.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      operationId: contacts_create
      summary: Create a contact manually
      description: >-
        Requires the `manage_contacts` global capability. `source` is forced to `manual`
        server-side. At least one of `first_name`/`last_name` is required (422 if both blank);
        `email`, if provided, must be a valid address (422 otherwise) and is lower-cased. When
        `marketing_opted_in` is truthy, `opt_in_date` is stamped to today.
      tags:
        - Contacts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactCreateRequest'
      responses:
        '200':
          description: Created contact id.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Missing the manage_contacts capability.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Neither first nor last name was supplied, or the email is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
