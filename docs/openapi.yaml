      description: >-
        Lists rows from event_scanner_links for the event. Requires the 'manage_ticketing' event
        capability. For links whose plaintext secret is still stored (created/regenerated since the
        token-storage migration), scanner_url is populated so the link/QR can be re-displayed; older
