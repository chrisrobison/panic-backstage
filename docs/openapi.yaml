          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Event not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      operationId: scanner_createLink
      summary: Mint a new door-scanner link
      description: >-
        Creates a new event_scanner_links row with a random 24-byte, base32-encoded secret token.
        Requires the 'manage_ticketing' event capability. Optional numeric PIN (4-12 digits, else
        422) is stored hashed (password_hash). The response's scanner_url/token carry the plaintext
        secret and are the ONLY time the full working link is returned this way (though it remains
        re-displayable later via GET, since the plaintext token is also persisted for that purpose).
      tags:
        - Scanner
      parameters:
        - $ref: '#/components/parameters/TicketingEventId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScannerLinkCreateRequest'
      responses:
        '200':
          description: Scanner link created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScannerLinkCreateResponse'
        '403':
          description: Caller lacks the manage_ticketing capability on this event.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Event not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: PIN must be 4-12 numeric digits.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /events/{eventId}/scanner-links/{linkId}:
    post:
      operationId: scanner_regenerateLink
      summary: Rotate a scanner link's secret token
      description: >-
        Mints a fresh secret token for an existing scanner link and returns its new
        scanner_url/token; any previously shared copy of the link immediately stops working.
        Requires the 'manage_ticketing' event capability. Used both to reveal a working link for
        legacy links that predate token storage, and to deliberately rotate a leaked link. 422 if
        the link is already revoked (create a new one instead).
      tags:
        - Scanner
      parameters:
        - $ref: '#/components/parameters/TicketingEventId'
        - name: linkId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Link regenerated.
          content:
            application/json:
              schema:
