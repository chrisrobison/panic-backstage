  /leads:
    get:
      operationId: leads_list
      summary: List leads
      description: >-
        Requires the `view_leads` global capability. Returns up to 200 leads ordered by pipeline
        stage (new → triage → evaluating → needs_review → approved → declined → converted →
        canceled), then desired date, then newest first.
      tags:
        - Leads
      parameters:
        - name: status
          in: query
          description: Filter by lead status. Ignored if not one of the known statuses.
          schema:
            $ref: '#/components/schemas/LeadStatus'
        - name: source
          in: query
          description: Filter by lead source. Ignored if not one of the known sources.
          schema:
            $ref: '#/components/schemas/LeadSource'
        - name: owner_id
          in: query
          description: Filter to leads whose point_person_id matches this user id.
          schema:
            type: integer
        - name: mine
          in: query
          description: Pass `1` to filter to leads where point_person_id is the caller.
          schema:
            type: string
            enum:
              - '1'
      responses:
        '200':
          description: List of leads plus reference data.
          content:
            application/json:
              schema:
                type: object
                properties:
                  leads:
                    type: array
                    items:
                      $ref: '#/components/schemas/Lead'
                  statuses:
                    type: array
                    items:
                      $ref: '#/components/schemas/LeadStatus'
                  sources:
                    type: array
                    items:
                      $ref: '#/components/schemas/LeadSource'
                  users:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        name:
                          type: string
                  capabilities:
                    type: object
                    additionalProperties:
                      type: boolean
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Missing the view_leads capability.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      operationId: leads_create
      summary: Create a lead
      description: >-
        Requires the `manage_leads` global capability. All fields are optional; unknown
        `status`/`source` values silently fall back to `new`/`manual`. Automatically writes an audit
        note ("Lead created (source: ...)") on the new lead.
      tags:
        - Leads
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LeadCreateRequest'
      responses:
        '200':
          description: Created lead.
          content:
            application/json:
              schema:
                type: object
                properties:
                  lead:
                    $ref: '#/components/schemas/Lead'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Missing the manage_leads capability.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /leads/{leadId}:
    get:
      operationId: leads_get
      summary: Get lead detail
      description: >-
        Requires the `view_leads` global capability. Returns the lead with its notes (newest first)
        and the latest deal evaluation, if any.
      tags:
        - Leads
      parameters:
        - $ref: '#/components/parameters/LeadIdPath'
      responses:
        '200':
          description: Lead detail.
          content:
            application/json:
              schema:
                type: object
                properties:
                  lead:
                    $ref: '#/components/schemas/Lead'
                  notes:
                    type: array
                    items:
                      $ref: '#/components/schemas/LeadNote'
                  evaluation:
                    type: object
                    nullable: true
                    allOf:
                      - $ref: '#/components/schemas/LeadEvaluation'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Missing the view_leads capability.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Lead not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    patch:
      operationId: leads_update
      summary: Update a lead
      description: >-
        Requires the `manage_leads` global capability. Only fields present in the body are updated.
        When `status` changes to `approved`, `declined`, or `needs_review`, the server also stamps
        `decision_by_id`/`decided_at` and writes an audit note recording the transition; an optional
        `status_note` is stored as a separate `status_change` note. If the body contains no
        recognized fields, no update runs and `{ok:true}` is returned without a `lead` key.
      tags:
        - Leads
      parameters:
        - $ref: '#/components/parameters/LeadIdPath'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LeadUpdateRequest'
      responses:
        '200':
          description: Updated lead (or `{ok:true}` if nothing was set).
          content:
            application/json:
              schema:
                type: object
                properties:
                  lead:
                    $ref: '#/components/schemas/Lead'
                  ok:
                    type: boolean
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Missing the manage_leads capability.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Lead not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      operationId: leads_delete
      summary: Delete a lead
      description: >-
        Requires the `manage_leads` global capability AND the caller's role must be `venue_admin`
        (checked in addition to the capability gate) — otherwise a 403 with message "Only venue
        admins can delete leads" is returned.
      tags:
        - Leads
      parameters:
        - $ref: '#/components/parameters/LeadIdPath'
      responses:
        '204':
          description: Lead deleted.
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Missing manage_leads, or caller is not a venue admin.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
