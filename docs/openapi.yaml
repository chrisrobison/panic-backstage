    WizardDefaultsObject:
      type: object
      description: >-
        Sparse map of wizard field id -> default value (always stored/returned as a string). Only
        keys from WizardDefaults::ALLOWED are kept; a field with no configured default is simply
        absent from this object.
      properties:
        venue_id:
          type: string
        event_type:
          type: string
        doors_time:
          type: string
        show_time:
          type: string
        end_time:
          type: string
        age_restriction:
          type: string
        capacity:
          type: string
        deal_type:
          type: string
        deposit_amount:
          type: string
        bar_minimum:
          type: string
        merch_venue_percent:
          type: string
        sound_tech_included:
          type: string
        lighting_tech_included:
          type: string
        security_count:
          type: string
        security_rate:
          type: string
        security_paid_by:
          type: string
      additionalProperties: false
    NavItem:
      type: object
      description: >-
        One row of the app shell's sidebar. A null parent_id is a top-level item; a purely-grouping
        parent (e.g. "Events", "Admin") has a null link since it renders as an expand/collapse
        button, not an anchor.
      properties:
        id:
          type: integer
        parent_id:
          type: integer
          nullable: true
        label:
          type: string
        icon:
          type: string
          description: FontAwesome class string, e.g. "fa-solid fa-gauge-high".
        link:
          type: string
          nullable: true
          description: >-
            An internal route key matching an app hash route (e.g. "dashboard", "admin-users",
            "inbox" — no leading "#"), an external "https://" URL, or null for a grouping-only
            parent with no route of its own.
        capability:
          type: string
          nullable: true
          description: >-
            A global capability key (see BaseEndpoint::GLOBAL_CAPABILITIES) required to see this
            item, or null for no restriction.
        open_in_new_window:
          type: boolean
        visible:
          type: boolean
          description: Toggle to hide from the sidebar without deleting the row.
        is_home:
          type: boolean
          description: The default landing page when a user opens the app with no route in the URL. At most one item has this set.
        sort_order:
          type: integer
          description: Lower numbers appear first within the same level (top-level vs. children of the same parent).
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    NavItemInput:
      type: object
      required:
        - label
      properties:
        label:
          type: string
          description: Required; 422 if blank after trimming.
        icon:
          type: string
          default: fa-solid fa-circle
        link:
          type: string
          nullable: true
        parent_id:
          type: integer
          nullable: true
          description: Must reference a top-level item (its own parent_id must be null).
        capability:
          type: string
          nullable: true
        open_in_new_window:
          type: boolean
          default: false
        visible:
          type: boolean
          default: true
        is_home:
          type: boolean
          default: false
        sort_order:
          type: integer
          default: 0
