                $ref: '#/components/schemas/Error'
        '502':
          description: Eventbrite API returned an error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: EVENTBRITE_API_KEY is not configured in .env.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /promote/oauth/twitter/start:
    post:
      operationId: promoteTwitterOAuth_start
      summary: Start the "Connect X account" OAuth 2.0 PKCE flow
      description: >-
        Generates a PKCE code_verifier + CSRF state, stores them server-side in
        `promote_oauth_states` (10-minute TTL; opportunistically prunes expired rows on every call),
        and returns the X (Twitter) authorize URL for the browser to navigate to. This endpoint's
        PHP class (Promote\TwitterOAuth) is registered fully public at the Kernel level — because
        its sibling `callback` action below is a browser-redirect target that cannot carry a JWT —
        so `start` must self-gate: it manually checks the `manage_users` global capability itself
        and returns 403 if the caller lacks it (mirroring Scanner::class's pattern), rather than
        relying on Kernel's automatic 401-if-unauthenticated check. In this spec it is still
        documented as requiring bearerAuth like any other protected operation, since Kernel's
        automatic 401 is simply not what enforces that here — the endpoint's own capability check
        is.
      tags:
        - Promote
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PromoteTwitterOAuthStartRequest'
      responses:
        '200':
          description: Authorize URL for the browser to navigate to.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromoteTwitterOAuthStartResponse'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Caller lacks the manage_users global capability.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: TWITTER_CLIENT_ID is not configured in .env.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /promote/oauth/twitter/callback:
    get:
      operationId: promoteTwitterOAuth_callback
      summary: X (Twitter) OAuth redirect target — completes the connect flow
      description: >-
        PUBLIC. X redirects the top-level browser window here with `?code=&state=` (or `?error=`)
        after the user approves/denies the app — this is a full page navigation, not a fetch(), so
        it cannot carry an Authorization header. It authenticates the request by consuming the
        single-use `state` row from `promote_oauth_states` instead (deleted immediately on lookup,
        before validation, to prevent replay even on failure paths), checks the row isn't older than
        the 10-minute TTL, exchanges the authorization code for an access/refresh token pair via X's
        token endpoint (PKCE code_verifier from the stored state), and writes them through the exact
        same Promote\CredentialSettings::storeCredential() path a manual token paste would use.
        Always responds with an HTTP redirect (302) back into the SPA at `#promote-settings` with
        `promote_oauth`/`oauth_status`/`oauth_message` query params for the frontend to toast —
        never a JSON error body, even on failure (expired state, missing code, token-exchange
        failure, missing TWITTER_CLIENT_ID/SECRET all redirect with `oauth_status=error` rather than
        returning a 4xx/5xx).
      tags:
        - Promote
      security: []
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
          description: Authorization code from X. Absent when X redirected with `error` instead.
        - name: state
          in: query
          required: false
          schema:
            type: string
          description: CSRF/PKCE state token; must match a live, unexpired promote_oauth_states row.
        - name: error
          in: query
          required: false
          schema:
            type: string
          description: Present instead of code/state when the user declined authorization on X.
      responses:
        '302':
          description: >-
            Redirect back into the SPA at #promote-settings with oauth_status=connected|error (and
            oauth_message on error). This is the only response this endpoint ever returns — it does
            not produce JSON error bodies.
          headers:
            Location:
              schema:
                type: string
  /api/dashboard:
    get:
      operationId: dashboard_get
      summary: Get landing-page dashboard (KPI cards, upcoming events, onboarding checklist)
      description: >-
        Any authenticated user may call this — there is no global capability gate in Dashboard.php.
        Results are scoped per-caller: venue_admin/global_viewer see every event, everyone else only
        events they own or collaborate on (see BaseEndpoint::eventScopeSql). `events` covers the
        next 14 days and each entry is annotated with the caller's `capabilities` for that event
        (from BaseEndpoint::eventCapabilities). `cards.newLeads` / `cards.leadsNeedingReview` are 0
        unless the caller has the view_leads global capability. `cards.overdueFollowups` is 0 for
        non-venue_admin callers. `onboarding` is null for anyone who is not venue_admin, and also
        null once that venue_admin has dismissed the checklist (users.onboarding_dismissed).
      tags:
        - Dashboard
      responses:
        '200':
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/wizard-defaults:
    get:
      operationId: wizardDefaults_get
      summary: Get admin-configured default field values for the Event Creation Wizard
      description: >-
        Gated by the manage_users global capability (venue_admin). Defaults are stored as a single
        JSON blob in the `wizard_defaults` singleton row (id = 1). The GET /api/templates response
        also embeds these defaults so the wizard can load its metadata and defaults in one
        round-trip.
      tags:
        - Wizard Defaults
      responses:
        '200':
          description: Current wizard defaults
          content:
            application/json:
              schema:
                type: object
                properties:
                  defaults:
                    $ref: '#/components/schemas/WizardDefaultsObject'
        '403':
          description: Missing manage_users capability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      operationId: wizardDefaults_put
      summary: Replace the wizard defaults object
      description: >-
        Gated by manage_users. Unknown field keys are silently dropped (only the fixed
        WizardDefaults::ALLOWED field list is persisted). Every kept value is cast to a string
        (matching how the wizard stores wizardData values). A key whose incoming value is null or
        empty string is treated as "no default for this field" and omitted from the stored JSON
        entirely — it is NOT stored as an empty string.
      tags:
        - Wizard Defaults
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - defaults
              properties:
                defaults:
                  $ref: '#/components/schemas/WizardDefaultsObject'
      responses:
        '200':
          description: Defaults saved; returns the cleaned/stored object
          content:
            application/json:
              schema:
                type: object
                properties:
                  defaults:
                    $ref: '#/components/schemas/WizardDefaultsObject'
        '403':
          description: Missing manage_users capability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: defaults was not an object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/staff-members:
    get:
      operationId: staffRoster_list
      summary: List staff roster members
      description: Gated by the manage_staff_roster global capability (venue_admin).
      tags:
        - Staff Roster
      parameters:
        - name: active
          in: query
          description: Filter to active (1) or inactive (0) staff members. Any other value is ignored.
          schema:
            type: string
            enum:
              - '0'
              - '1'
      responses:
        '200':
          description: >-
            Staff roster, plus the fixed role list and every user (for linking a staff row to a
            login).
          content:
            application/json:
              schema:
                type: object
                properties:
                  staff:
                    type: array
                    items:
                      $ref: '#/components/schemas/StaffMember'
                  roles:
                    type: array
                    items:
                      type: string
                    example:
                      - manager
                      - security
                      - bartender
                      - barback
                      - door
                      - sound
                      - lighting
                      - stagehand
                      - runner
                      - cleaner
                      - other
                  users:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        name:
                          type: string
                        email:
                          type: string
        '403':
          description: Missing manage_staff_roster capability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      operationId: staffRoster_create
      summary: Create a staff roster member
      description: Gated by manage_staff_roster. `active` defaults to true (1) on create.
      tags:
        - Staff Roster
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StaffMemberInput'
      responses:
        '200':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
        '403':
          description: Missing manage_staff_roster capability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Validation error (name required; invalid default_role, employment_type, or email)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/staff-members/{staffId}:
    parameters:
      - name: staffId
        in: path
        required: true
        schema:
          type: integer
    get:
      operationId: staffRoster_get
      summary: Get a single staff roster member
      description: Gated by manage_staff_roster.
      tags:
        - Staff Roster
      responses:
        '200':
          description: Staff member
          content:
            application/json:
              schema:
                type: object
                properties:
                  staff:
                    $ref: '#/components/schemas/StaffMember'
        '403':
          description: Missing manage_staff_roster capability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Staff member not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    patch:
      operationId: staffRoster_update
      summary: Update a staff roster member
      description: >-
        Gated by manage_staff_roster. Note this endpoint rebuilds the full row from the submitted
        payload (same validation as create) rather than doing a partial merge — omitted fields are
        written as null/defaults, not left untouched. `active` defaults to false (0) when not
        supplied on update (unlike create, where it defaults to true).
      tags:
        - Staff Roster
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StaffMemberInput'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        '403':
          description: Missing manage_staff_roster capability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Staff member not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      operationId: staffRoster_delete
      summary: Delete a staff roster member
      description: >-
        Gated by manage_staff_roster. event_staffing.staff_member_id is ON DELETE SET NULL, so
        existing shift assignments survive as "TBD" rather than being deleted.
      tags:
        - Staff Roster
      responses:
        '204':
          description: Deleted
        '403':
          description: Missing manage_staff_roster capability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/systems-inventory:
    get:
      operationId: systemsInventory_list
      summary: List systems inventory items
      description: >-
        Gated by manage_systems_inventory (venue_admin). Only active (is_active = 1) items are
        returned. Each item is annotated with `days_until_renewal` and `is_expiring_soon` (computed
        against `expiry_alert_days`).
      tags:
        - Systems Inventory
      parameters:
        - name: expiring_days
          in: query
          description: Only return items whose renewal_date falls within this many days.
          schema:
            type: integer
            minimum: 1
        - name: category
          in: query
          schema:
            type: string
            enum:
              - social
              - ticketing
              - payment
              - email
              - analytics
              - security
              - hosting
              - dns
              - storage
              - communication
              - pos
              - other
      responses:
        '200':
          description: Inventory items
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/SystemsInventoryItem'
                  categories:
                    type: array
                    items:
                      type: string
        '403':
          description: Missing manage_systems_inventory capability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      operationId: systemsInventory_create
      summary: Create a systems inventory item
      description: >-
        Gated by manage_systems_inventory. IMPORTANT: this catalog stores operational metadata only
        — it must never hold passwords, recovery codes, MFA secrets, API keys, access tokens, or
        other credentials. The server rejects (422, via a thrown InvalidArgumentException) any
        request body key that contains a suspicious substring (password, secret, token, api_key,
        access_key, private_key, recovery_code, mfa_secret, totp, passphrase, credential),
        case-insensitively, even if the field isn't a real column. An unrecognized `category`
        silently falls back to `other` rather than erroring.
      tags:
        - Systems Inventory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SystemsInventoryItemInput'
      responses:
        '200':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
        '403':
          description: Missing manage_systems_inventory capability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Request body contained a field that looks like a credential
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/systems-inventory/{itemId}:
    parameters:
      - name: itemId
        in: path
        required: true
        schema:
          type: integer
    get:
      operationId: systemsInventory_get
      summary: Get a single systems inventory item
      description: Gated by manage_systems_inventory.
      tags:
        - Systems Inventory
      responses:
        '200':
          description: Inventory item
          content:
            application/json:
              schema:
                type: object
                properties:
                  item:
                    $ref: '#/components/schemas/SystemsInventoryItem'
        '403':
          description: Missing manage_systems_inventory capability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Item not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    patch:
      operationId: systemsInventory_update
      summary: Update a systems inventory item
      description: >-
        Gated by manage_systems_inventory. Partial update — only keys present in the request body
        are written; omitted keys keep their stored value. Same credential-field rejection as create
        applies.
      tags:
        - Systems Inventory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SystemsInventoryItemInput'
      responses:
        '200':
          description: Updated (or no-op if the body had no recognized fields)
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        '403':
          description: Missing manage_systems_inventory capability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Item not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Request body contained a field that looks like a credential
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      operationId: systemsInventory_delete
      summary: Delete a systems inventory item
      description: >-
        Requires manage_systems_inventory AND that the caller's role is exactly venue_admin — this
        is stricter than the other operations on this resource, which only require the
        manage_systems_inventory capability. Non-admin holders of that capability (if any) get 403
        here specifically.
      tags:
        - Systems Inventory
      responses:
        '204':
          description: Deleted
        '403':
          description: Missing manage_systems_inventory capability, or caller is not venue_admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/nav-items:
    get:
      operationId: navItems_list
      summary: List all app shell navigation items
      description: >-
        Backs both the Admin > Navigation manager and the app shell's sidebar itself, so it's
        readable by any authenticated user (not gated by manage_navigation) — every user's sidebar
        needs it, same as /api/me. Returns every row including hidden (visible=0) ones; the caller
        is responsible for filtering by `visible` and `capability` for its own purposes (the app
        shell does this via public/assets/nav-shared.js's filterNavTree()). At most two levels deep:
        `parent_id` is null for a top-level item, or references another top-level item for a child —
        an item can never be nested more than one level.
      tags:
        - Navigation
      responses:
        '200':
          description: All nav items (flat, unordered by tree — sorted top-level-first, then by sort_order/id), plus the full set of global capability keys available for the Permission field.
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/NavItem'
                  capabilities:
                    type: array
                    items:
                      type: string
                    example:
                      - view_all_events
                      - create_events
                      - manage_users
                      - manage_navigation
    post:
      operationId: navItems_create
      summary: Create a navigation item
      description: >-
        Gated by manage_navigation. `link` may be blank for a pure grouping parent (renders as an
        expand/collapse button with no route of its own). `parent_id`, if set, must reference a
        top-level item (one whose own parent_id is null) — nesting under a child is rejected.
      tags:
        - Navigation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NavItemInput'
      responses:
        '200':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
        '403':
          description: Missing manage_navigation capability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Validation error (label required, or an invalid/too-deep parent_id)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/nav-items/reorder:
    post:
      operationId: navItems_reorder
      summary: Bulk move/reorder navigation items
      description: >-
        Gated by manage_navigation. Used by the Navigation manager's drag-and-drop list: accepts the
        full set of moved/reordered items in one call and applies them in a single transaction. Every
        `id` must already exist; every `parent_id` (if not null) must reference a top-level item.
      tags:
        - Navigation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - items
              properties:
                items:
                  type: array
                  items:
                    type: object
                    required:
                      - id
                    properties:
                      id:
                        type: integer
                      parent_id:
                        type: integer
                        nullable: true
                      sort_order:
                        type: integer
      responses:
        '200':
          description: Applied
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        '403':
          description: Missing manage_navigation capability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Unknown id/parent_id, an item nesting under a child, or an item becoming its own parent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/nav-items/{itemId}:
    parameters:
      - name: itemId
        in: path
        required: true
        schema:
          type: integer
    patch:
      operationId: navItems_update
      summary: Update a navigation item
      description: >-
        Gated by manage_navigation. Rejects giving an item that already has children a `parent_id`
        (would create a 3rd nesting level). Setting `is_home` clears it on every other item — only one
        item can be the default landing page at a time.
      tags:
        - Navigation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NavItemInput'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        '403':
          description: Missing manage_navigation capability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Navigation item not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      operationId: navItems_delete
      summary: Delete a navigation item
      description: Gated by manage_navigation. Cascades to any children of this item.
      tags:
        - Navigation
      responses:
        '204':
          description: Deleted
        '403':
          description: Missing manage_navigation capability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/outbox:
