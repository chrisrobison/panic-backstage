          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Event not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Could not generate/store the QR image
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
