  /campaigns/{campaignId}/send:
    post:
      operationId: campaigns_send
      summary: Send a campaign to resolved recipients
      description: >-
        Requires the `manage_campaigns` global capability. Only allowed while status is `draft` (422
        otherwise); requires at least one of `list_ids`/`contact_ids` (422 if both empty); 422 if
        none of the resolved recipients are opted in. Side effects: sends a real email per opted-in
        recipient via `Mailer`, records one `email_campaign_recipients` row per recipient (including
        `skipped_opted_out` rows for opted-out matches), flips campaign status to `sending` then a
        final `sent`/`partial_failure`/`failed` depending on the per-recipient outcome, and
        best-effort logs a `campaign sent` activity entry on every linked event. Not idempotent —
        re-sending a non-draft campaign is rejected.
      tags:
        - Campaigns
      parameters:
        - $ref: '#/components/parameters/CampaignIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CampaignSendRequest'
      responses:
        '200':
          description: Campaign after send (status reflects outcome, sent_count/failed_count populated).
          content:
            application/json:
              schema:
                type: object
                properties:
                  campaign:
                    $ref: '#/components/schemas/Campaign'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Missing the manage_campaigns capability.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Campaign not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: >-
            Campaign is not a draft, no list/contact was selected, or no resolved recipient is opted
            in.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
