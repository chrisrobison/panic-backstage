            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: No content to send, or no valid recipient address.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server mail() call failed (transport not configured on this host).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
