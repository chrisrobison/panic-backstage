        '403':
          description: Caller lacks the manage_ticketing capability on this event.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Event or scanner link not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
