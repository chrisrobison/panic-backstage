      description: >-
        Creates a row in ticket_types. Requires the 'manage_ticketing' event capability. `name` is
        required (422 if blank/missing); quantity_total and price_cents default to 0 if omitted or
        negative; status defaults to 'draft' unless one of draft/on_sale/paused/sold_out/closed is
