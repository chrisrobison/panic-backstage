        sf_station, dothebay, email_general, email_press, email_adhoc, or twitter (added by the
        X/Twitter OAuth integration — not listed in README's static 17-destination table).
      example: sf_chronicle
    SuperTenantId:
      name: id
      in: path
      required: true
      schema:
        type: integer
      description: Tenant id.
paths:
  /api/auth/magic-link:
    post:
      operationId: auth_request_magic_link
      summary: Request a magic-link sign-in email
      description: >-
        Public. Sends a 24-hour single-use login link to the given email if it belongs to an active
        user or has an open, unexpired event invite; otherwise responds identically (`{"ok": true}`)
        without sending mail, so the endpoint cannot be used to enumerate registered addresses.
        Rate-limited to 10 requests/15min per IP and 4/15min per email (429).
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthMagicLinkRequest'
      responses:
        '200':
          description: Request accepted (uniform response regardless of eligibility)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthOkResponse'
        '422':
          description: Missing or invalid email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/auth/verify-status:
    post:
      operationId: auth_verify_status
      summary: Non-consuming magic-link token validity check
      description: >-
        Public. Checks whether a magic-link token is still valid without consuming it (does not set
        `used_at`) — used to render a "Continue as <name>" interstitial. Safe for link previewers
        (iMessage/corporate scanners) to hit.
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthVerifyStatusRequest'
      responses:
        '200':
          description: Token status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthVerifyStatusResponse'
        '422':
          description: Missing token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/auth/verify:
    post:
      operationId: auth_verify
      summary: Exchange a magic-link token for a JWT token pair
      description: >-
        Public. Single-use: consumes the token (`used_at`) on success. Resolves the account by
        primary email or verified alias; if no user exists yet, creates one with role `viewer`.
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthTokenRequest'
      responses:
        '200':
          description: Signed in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenPair'
        '401':
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Token is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/auth/verify-email:
    get:
      operationId: auth_verify_email_get
      summary: Confirm a secondary (alias) email address via clicked link
      description: >-
        Public. Consumes a single-use, unexpired email-confirmation token (looked up by hash) and
        stamps the matching `alt_emails` entry's `verified_at`. Idempotent-ish: a token that was
        already consumed still reports success as long as the alias ended up verified. Accepts the
        token as a query parameter (for GET link clicks) or in the JSON body (see the POST operation
        on this same path).
      tags:
        - Auth
      security: []
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
          description: Raw (unhashed) confirmation token from the emailed link
      responses:
        '200':
          description: Email confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthVerifyEmailResponse'
        '401':
          description: Invalid, expired, or already-used confirmation link
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Alias is no longer pending confirmation (removed after the token was minted)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Token is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      operationId: auth_verify_email_post
      summary: Confirm a secondary (alias) email address (JSON body form)
      description: >-
        Public. Identical semantics to `GET /api/auth/verify-email`, accepting the token in the JSON
        body instead of the query string.
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthTokenRequest'
      responses:
        '200':
          description: Email confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthVerifyEmailResponse'
        '401':
          description: Invalid, expired, or already-used confirmation link
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Alias is no longer pending confirmation (removed after the token was minted)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Token is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/auth/lookup:
    post:
      operationId: auth_lookup
      summary: Look up which sign-in methods an email supports
      description: >-
        Public, email-first login helper. For unknown emails returns the same shape as a
        known-but-credentialless account so this cannot be used to enumerate accounts beyond what
        `/auth/login` error messages already leak.
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthLookupRequest'
      responses:
        '200':
          description: Sign-in method availability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthLookupResponse'
        '422':
          description: Valid email is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/auth/request-access:
    post:
      operationId: auth_request_access
      summary: Submit a public "request access" form
      description: >-
        Public. Records the request as a `requested`-status user row (no credentials) for a
        venue_admin to review; every active venue_admin with the access-request notification
        preference enabled is emailed. The response message is intentionally uniform (whether or not
        the email already belongs to an active account) to prevent enumeration. Resubmitting while a
        request is still pending refreshes the stored name/phone/notes and re-notifies admins.
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequestAccessRequest'
      responses:
        '200':
          description: Request recorded (uniform response)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthRequestAccessResponse'
        '422':
          description: Name or email missing/invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/auth/login:
    post:
      operationId: auth_login
      summary: Sign in with email + password
      description: >-
        Public. Resolves via the exact primary `users.email` first, then a verified alias as
        fallback. Rate-limited to 20 attempts/15min per IP and 8/15min per email (429).
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthLoginRequest'
      responses:
        '200':
          description: Signed in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenPair'
        '401':
          description: Invalid email or password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Email and password are required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Too many attempts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/auth/set-password:
    post:
      operationId: auth_set_password
      summary: Set or change the signed-in user's password
      description: >-
        Publicly routed at the Kernel level but requires a valid Bearer token internally (401 if
        absent). If the account already has a password, `current_password` must match it. Bumps
        `token_version`, which invalidates every access token issued before this point (see Kernel's
        revocation check) — a stolen bearer token stops working immediately rather than surviving
        the rest of its 90-day life.
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthSetPasswordRequest'
      responses:
        '200':
          description: Password updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthOkResponse'
        '401':
          description: Authentication required, or current_password is incorrect
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Password must be at least 8 characters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/auth/passkey-register-begin:
    post:
      operationId: auth_passkey_register_begin
      summary: Start WebAuthn passkey registration for the signed-in user
      description: >-
        Publicly routed at the Kernel level but requires a valid Bearer token internally (401 if
        absent). Returns a WebAuthn creation-options payload for `navigator.credentials.create()`;
        stores a 5-minute challenge server-side.
      tags:
        - Auth
      security: []
      responses:
        '200':
          description: WebAuthn creation options
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthPasskeyRegisterBeginResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/auth/passkey-register-complete:
    post:
      operationId: auth_passkey_register_complete
      summary: Finish WebAuthn passkey registration
      description: >-
        Publicly routed at the Kernel level but requires a valid Bearer token internally (401 if
        absent). Verifies the credential response against the previously stored challenge (consumed
        on use) and persists the new passkey.
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthPasskeyRegisterCompleteRequest'
      responses:
        '200':
          description: Passkey registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthOkResponse'
        '400':
          description: WebAuthn verification failed (invalid attestation/signature/origin)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required, or invalid/expired registration challenge
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Credential response is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/auth/passkey-login-begin:
    post:
      operationId: auth_passkey_login_begin
      summary: Start WebAuthn passkey login
      description: >-
        Public. If `email` is supplied, `allowCredentials` is scoped to that account's passkeys;
        otherwise the client performs a discoverable (resident-key) assertion. Rate-limited to 20
        attempts/15min per IP and, when an email is given, 8/15min per email (429).
      tags:
        - Auth
      security: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthPasskeyLoginBeginRequest'
      responses:
        '200':
          description: WebAuthn assertion options
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthPasskeyLoginBeginResponse'
        '429':
          description: Too many attempts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/auth/passkey-login-complete:
    post:
      operationId: auth_passkey_login_complete
      summary: Finish WebAuthn passkey login
      description: >-
        Public. Verifies the assertion against the stored login challenge (consumed on use), checks
        the authenticator's signature counter for replay/cloning, and on success issues a JWT token
        pair. Rate-limited to 20 attempts/15min per IP and 8/15min per credential id (429).
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthPasskeyLoginCompleteRequest'
      responses:
        '200':
          description: Signed in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenPair'
        '401':
          description: >-
            Invalid/expired login challenge, unrecognised passkey, or WebAuthn verification failure
            (e.g. sign-count regression)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Credential data is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Too many attempts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/auth/passkeys:
    post:
      operationId: auth_list_passkeys
      summary: List the signed-in user's registered passkeys
      description: >-
        Publicly routed at the Kernel level but requires a valid Bearer token internally (401 if
        absent). Uses POST (not GET) per the AuthEndpoint's action-dispatch convention — all
        `/api/auth/*` actions other than `verify-email` are POST-only.
      tags:
        - Auth
      security: []
      responses:
        '200':
          description: Passkeys + password status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthListPasskeysResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/auth/remove-passkey:
    post:
      operationId: auth_remove_passkey
      summary: Delete one of the signed-in user's passkeys
      description: >-
        Publicly routed at the Kernel level but requires a valid Bearer token internally (401 if
        absent). Scoped to the caller's own passkeys; a non-existent or foreign id is a silent no-op
        (still 200).
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRemovePasskeyRequest'
      responses:
        '200':
          description: Passkey removed (or no-op)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthOkResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Passkey id is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/auth/profile:
    post:
      operationId: auth_update_profile
      summary: Update the signed-in user's own name/email/phone
      description: >-
        Publicly routed at the Kernel level but requires a valid Bearer token internally (401 if
        absent). Self-scoped and never touches `role` (contrast with the admin `PATCH
        /api/users/{userId}`).
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthUpdateProfileRequest'
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUpdateProfileResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Another user already uses that email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: name and email are required, or email is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/auth/preferences:
    post:
      operationId: auth_update_preferences
      summary: Update the signed-in user's per-user UI/notification preferences
      description: >-
        Publicly routed at the Kernel level but requires a valid Bearer token internally (401 if
        absent). Partial update: only recognised keys present in the body are applied; at least one
        must be supplied.
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthUpdatePreferencesRequest'
      responses:
        '200':
          description: Preferences updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthOkResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: No supported preference fields provided, or an enum field is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/auth/refresh:
    post:
      operationId: auth_refresh
      summary: Rotate a refresh token for a new JWT token pair
      description: >-
        Public. The supplied refresh token is revoked (single use) and a new access + refresh token
        pair is issued.
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRefreshRequest'
      responses:
        '200':
          description: New token pair
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenPair'
        '401':
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: refresh_token is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/auth/logout:
    post:
      operationId: auth_logout
      summary: Revoke a refresh token
      description: >-
        Public. Revokes the given refresh token if present; always returns `{"ok": true}` even if
        the token was already revoked/unknown or omitted entirely (there is no server-side
        access-token blacklist — the access token remains valid until it expires or is revoked via a
        `token_version` bump).
      tags:
        - Auth
      security: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthLogoutRequest'
      responses:
        '200':
          description: Always succeeds
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthOkResponse'
  /api/me:
    get:
      operationId: me_get
      summary: Get the current session's user + capabilities
      description: >-
        Public. Returns `{"user": null, "capabilities": {...}}` gracefully when unauthenticated
        instead of a 401. When authenticated, enriches the user with credential state and
        UI/notification preferences, and (idempotently, best-effort) drops a one-time welcome
        message into the user's inbox on first load. Also reachable as the bare `GET /api/` route
        (no path segments).
      tags:
        - Auth
      security: []
      responses:
        '200':
          description: Current session info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
  /api/account/export:
    get:
      operationId: account_export
      summary: Export all personal data on the caller's own account (GDPR Art. 15/20)
      description: >-
        Requires authentication. Returns a downloadable JSON file (`Content-Disposition:
        attachment`) containing the account row (password hash stripped, `alt_emails` decoded),
        passkey labels, event collaborations, messages, and activity log entries. Only the
        authenticated user's own personal data — not venue-owned contact/lead/ticket-buyer records.
      tags:
        - Account
      responses:
        '200':
          description: Data export file
          headers:
            Content-Disposition:
              schema:
                type: string
              description: attachment; filename="panicbackstage-data-export-{userId}-{YYYYMMDD}.json"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountExportResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/account/delete:
    post:
      operationId: account_delete
      summary: Erase the caller's own account (GDPR Art. 17 right to erasure)
      description: >-
        Requires authentication and explicit confirmation (`{"confirm": true, "email": "<your
        current email>"}`, email must match case-insensitively). Anonymises the account in place
        (name, email, phone, password, alt_emails, request_notes wiped; email replaced with a
        non-routable `erased+{id}@deleted.invalid` placeholder) rather than hard-deleting the row,
        so event ownership and historical references remain consistent. Also removes passkeys,
        refresh tokens, pending email-verification tokens, and pending magic-link tokens for the
        account.
      tags:
        - Account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountDeleteRequest'
      responses:
        '200':
          description: Account erased
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountDeleteResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Confirmation missing, or email does not match the account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/account/accept-privacy:
    post:
      operationId: account_accept_privacy
      summary: Record the caller's agreement to the current privacy policy
      description: >-
        Requires authentication. Stamps `privacy_policy_accepted_at` (now) and
        `privacy_policy_version` on the user's own row.
      tags:
        - Account
      responses:
        '200':
          description: Acceptance recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountAcceptPrivacyResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Could not record acceptance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/users:
    get:
      operationId: users_list
      summary: List all user accounts (including pending access requests)
      description: Requires the `manage_users` global capability (venue_admin only).
      tags:
        - Users
      responses:
        '200':
          description: All users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Missing the manage_users capability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      operationId: users_create
      summary: Create a new user account
      description: Requires the `manage_users` global capability (venue_admin only).
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
      responses:
        '200':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserCreateResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Missing the manage_users capability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: A user with that email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: name/email required, email invalid, or role invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/users/{userId}:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: integer
        description: User account id
    get:
      operationId: users_get
      summary: Get a single user account
      description: Requires the `manage_users` global capability (venue_admin only).
      tags:
        - Users
      responses:
        '200':
          description: User
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserShowResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Missing the manage_users capability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    patch:
      operationId: users_update
      summary: Update a user's name/email/role and optionally reset their password
      description: >-
        Requires the `manage_users` global capability (venue_admin only). Despite being a PATCH,
        `name`, `email`, and `role` are all effectively required in the body — omitting any of them
        (or sending an invalid role) returns 422; the endpoint does not support a true partial patch
        of these three fields. `password`, if non-empty, resets the account's password.
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserOkResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Missing the manage_users capability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Another user already uses that email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: name/email required, email invalid, or role invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      operationId: users_delete
      summary: Delete a user account
      description: >-
        Requires the `manage_users` global capability (venue_admin only). Also used to dismiss a
        pending access request. Refuses to delete the caller's own account, and refuses to delete a
        user who still owns one or more events (reassign first). Removes the user's
        `event_collaborators` rows before deleting the user row.
      tags:
        - Users
      responses:
        '204':
          description: User deleted
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Missing the manage_users capability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: User not found (missing/falsy id)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: User still owns one or more events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Cannot delete your own account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/users/{userId}/approve:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: integer
        description: User account id (must currently be access_status = requested)
    post:
      operationId: users_approve
      summary: Approve a pending access request
      description: >-
        Requires the `manage_users` global capability (venue_admin only). Assigns the chosen role,
        flips `access_status` to `active`, mints a 7-day magic link, and emails it to the applicant.
      tags:
        - Users
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserApproveRequest'
      responses:
        '200':
          description: Approved and login link sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserOkResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Missing the manage_users capability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: This account is not awaiting approval
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Invalid role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/users/{userId}/invite:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: integer
        description: User account id
    post:
      operationId: users_invite
      summary: (Re)send a login invite to a user account
      description: >-
        Requires the `manage_users` global capability (venue_admin only). Mints a fresh 7-day magic
        link and emails it via the `account-invite` template — no request body needed. Works for any
        account regardless of `access_status`, so it covers both the "send a new Core Collaborator
        their first invite" case (create the account with `POST /api/users`, then invite them) and
        resending a forgotten/expired invite to an existing account.
      tags:
        - Users
      responses:
        '200':
          description: Invite emailed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserOkResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Missing the manage_users capability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/users/{userId}/emails:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: integer
        description: User account id
    post:
      operationId: user_emails_add
      summary: Add a secondary (alias) email to a user's account
      description: >-
        Authorization: the `manage_users` global capability (venue_admin) OR the authenticated user
        acting on their own id (403 otherwise). Adds the address as an UNVERIFIED alias and emails a
        7-day confirmation link (`POST /api/auth/verify-email`-compatible token).
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserEmailAddRequest'
      responses:
        '201':
          description: Alias added (or already present) and confirmation email sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEmailAddResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Not the account owner and missing manage_users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Already this account's primary email, or already in use elsewhere
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: A valid email is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      operationId: user_emails_remove
      summary: Remove a secondary (alias) email from a user's account
      description: >-
        Authorization: the `manage_users` global capability (venue_admin) OR the authenticated user
        acting on their own id (403 otherwise). Cannot remove the account's primary email. Also
        invalidates any outstanding confirmation tokens for the address.
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserEmailRemoveRequest'
      responses:
        '200':
          description: Alias removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEmailOkResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Not the account owner and missing manage_users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Cannot remove the primary email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: email is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/users/{userId}/emails/resend:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: integer
        description: User account id
    post:
      operationId: user_emails_resend
      summary: Re-send the confirmation email for a pending alias
      description: >-
        Authorization: the `manage_users` global capability (venue_admin) OR the authenticated user
        acting on their own id (403 otherwise). Mints a fresh 7-day confirmation token, replacing
        the old one.
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserEmailResendRequest'
      responses:
        '200':
          description: Confirmation email re-sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEmailResendResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Not the account owner and missing manage_users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: User not found, or that email is not on this account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: That email is already confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: A valid email is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/users/{userId}/emails/primary:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: integer
        description: User account id
    post:
      operationId: user_emails_make_primary
      summary: Promote a verified alias email to the account's primary email
      description: >-
        Authorization: the `manage_users` global capability (venue_admin) OR the authenticated user
        acting on their own id (403 otherwise). Only a confirmed (`verified_at` non-null) alias can
        be promoted. Swaps `users.email` to the new address and demotes the old primary into
        `alt_emails` as a verified entry.
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserEmailMakePrimaryRequest'
      responses:
        '200':
          description: Primary email swapped
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEmailMakePrimaryResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Not the account owner and missing manage_users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: User not found, or that email is not on this account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Already the primary, not yet confirmed, or already in use elsewhere
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: A valid email is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/users/duplicates:
    get:
      operationId: duplicates_list
      summary: List suggested duplicate-account pairs
      description: >-
        Requires the `manage_users` global capability (venue_admin only). Read-only heuristic scan
        across all users, bucketed by normalized name, normalized phone, and Gmail-canonicalized
        primary email. Strongest matches (most matching signals) sort first.
      tags:
        - Users
      responses:
        '200':
          description: Candidate duplicate pairs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DuplicatesListResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Missing the manage_users capability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/users/merge:
    post:
      operationId: duplicates_merge
      summary: Merge one user account into another (atomic)
      description: >-
        Requires the `manage_users` global capability (venue_admin only). Folds `loser_id` into
        `survivor_id`: repoints every `users(id)` foreign key (events, tasks, contracts, tickets,
        staff, etc.) to the survivor, moves the loser's passkeys to the survivor, revokes the
        loser's refresh tokens, folds the loser's primary + alias emails into the survivor's
        `alt_emails` as verified entries (skipping any address already owned by a third party), then
        deletes the loser row. Refuses to merge the caller's own account away as the loser. If the
        two accounts have different roles, the merge is refused with a 409 unless `override_role:
        true` is supplied.
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DuplicateMergeRequest'
      responses:
        '200':
          description: Merge completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DuplicateMergeResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Missing the manage_users capability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Survivor and loser roles differ and override_role was not set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DuplicateMergeRoleConflict'
        '422':
          description: >-
            survivor_id/loser_id missing or equal, confirm not true, caller tried to merge away
            their own account, or survivor/loser user not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/events:
    get:
      operationId: events_list
      summary: List events
      description: >-
        Returns events visible to the caller (venue_admin/global_viewer see all； others see events
        they own or collaborate on), plus lookup data for the calendar/board UI. Requires the
        `read_event` capability on each returned event (enforced via row-level scoping, not a
        per-event 403). Results are capped at 250 rows, ordered by date/show_time descending.
      tags:
        - Events
      parameters:
        - name: status
          in: query
          schema:
            type: string
          description: Filter to an exact event status.
        - name: event_type
          in: query
          schema:
            type: string
          description: Filter to an exact event type.
        - name: owner_user_id
          in: query
          schema:
            type: integer
          description: Filter to events owned by this user id.
        - name: public_visibility
          in: query
          schema:
            type: integer
            enum:
              - 0
              - 1
          description: Filter by public-page visibility flag.
        - name: start_date
          in: query
          schema:
            type: string
            format: date
          description: >-
            Only events whose COALESCE(end_date, date) is on/after this date (so a multi-day event
            already in progress is still included).
        - name: end_date
          in: query
          schema:
            type: string
            format: date
          description: Only events whose date is on/before this date.
      responses:
        '200':
          description: Event list with lookup data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventIndexResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      operationId: events_create
      summary: Create an event
      description: >-
        Requires the `create_events` global capability. `title`, `date`, `venue_id`, and
        `event_type` are required (422 if missing). Booker fields default to the authenticated user
        when omitted. Private events (`event_type=private_event`) are forced non-public and
        auto-assigned to the configured private-event handler when no `owner_user_id` is given. If
        `status` is set to a booking-confirmed status
        (confirmed/booked/needs_assets/assets_approved/ready_to_announce/published/advanced/completed/settled), a
        409 room-conflict check runs against the venue/date/time window. A sequential `EVT-N`
        external_id is assigned and the event is pushed to the linked Google Sheet (best-effort,
        non-blocking).
      tags:
        - Events
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventCreateRequest'
      responses:
        '200':
          description: Event created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
        '403':
          description: Missing create_events capability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Room conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/events/from-template/{templateId}:
    post:
      operationId: events_createFromTemplate
      summary: Create an event from an event template
      description: >-
        Requires the `create_events` global capability. `date` is required. Seeds
        title/description/times/ticket price from the template, then applies the template's
        `checklist_json` (tasks), `schedule_json` (schedule items), and `staffing_json` (staffing
        shifts) to the new event. An optional `resource_id` in the body is validated against the
        template's venue.
      tags:
        - Events
      parameters:
        - name: templateId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - date
              properties:
                date:
                  type: string
                  format: date
                title:
                  type: string
                  description: Defaults to template default_title/name.
                end_date:
                  type: string
                  format: date
                doors_time:
                  type: string
                  description: HH:MM, defaults to 19:00.
                show_time:
                  type: string
                  description: HH:MM, defaults to 20:00.
                resource_id:
                  type: integer
                  nullable: true
      responses:
        '200':
          description: Event created from template.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
        '403':
          description: Missing create_events capability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Template not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: date is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/events/{id}:
    get:
      operationId: events_get
      summary: Get one event with its full workspace payload
      description: >-
        Requires the `read_event` event capability. Returns the event plus lineup, tasks (filtered
        to the caller's own assignments when they only have `view_assigned_tasks`), blockers,
        schedule, assets, collaborators, guest list (with comp ticket info), staffing, settlement
        (only when the caller has `view_settlement`), activity log, readiness checklist, next
        recommended action, and the caller's resolved capability map for this event.
      tags:
        - Events
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Full event workspace payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventShowResponse'
        '403':
          description: Missing read_event capability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Event not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    patch:
      operationId: events_update
      summary: Update an event
      description: >-
        Requires the `edit_event` event capability. Three distinct request shapes are supported,
        dispatched by body shape: (1) `{"status": "<new status>"}` (exactly one key) — a pure status
        transition; validated by `validateStatusTransition` (required-field checklist per status,
        contract/deposit gates for `booked`, and a 409 room-conflict check for booking-confirmed
        statuses) before the column is updated and status-change notification emails are sent; (2) a
        single-key body whose key is one of the partial-update allowlist fields (settlement_doc_url,
        contract_url, venue_contract_url, ticket_url, ticket_system, walkthrough_done,
        deposit_amount, potential_revenue, load_in_time, end_date, estimated_guests,
        av_requirements, catering_notes, client_org) — updates just that column; (3) otherwise, a
        full-row update requiring the same field set as create (title, date, venue_id, event_type,
        status, ...). Slug is regenerated if title or date changed. A room-conflict check (409) runs
        when the resulting status is booking-confirmed.
      tags:
        - Events
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventUpdateRequest'
      responses:
        '200':
          description: Event updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  id:
                    type: integer
        '403':
          description: Missing edit_event capability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Event not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Room conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Invalid status value or missing required fields for the target status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      operationId: events_delete
      summary: Delete an event
      description: >-
        Requires the `delete_event` event capability. Hard-deletes the row (cascades to
        sub-resources via FK).
      tags:
        - Events
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Deleted.
        '403':
          description: Missing delete_event capability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
