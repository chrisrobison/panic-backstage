          content:
            application/json:
              schema:
                type: object
                properties:
                  venue:
                    $ref: '#/components/schemas/Venue'
        '400':
          description: Invalid JSON body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Caller is not a venue_admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Venue not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Venue name would be empty, or no updatable fields provided
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /venues/{venueId}/resources:
    parameters:
      - name: venueId
        in: path
        required: true
        schema:
          type: integer
    get:
      operationId: venueResources_list
      summary: List all rooms for a venue, including archived
      description: >-
        venue_admin role only. Unlike the resources array embedded in `GET /venues`, this includes
        archived (active=0) rooms, for the room management view.
      tags:
        - Venues
      responses:
        '200':
          description: Rooms
          content:
            application/json:
              schema:
                type: object
                properties:
                  resources:
