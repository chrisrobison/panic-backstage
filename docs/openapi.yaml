    delete:
      operationId: scanner_revokeLink
      summary: Revoke a scanner link
      description: >-
        Soft-revokes a scanner link (sets revoked_at; preserves audit history — the row and its scan
        history are kept). Requires the 'manage_ticketing' event capability. Idempotent.
      tags:
        - Scanner
      parameters:
        - $ref: '#/components/parameters/TicketingEventId'
        - name: linkId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Link revoked (or already revoked).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketOkResponse'
        '403':
          description: Caller lacks the manage_ticketing capability on this event.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Event or scanner link not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /scan/redeem:
    post:
      operationId: scanner_redeemTicket
      summary: Redeem a scanned ticket at the door
      description: >-
        Authenticated by a per-scanner secret token in the request body (scanner_token, matched by
        sha256 hash against event_scanner_links), not the venue staff JWT — this is the actual
        door-scan call made by the scanner.html page. An optional PIN is required if the link was
        created with one. On success, atomically flips the matching ticket's status from 'issued' to
        'redeemed' scoped to the link's event (the UPDATE itself is the concurrency guard, so a
        double-scan races to result=already_redeemed rather than admitting twice) and always writes
        a ticket_scans audit row, even for not_found/wrong_event attempts. Returns HTTP 200 for
        every *authenticated* scan attempt (the `result`/`admitted` fields carry the outcome) so the
        scanner UI can render a state; 401 is reserved for a bad/expired/revoked scanner token or
        wrong PIN, where no event scope is known and no audit row is written.
      tags:
        - Scanner
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScannerRedeemRequest'
      responses:
        '200':
          description: Authenticated scan attempt processed (see `result`/`admitted`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScannerRedeemResponse'
        '401':
          description: Missing/invalid/revoked/expired scanner token, or incorrect PIN.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: No ticket_token was supplied to scan.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /t/{token}:
    get:
      operationId: ticketView_getPage
      summary: View a ticket's public HTML page (scannable QR)
      description: >-
        Public, unauthenticated, no `/api` prefix — this is the pretty URL a phone camera opens when
        it scans a ticket's QR (or that is emailed to the buyer). The plaintext {token} was
        delivered exactly once by email; it is never stored, only sha256(token) is persisted as
        tickets.token_hash, so the ticket is looked up by hashing the supplied token. Renders a
        standalone HTML page (no app shell) with holder name, event/venue/date, status badge, and —
        only while status='issued' — a scannable QR pointing at GET /assets/qr.svg?text=<bare
        token>, the same bare token the door scanner submits to POST /scan/redeem.
      tags:
        - Ticket View
      security: []
      parameters:
        - name: token
          in: path
          required: true
          description: Plaintext one-time ticket token (not the hash).
          schema:
            type: string
      responses:
        '200':
          description: Ticket page (valid, redeemed, or void — all render 200 with a different status badge).
          content:
            text/html:
              schema:
                type: string
        '404':
          description: No ticket matches this token.
          content:
            text/html:
              schema:
                type: string
  /assets/qr.svg:
    get:
      operationId: qrCode_getSvg
      summary: Render an SVG QR code for arbitrary text
      description: >-
        Public, unauthenticated, no `/api` prefix. Self-contained from-scratch QR encoder (byte
        mode, error-correction level M, no external dependency) rendering the `text` query value as
        a scalable QR. Used to render ticket-view page QR codes. Returns a blank 1x1 placeholder SVG
        (still HTTP 200) when `text` is empty or encoding fails (e.g. payload too large), so `<img>`
        tags never show a broken-image icon.
      tags:
        - QR Codes
      security: []
      parameters:
        - name: text
          in: query
          required: false
          description: Payload to encode (typically a bare ticket token). Empty returns a 1x1 placeholder.
          schema:
            type: string
        - name: size
          in: query
          required: false
          description: Target rendered pixel size; clamped to [64, 1024]. Default 300.
          schema:
            type: integer
            default: 300
            minimum: 64
            maximum: 1024
      responses:
        '200':
          description: QR image (or 1x1 placeholder).
          content:
            image/svg+xml:
              schema:
                type: string
  /assets/qr.png:
    get:
      operationId: qrCode_getPng
      summary: Render a PNG QR code for arbitrary text
      description: >-
        Public, unauthenticated, no `/api` prefix. Same encoder/matrix as /assets/qr.svg, rasterized
        via PHP's GD extension into a PNG. Used for HTML emails (Gmail/Outlook do not support inline
        SVG). Returns a hard-coded 1x1 transparent PNG placeholder (HTTP 200) when `text` is empty
        or encoding fails.
      tags:
        - QR Codes
      security: []
      parameters:
        - name: text
          in: query
          required: false
          description: Payload to encode (typically a bare ticket token). Empty returns a 1x1 placeholder.
          schema:
            type: string
        - name: size
          in: query
          required: false
          description: Target rendered pixel size; clamped to [64, 1024]. Default 300.
          schema:
            type: integer
            default: 300
            minimum: 64
            maximum: 1024
      responses:
        '200':
          description: QR image (or 1x1 transparent placeholder).
          content:
            image/png:
              schema:
                type: string
                format: binary
  /webhooks/{provider}:
    post:
      operationId: paymentWebhook_receive
      summary: Receive a ticket-checkout payment provider webhook
      description: >-
        Public; NOT JWT-authenticated. Authenticated instead by a provider-specific signature the
        provider's SDK validates against the raw request body inside `provider->verifyWebhook()`
        (e.g. Stripe's `Stripe-Signature` header, Square's HMAC header) — an invalid or missing
        signature returns 400 and takes no action. On a recognized 'payment_succeeded' event,
        matches the pending order by (provider, provider_ref), records provider_payment_ref, and
        calls the idempotent TicketingService::fulfillOrder() (issuing + emailing tickets on the
        first delivery only; retries no-op). On 'payment_failed', cancels the still-pending order
        and releases its inventory hold. Always returns HTTP 200 once the signature itself is valid
        — including for event types this endpoint ignores — so the provider stops retrying a
        delivered, understood webhook. Note: the `square-pos` provider segment is intercepted
        earlier by the Kernel and routed to POST /webhooks/square-pos instead (a different webhook
        subscription/signing key for bar/merch POS sales, not ticket checkout). # TODO: exact
        request body shape is provider-defined (Stripe Event / # Square Webhook Event JSON); not
        modeled field-by-field here.
      tags:
        - Payment Webhooks
      security: []
      parameters:
        - name: provider
          in: path
          required: true
          description: Payment provider key.
          schema:
            type: string
            enum:
              - stripe
              - square
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentWebhookPayload'
      responses:
        '200':
          description: Signature valid; event processed or acknowledged-and-ignored.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentWebhookReceivedResponse'
        '400':
          description: Invalid or missing signature.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Unknown provider key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /webhooks/square-pos:
    post:
      operationId: posWebhook_receive
      summary: Receive a Square POS (bar/merch) payment webhook
      description: >-
        Public; NOT JWT-authenticated. Authenticated by a Square HMAC-SHA256 signature in the
        `x-square-hmacsha256-signature` header: base64(hmac_sha256(webhookUrl . rawBody, secret)),
        compared with hash_equals(); secret is SQUARE_POS_WEBHOOK_SECRET, falling back to
        SQUARE_WEBHOOK_SIGNATURE_KEY. Distinct from POST /webhooks/square — this endpoint is
        bar/merch point-of-sale sales, not online ticket checkout, and uses its own webhook
        subscription. On a 'payment.updated' or 'payment.completed' event with status=COMPLETED,
        resolves the sale's venue + revenue category from pos_location_map by the payment's Square
        location_id, resolves the target event (an explicit active_event_id override on the mapping
        row wins; otherwise falls back to a same-day/venue date match), and inserts a
        'pos_import'-sourced event_ledger_entries row. Idempotent: a second delivery of the same
        Square payment id (source_ref_str) is silently dropped. All other event types, and payments
        with no matching pos_location_map row or no matching event, are silently ignored (logged
        server-side only). Always returns HTTP 200 once the signature is valid so Square stops
        retrying. # TODO: request body is Square's Webhook Event JSON #
        (data.object.payment.{id,location_id,status,total_money}); not # modeled field-by-field
        here.
      tags:
        - Payment Webhooks
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PosWebhookPayload'
      responses:
        '200':
          description: Signature valid; event processed or acknowledged-and-ignored.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PosWebhookReceivedResponse'
        '400':
          description: Invalid/unconfigured signature, or body is not valid JSON.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
