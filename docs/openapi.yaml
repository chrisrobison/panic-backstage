      responses:
        '200':
          description: Venues and resources
          content:
            application/json:
              schema:
                type: object
                properties:
                  venues:
                    type: array
                    items:
                      allOf:
                        - $ref: '#/components/schemas/Venue'
                        - type: object
                          properties:
                            resources:
                              type: array
                              items:
                                $ref: '#/components/schemas/VenueResource'
                  resources:
                    type: array
                    items:
                      $ref: '#/components/schemas/VenueResource'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /venues/{venueId}:
    parameters:
      - name: venueId
