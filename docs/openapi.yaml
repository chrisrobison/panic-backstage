          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: name is required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/contract-templates/{templateId}:
    get:
      operationId: contractTemplates_get
      summary: Get one template with its module wiring
      description: Requires the global `manage_contract_library` capability.
      tags:
        - Contract Templates
