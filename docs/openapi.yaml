          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Module not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: name is required, or module_key already in use.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
