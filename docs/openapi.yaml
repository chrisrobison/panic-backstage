              schema:
                $ref: '#/components/schemas/Error'
  /api/signing/{token}:
    get:
      operationId: contractSigning_load
      summary: Load a contract for the public signing page
      description: >-
        PUBLIC — no JWT. Authenticated solely by the opaque signing token in the path: the server
        hashes it with sha256 and compares against `contract_signers.signing_token_hash` via
        `hash_equals`. Validates the token is at least 32 chars, unexpired (checked against
        `token_expires_at`), and the signer/contract are not in a terminal state (already
        signed/declined/voided/expired, or contract
        fully_executed/voided/canceled/superseded/declined). Returns the rendered contract HTML
        (from the latest generated version, or a live render as fallback) plus signer info —
        deliberately excludes any admin-only fields. Logs a `signer_link_opened` audit entry on
        every load.
      tags:
        - Contract Signing
      security: []
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Contract ready for signing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContractSigningLoadResponse'
        '400':
          description: Empty/malformed token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '410':
          description: >-
            Signing link is invalid, expired, already used, or the contract is no longer open for
            signatures.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/signing/{token}/viewed:
    post:
      operationId: contractSigning_markViewed
      summary: Record that the signer opened the signing link
      description: >-
        PUBLIC — token-hash authenticated (see `contractSigning_load`). Idempotent: only the first
        call sets `viewed_at` and appends a `signer_consented` audit entry / advances the contract
        from `sent` to `viewed`; repeat calls are safe no-ops.
      tags:
        - Contract Signing
      security: []
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Recorded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        '410':
          description: Signing link invalid/expired/inactive.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/signing/{token}/sign:
    post:
      operationId: contractSigning_sign
      summary: Submit the electronic signature
      description: >-
        PUBLIC — token-hash authenticated (see `contractSigning_load`). Requires explicit `consent`
        plus at least one of `signature_text` (typed name) or `signature_image` (base64 PNG data
        URI, saved to `storage/contracts/{id}/signatures/`). Records IP/user-agent for the
        e-signature audit trail, invalidates the token, and advances the contract's status
        (`partially_signed` → `signed_by_client` → once all signers including the venue are done,
        `fully_executed`, which also renders/hashes/stores the final signed PDF and, for
        event-linked contracts, flips the event to `booked`). Not idempotent — resubmitting after
        already signed returns 409.
      tags:
        - Contract Signing
      security: []
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContractSigningSignRequest'
      responses:
        '200':
          description: Signature recorded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  message:
                    type: string
        '409':
          description: This signer has already signed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '410':
          description: Signing link invalid/expired/inactive.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Missing consent, or missing both signature_text and signature_image.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/signing/{token}/decline:
    post:
      operationId: contractSigning_decline
      summary: Decline to sign
      description: >-
        PUBLIC — token-hash authenticated (see `contractSigning_load`). Marks the signer `declined`
        and the contract `declined`, invalidates the token, appends a `signer_declined` audit entry
        with the optional reason, and notifies venue admins. Returns 409 if the signer has already
        signed.
      tags:
        - Contract Signing
      security: []
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContractSigningDeclineRequest'
      responses:
        '200':
          description: Declined.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        '409':
          description: This signer has already signed; cannot decline.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '410':
          description: Signing link invalid/expired/inactive.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/contracts/webhook/{provider}:
    post:
      operationId: contractWebhooks_receive
      summary: Receive an e-signature provider webhook event
      description: >-
        PUBLIC — no JWT. Authenticity is verified via the configured provider's
        signature-verification routine (`ContractSignatureProviders::make()->verifyWebhook()`) run
        against the raw request body and headers *before* any payload data is trusted or persisted;
        on failure this returns 401 and logs a `webhook_verification_failed` audit entry
        (contract_id 0, i.e. not tied to a specific contract). Known providers: `mock` (accepts any
        JSON, for integration testing — no real signature check) and `dropbox_sign` (verifies the
        `X-HelloSign-Signature` HMAC header). The verified event is matched to a contract by
        `provider_envelope_id` and mapped by event type substring: `*signed*all*` → contract
        fully_executed, `*signed*` → that signer marked signed, `*viewed*` → that signer marked
        viewed, `*declined*` → contract declined, `*cancel*` → contract voided. `dropbox_sign`
        requires the literal response body `{"hash":"Hello API Event Received"}`; other providers
        get `{"ok":true}`. The request body shape is entirely provider-defined (Dropbox Sign event
        envelope, etc.) — modeled generically here.
      tags:
        - Contract Webhooks
      security: []
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
          description: e.g. mock, dropbox_sign.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Provider-defined webhook payload; shape varies by provider.
              additionalProperties: true
      responses:
        '200':
          description: Webhook processed (response body varies by provider — see description).
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          description: Webhook signature verification failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Provider configuration error (could not instantiate the signature provider).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/portal/view:
    get:
      operationId: portal_view
      summary: View the token-gated client portal for an event
      description: >-
        PUBLIC — no JWT; gated entirely by the opaque `token` query parameter
        (`portal_tokens.token`, 256-bit random hex, must be unrevoked and unexpired). Bumps
        `last_used_at`/`use_count` on every successful view. Returns a deliberately narrow,
        client-safe subset: event summary (no internal notes/capabilities), the most-advanced
        contract's id/status/created_at only, inbound payments (`event_payments` rows with
        `direction='received'`), and an invoice-style view of ledger revenue/payment lines
        (`event_ledger_entries` where `line_type IN ('revenue','payment')` and not voided).
      tags:
        - Client Portal
      security: []
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Portal data for the event.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortalViewResponse'
        '400':
          description: Token missing or too short.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Link expired, revoked, or invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/portal/{eventId}/create-link:
    post:
      operationId: portal_createLink
      summary: Generate a new client portal link for an event
      description: >-
        Creates a `portal_tokens` row with a 256-bit random hex token (`bin2hex(random_bytes(32))`)
        and a TTL clamped to 1–90 days (default 30). Returns the shareable `portal.html?token=...`
        URL. Requires only an authenticated session (`requireAuth()`) — unlike other Contracts group
        write operations, this endpoint does not additionally gate on a specific event capability
        such as `manage_contracts`; any logged-in user may generate a link for any existing event.
      tags:
        - Client Portal
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PortalCreateLinkRequest'
      responses:
        '200':
          description: Link created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortalCreateLinkResponse'
        '400':
          description: event_id missing/invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Event not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/portal/{eventId}/list-links:
    get:
      operationId: portal_listLinks
      summary: List all portal links for an event
      description: >-
        Returns every `portal_tokens` row for the event (including revoked and expired ones) with a
        computed shareable `url`. Requires only an authenticated session (`requireAuth()`) — not
        gated by a specific event capability.
      tags:
        - Client Portal
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Links.
          content:
            application/json:
              schema:
                type: object
                properties:
                  links:
                    type: array
                    items:
                      $ref: '#/components/schemas/PortalLink'
        '400':
          description: eventId missing/invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/portal/{tokenId}/revoke:
    post:
      operationId: portal_revokeLink
      summary: Revoke a client portal link
      description: >-
        Sets `is_revoked = 1` on the given `portal_tokens.id`, immediately invalidating that link
        for `portal_view`. Requires only an authenticated session (`requireAuth()`) — not gated by a
        specific event capability; the endpoint does not verify the token belongs to an event the
        caller has access to.
      tags:
        - Client Portal
      parameters:
        - name: tokenId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Revoked.
          content:
            application/json:
              schema:
                type: object
                properties:
                  revoked:
                    type: boolean
        '400':
          description: tokenId missing/invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /public/events/{idOrSlug}:
    get:
      operationId: publicEvents_getEvent
      summary: Get a public event page
      description: >-
        Public event detail for the marketing/public-facing event page: the event row (joined with
        venue name/address/city/state), its non-canceled lineup ordered by billing_order/set_time,
        and its latest approved flyer asset (if any). Only returns events with public_visibility =
        1. The path segment may be either the numeric event id or the event's slug — numeric-looking
        values are looked up by id, everything else by slug (this keeps older slug-based links
        working indefinitely even though new links are minted with the id). # TODO: PublicEvents
        also accepts ?id= or ?slug= query params as a # fallback when the path segment is absent;
        not modeled as separate # parameters here since the concrete path form above is primary.
      tags:
        - Public Events
      security: []
      parameters:
        - name: idOrSlug
          in: path
          required: true
          description: Numeric event id or event slug.
          schema:
            type: string
      responses:
        '200':
          description: Event found and publicly visible.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicEventResponse'
        '404':
          description: Event not found, or exists but is not publicly visible.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /public/tickets/{eventId}:
    get:
      operationId: publicTickets_listTypes
      summary: List buyable ticket tiers for a public event
      description: >-
        Public, unauthenticated ticket browsing for an event's public page. Only returns ticket
        types with status = on_sale whose sales window (sales_start/sales_end) currently includes
        now, each annotated with live availability from TicketingService::availableQuantity() (which
        already accounts for other buyers' active inventory holds). Requires the event to have
        public_visibility = 1 AND ticketing_mode = 'internal' — otherwise this endpoint responds 404
        as if the event does not exist, keeping externally-ticketed events invisible here.
      tags:
        - Public Ticketing
      security: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Buyable ticket tiers.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicTicketListResponse'
        '404':
          description: Event not found, not publicly visible, or not using in-house ticketing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      operationId: publicTickets_checkout
      summary: Create a ticket order and start hosted checkout
      description: >-
        Public checkout entry point. Validates buyer_name/buyer_email and the requested items
        against live on-sale inventory (each type must be status=on_sale and within its sales
        window; requested quantity per type is clamped to 20 and cannot exceed live availability,
        else 409), then atomically inserts a 'pending' ticket_orders row plus ticket_order_items
        with a 15-minute inventory hold (hold_expires_at), starts a hosted checkout session with
        whichever payment provider is currently active (see Payment Settings), and persists the
        provider + provider_ref on the order for later webhook/refund matching. Returns the hosted
        checkout_url the buyer's browser should redirect to; the order is fulfilled (tickets issued
        and emailed) asynchronously when the payment provider's webhook confirms payment — see POST
        /webhooks/{provider}. If checkout cannot be started with the provider, the pending
        order/hold is released (canceled) and an error is returned.
      tags:
        - Public Ticketing
      security: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublicTicketCheckoutRequest'
      responses:
        '200':
          description: Checkout session created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicTicketCheckoutResponse'
        '404':
          description: Event not found, not publicly visible, or not using in-house ticketing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: A requested ticket type no longer has enough availability.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: >-
            Missing/invalid buyer info, no items selected, a selected type is not on sale, or mixed
            currencies.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Order could not be created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '502':
          description: Payment could not be started with the active provider.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /events/{eventId}/ticketing:
    get:
      operationId: ticketing_getDashboard
      summary: Get the event's ticketing dashboard
