        id:
          type: integer
        table_name:
          type: string
        pk_column:
          type: string
        pk_value:
          type: string
        action:
          type: string
          enum:
            - INSERT
            - UPDATE
            - DELETE
        actor:
          type: string
          nullable: true
          description: e.g. "user:12", or the CLI/anonymous actor for unauthenticated writes.
        created_at:
          type: string
          format: date-time
        undone_at:
          type: string
          format: date-time
          nullable: true
        undone_by_actor:
          type: string
          nullable: true
        undo_of_id:
          type: integer
          nullable: true
          description: Set on the entry produced BY an undo, pointing back at the entry it undid.
        changed_fields:
          type: array
          description: Only populated for UPDATE rows.
          items:
            $ref: '#/components/schemas/DbHistoryChangedField'
    DbHistoryEntryDetail:
      allOf:
        - $ref: '#/components/schemas/DbHistoryEntrySummary'
        - type: object
          properties:
            old_row:
              type: object
              nullable: true
              additionalProperties: true
            new_row:
              type: object
              nullable: true
              additionalProperties: true
            undo_sql:
              type: string
              description: >-
                The exact SQL statement that undo would execute (server-generated from historical
                values).
            undo_result:
              type: object
              nullable: true
              description: >-
                Present only when this entry has already been undone — the db_history entry that
                resulted from undoing it.
              properties:
                id:
                  type: integer
                created_at:
                  type: string
                  format: date-time
                actor:
                  type: string
                  nullable: true
    DbHistoryUndoResult:
      type: object
      properties:
        ok:
          type: boolean
        undone_id:
          type: integer
        result_entry_id:
          type: integer
          nullable: true
          description: >-
            id of the new db_history entry created by executing undo_sql (the reverse write) — this
            is the id to call undo on again to "redo".
    MessageRecipient:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
    Message:
      type: object
      description: Full message row (GET /api/messages/{id}).
      properties:
        id:
          type: integer
        sender_user_id:
          type: integer
          nullable: true
          description: Null for system-generated notifications fanned out from outgoing email.
        recipient_user_id:
          type: integer
        recipient_email:
          type: string
        subject:
          type: string
        body_text:
          type: string
          nullable: true
        body_html:
          type: string
          nullable: true
        template:
          type: string
          nullable: true
        in_reply_to_id:
          type: integer
          nullable: true
        outbox_id:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time
        read_at:
          type: string
          format: date-time
          nullable: true
        archived_at:
          type: string
          format: date-time
          nullable: true
        sender_name:
          type: string
          nullable: true
        sender_email:
          type: string
          nullable: true
        recipient_name:
          type: string
          nullable: true
    MessageListItem:
      type: object
      description: >-
        List-view row; shape varies slightly by `box` — sent rows carry
        recipient_name/recipient_email and omit archived_at, inbox/archive rows carry
        sender_name/sender_email and archived_at.
      properties:
        id:
          type: integer
        created_at:
          type: string
          format: date-time
        subject:
          type: string
        template:
          type: string
          nullable: true
        read_at:
          type: string
          format: date-time
          nullable: true
        archived_at:
          type: string
          format: date-time
          nullable: true
          description: Present for box=inbox|archive only.
        sender_user_id:
          type: integer
          nullable: true
          description: Present for box=inbox|archive only.
        sender_name:
          type: string
          nullable: true
          description: Present for box=inbox|archive only.
        sender_email:
          type: string
          nullable: true
          description: Present for box=inbox|archive only.
        recipient_user_id:
          type: integer
          description: Present for box=sent only.
        recipient_name:
          type: string
          nullable: true
          description: Present for box=sent only.
        recipient_email:
          type: string
          nullable: true
          description: Present for box=sent only.
    MessageComposeInput:
      type: object
      required:
        - body
      properties:
        recipient_user_ids:
          type: array
          items:
            type: integer
          description: >-
            Preferred over recipient_user_id; used when present (even if empty, in which case
            recipient_user_id is NOT consulted as a fallback).
        recipient_user_id:
          type: integer
          description: Single-recipient convenience form; only consulted when recipient_user_ids is absent.
        subject:
          type: string
          description: Defaults to "(no subject)" when blank.
        body:
          type: string
          description: Required; 422 if blank after trimming.
        in_reply_to_id:
          type: integer
          nullable: true
    MessageActionResult:
      type: object
      properties:
        id:
          type: integer
        archived:
          type: boolean
          description: Present on the archive/unarchive actions.
        read:
          type: boolean
          description: Present on the read/unread actions.
    FeedIndex:
      type: object
      properties:
        feeds:
          type: object
          properties:
            ics:
              type: string
              format: uri
            rss:
              type: string
              format: uri
            json:
              type: string
              format: uri
        params:
          type: object
          description: Documents the accepted query params and their types (fixed shape).
          properties:
            venue:
              type: string
              example: slug
            days:
              type: string
              example: int
            past:
              type: string
              example: 0|1
            limit:
              type: string
              example: int
        upcoming:
          type: integer
          description: Count of events matched by the current request's filters.
    WidgetEventsFeed:
      type: object
      description: Response body of GET /api/feed/events.json.
      properties:
        venue:
          type: object
          properties:
            name:
              type: string
              nullable: true
            city:
              type: string
              nullable: true
            state:
              type: string
              nullable: true
        generated_at:
          type: string
          format: date-time
        events:
          type: array
          items:
            $ref: '#/components/schemas/WidgetEvent'
    WidgetEvent:
      type: object
      description: >-
        One event shaped for <mab-events-carousel>. `month`/`day`/`weekday` are pre-formatted
        (e.g. "JUL"/"11"/"SAT") to match themab.org's <div class="mab-date-block"> spans exactly.
        `tags` comes from events.public_tags (comma-separated in the DB, split here) and drives the
        widget's category filter pills — values are free-form venue-chosen slugs like "live-music",
        "comedy", "dance", not the operational event_type enum. `schedule_pricing`, when present,
        renders as a collapsible "Schedule & Pricing" panel (only the recurring Cat's Corner series
        uses this today).
      properties:
        id:
          type: integer
        slug:
          type: string
        venue:
          type: string
          description: Room/venue name (venues.name) this event belongs to — lets a multi-room feed consumer group or filter by room.
        title:
          type: string
        subtitle:
          type: string
          nullable: true
          description: events.public_subtitle — short line under the date badge.
        description:
          type: string
          nullable: true
          description: events.description_public.
        date:
          type: string
          format: date
        month:
          type: string
          nullable: true
          example: JUL
        day:
          type: string
          nullable: true
          example: '11'
        weekday:
          type: string
          nullable: true
          example: SAT
        doors_time:
          type: string
          nullable: true
          example: 7:00 PM
        show_time:
          type: string
          nullable: true
          example: 8:00 PM
        age_restriction:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
          example:
            - live-music
            - dance
        image:
          type: string
          format: uri
          nullable: true
          description: Approved flyer asset URL (event_assets), absolute — may be hosted off-app (e.g. themab.org's own media library).
        schedule_pricing:
          type: object
          nullable: true
          description: Parsed events.public_schedule_pricing JSON.
          properties:
            sections:
              type: array
              items:
                type: object
                properties:
                  heading:
                    type: string
                  lines:
                    type: array
                    items:
                      type: string
        url:
          type: string
          format: uri
          description: Public event page (event.html?id=...).
        ticket:
          type: object
          properties:
            mode:
              type: string
              enum:
                - external
                - internal
                - none
            url:
              type: string
              format: uri
              nullable: true
              description: Set when mode=external (events.ticket_url).
            checkout_url:
              type: string
              format: uri
              nullable: true
              description: Set when mode=internal — the public event page, embeddable in an iframe/modal for in-house ticket checkout.
    InviteAcceptPreview:
      type: object
      properties:
        invite:
          type: object
          properties:
            id:
              type: integer
            email:
              type: string
            role:
              type: string
            expires_at:
              type: string
              format: date-time
            event_title:
              type: string
            event_date:
              type: string
              format: date
    InviteAcceptResult:
      type: object
      properties:
        event_id:
          type: integer
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
          example: 3600
        user:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
            email:
              type: string
            role:
              type: string
        capabilities:
          type: object
          description: >-
            Global capability map for the newly-issued session (BaseEndpoint::globalCapabilities),
            keyed by capability name.
          additionalProperties:
            type: boolean
    SuperAdminUser:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
          format: email
        display_name:
          type: string
    SuperVenue:
      type: object
      description: One entry in the public login-picker directory.
      properties:
        slug:
          type: string
        name:
          type: string
        domain:
          type: string
        login_url:
          type: string
          format: uri
          description: >-
            `http://` for local/dev hostnames (localhost, *.localhost, *.test, *.lvh.me, 127.*,
            ::1), `https://` otherwise.
    SuperDomain:
      type: object
      properties:
        id:
          type: integer
        tenant_id:
          type: integer
        domain:
          type: string
        is_primary:
          type: boolean
        created_at:
          type: string
          format: date-time
    SuperTenant:
      type: object
      properties:
        id:
          type: integer
        slug:
          type: string
        name:
          type: string
        database_name:
          type: string
        admin_name:
          type: string
          nullable: true
        admin_email:
          type: string
          format: email
          nullable: true
        status:
          type: string
          enum:
            - active
            - suspended
            - provisioning
        created_at:
          type: string
          format: date-time
        domains:
          type: array
          description: >-
            Present on every response except the immediate result of `POST /api/super/tenants`
            (create), which returns the bare row with no `domains` key yet.
          items:
            $ref: '#/components/schemas/SuperDomain'
    SuperSeeded:
      type: object
      nullable: true
      description: >-
        Only present when this provisioning call actually seeded a brand-new, empty tenant with demo
        data and an initial admin login (a "Re-provision" against a tenant that already has data
        returns no `seeded` key). This is the only time the admin's initial password is ever
        transmitted in plaintext -- share it with them out-of-band; it is not stored anywhere and
        will not be returned again.
      properties:
        admin_email:
          type: string
          format: email
        admin_password:
          type: string
  parameters:
    EventIdPath:
