      description: >-
        Requires the `manage_campaigns` global capability. Multipart upload, field name `csv`, max
        5MB and 5000 data rows (422 above either limit), must have a `.csv` extension AND a
        plausible CSV/text MIME type. Requires an `email` column (matched case-insensitively against
        `email`/`e-mail`); optional `first_name`, `last_name`, `phone`, and an opt-in column
        (`marketing_opted_in`/`opted_in`/`subscribed`/`opt_in`) are recognized by flexible header
        aliases. Runs synchronously in one request (no job queue exists). Existing contacts are
        matched/updated by email; new ones are created with `source='csv_import'`. A missing opt-in
        column never changes an existing contact's `marketing_opted_in`. Bad rows (missing/invalid
        email) are recorded as per-row errors (capped at 50) and skipped rather than failing the
        whole upload; all successfully resolved contacts (created or matched) are then added to the
        list with `added_via='csv_import'`.
      tags:
        - Mailing Lists
      parameters:
        - $ref: '#/components/parameters/MailingListIdPath'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - csv
              properties:
                csv:
                  type: string
                  format: binary
                  description: CSV file with a header row; must include an "email" column.
      responses:
        '200':
          description: Import result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MailingListImportResult'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Missing the manage_campaigns capability.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Mailing list not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Upload/size/type error, empty file, missing email column, or too many rows.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: The uploaded file could not be read on the server.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /mailing-lists/{listId}/refresh:
    post:
      operationId: mailing_lists_refresh
      summary: Re-run a smart (segment) list's saved rules and sync membership
      description: >-
        Requires the `manage_campaigns` global capability. Only valid for `list_type=segment` (422
        for a `static` list). Re-resolves `segment_rules` (capped at 2000 matches, 422 above that),
        then diffs against the list's current `added_via='segment'` members: upserts new matches and
        deletes members that no longer match. Manually-added, bulk-added, or CSV-imported members
        (any `added_via` other than `segment`) are never touched by a refresh. There is no
        scheduled/cron refresh — this is the only way segment membership changes outside of list
        creation or a rule edit via PATCH.
      tags:
        - Mailing Lists
      parameters:
        - $ref: '#/components/parameters/MailingListIdPath'
      responses:
        '200':
          description: Sync result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MailingListRefreshResult'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Missing the manage_campaigns capability.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Mailing list not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: List is not a segment list, or too many contacts matched.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/contracts:
    get:
      operationId: contracts_list
      summary: List contracts
      description: >-
        Venue admins with the global `view_all_contracts` capability see every contract. Everyone
        else sees only contracts they created plus event-scoped contracts for events they have
        `view_contracts` access to (via event ownership/collaboration). Also returns supporting
        lookup data (active templates, valid types/statuses, venues) so the deal-builder UI can
        populate its "new contract" form in one call.
      tags:
        - Contracts
      responses:
        '200':
          description: List of contracts plus lookup data.
          content:
            application/json:
              schema:
                type: object
                properties:
                  contracts:
                    type: array
                    items:
                      $ref: '#/components/schemas/ContractListItem'
                  templates:
                    type: array
                    items:
                      $ref: '#/components/schemas/ContractTemplateSummary'
                  types:
                    type: array
                    items:
                      type: string
                  statuses:
                    type: array
                    items:
                      type: string
                  venues:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        name:
                          type: string
                  can_create_standalone:
                    type: boolean
                    description: >-
                      True if the caller is a venue admin and may create a venue-level (non-event)
                      contract.
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      operationId: contracts_create
      summary: Create a contract
      description: >-
        Creates a new draft contract. If `event_id` is supplied, the caller needs the
        `manage_contracts` event capability for that event, and the venue is inferred from the event
        when `venue_id` is omitted. Without `event_id` (a standalone venue-level contract) the
        caller must be a `venue_admin`. `title` defaults to "Untitled Contract" when blank;
        `contract_type` falls back to `other` when not one of the valid types. If `template_id` is
        given, sections are built from that template immediately.
      tags:
        - Contracts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContractCreateRequest'
      responses:
        '200':
          description: Contract created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
        '403':
          description: Not a venue admin, or missing manage_contracts on the event.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/contracts/{contractId}:
    get:
      operationId: contracts_get
      summary: Get a contract with rendered preview, sections, and status
      description: >-
        Returns the full deal-builder payload: the contract row, its sections (clauses), a
        live-rendered HTML/summary preview, any missing required terms, deal-risk hints, and (only
        for callers with `manage_contracts`) the signer roster. Requires `view_contracts` on the
        event (or, for standalone contracts, being the creator or a venue admin).
      tags:
        - Contracts
      parameters:
        - name: contractId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Full contract detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContractShowResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Contract not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    patch:
      operationId: contracts_update
      summary: Update deal terms, counterparty, and variables
      description: >-
        Updates any subset of the contract's deal-term columns (rental fee, deposit, door splits,
        term dates, etc.), title/type/counterparty/internal_notes, and the free-form
        `variables_json` bag. After saving, the smart clause-selection engine re-runs
        (`ContractService::reevaluate`) so auto-selected sections stay consistent with the new
        terms; `reevaluated` in the response is the count of sections that changed. Requires
        `manage_contracts`.
      tags:
        - Contracts
      parameters:
        - name: contractId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContractUpdateRequest'
      responses:
        '200':
          description: Contract updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  reevaluated:
                    type: integer
                    description: Number of sections whose auto-inclusion changed.
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Contract not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      operationId: contracts_delete
      summary: Delete a contract
      description: >-
        Permanently deletes the contract (and, via FK cascade, its sections, signers, versions, and
        audit log). Requires `manage_contracts`.
      tags:
        - Contracts
      parameters:
        - name: contractId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Deleted.
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Contract not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/contracts/{contractId}/render:
    post:
      operationId: contracts_renderVersion
      summary: Render a new immutable contract version
      description: >-
        Renders the currently-included sections to HTML/text, snapshots the token values, and stores
        it as a new row in `contract_versions` (version numbers increment per contract). The
        contract's `current_version_id` is updated to point at it. A version must exist before the
        contract can be sent for signature or marked `sent`/`signed`. Requires `manage_contracts`.
      tags:
        - Contracts
      parameters:
        - name: contractId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: New version created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  version_number:
                    type: integer
                  html:
                    type: string
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Contract not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/contracts/{contractId}/pdf:
    get:
      operationId: contracts_exportPdf
      summary: Export the live contract preview as a PDF
      description: >-
        Renders the current (possibly unsent/unsaved-version) preview through wkhtmltopdf and
        streams it back as `application/pdf`. Unlike most contract sub-actions this only requires
        view access (`view_contracts` capability or ownership) — no `manage_contracts` needed, since
        it's a read-only export of what `contracts_get` already exposes as `preview_html`.
      tags:
        - Contracts
      parameters:
        - name: contractId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: PDF bytes.
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Contract not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: wkhtmltopdf rendering failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/contracts/{contractId}/versions/{versionId}:
    get:
      operationId: contracts_getVersion
      summary: Get a past contract version's rendered snapshot
      description: >-
        Returns one immutable historical version (HTML/text/token snapshot). Requires view access
        only (`view_contracts` or ownership) — same as `contracts_get`.
      tags:
        - Contracts
      parameters:
        - name: contractId
          in: path
          required: true
          schema:
            type: integer
        - name: versionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: The version.
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    $ref: '#/components/schemas/ContractVersion'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Contract or version not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/contracts/{contractId}/status:
    post:
      operationId: contracts_changeStatus
      summary: Change the contract's workflow status
      description: >-
        Advances or otherwise changes `status` along the contract status ladder (see
        `ContractRenderer::STATUSES`). Setting `approved` requires the `approve_contracts`
        capability in addition to `manage_contracts`. Setting `sent` or `signed` first verifies
        there are no missing required terms (422 with a `missing` array if not) and that at least
        one rendered version exists. Requires `manage_contracts`.
      tags:
        - Contracts
      parameters:
        - name: contractId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContractStatusRequest'
      responses:
        '200':
          description: Status changed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  status:
                    type: string
        '403':
          description: Forbidden (not manage_contracts, or approve_contracts required for approving).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Contract not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: >-
            Invalid status, or missing required terms / no rendered version yet when targeting
            sent/signed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/contracts/{contractId}/apply-template:
    post:
      operationId: contracts_applyTemplate
      summary: (Re)build sections from a template
      description: >-
        Rebuilds the contract's sections from the given template's clause wiring (see
        `ContractService::buildSectionsFromTemplate`) and updates `contract_type` to match the
        template's type. Requires `manage_contracts`.
      tags:
        - Contracts
      parameters:
        - name: contractId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContractApplyTemplateRequest'
      responses:
        '200':
          description: Sections rebuilt.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Contract or template not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/contracts/{contractId}/reevaluate:
    post:
      operationId: contracts_reevaluate
      summary: Re-run smart module (clause) selection
      description: >-
        Re-evaluates each section's `include_when` condition against the contract's current deal
        terms/variables and flips `included` accordingly, without changing any of the terms
        themselves. Returns the count of sections that changed. Requires `manage_contracts`.
      tags:
        - Contracts
      parameters:
        - name: contractId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Reevaluated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  reevaluated:
                    type: integer
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Contract not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/contracts/{contractId}/sections:
    post:
      operationId: contracts_addSection
      summary: Add a contract section
      description: >-
        Adds a section either from a clause-library module (pass `module_id`; the module's
        body/title/lock/risk are copied in) or as a free-form custom section (`title` +
        `body_template`, title defaults to "Custom Section"). New sections are appended after the
        current highest `sort_order` and included by default. Requires `manage_contracts`.
      tags:
        - Contracts
      parameters:
        - name: contractId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContractSectionCreateRequest'
      responses:
        '200':
          description: Section created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Contract not found, or module_id doesn't exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    patch:
      operationId: contracts_bulkUpdateSections
      summary: Bulk-update sections (include flag, order, title, body)
      description: >-
        Applies a batch of per-section field updates (`included`, `sort_order`, `title`,
        `body_template`) in a single call — used by the section reordering/editing UI. Locked legal
        clauses (`is_locked`) silently ignore attempts to change `included`, `title`, or
        `body_template` unless the caller is a venue admin; `sort_order` may still be changed on
        locked sections by anyone with manage access. Requires `manage_contracts`.
      tags:
        - Contracts
      parameters:
        - name: contractId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContractSectionsBulkUpdateRequest'
      responses:
        '200':
          description: Sections updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Contract not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/contracts/{contractId}/sections/{sectionId}:
    delete:
      operationId: contracts_deleteSection
      summary: Remove a contract section
      description: >-
        Deletes a section. Locked legal clauses can only be removed by a venue admin (403
        otherwise). Requires `manage_contracts`.
      tags:
        - Contracts
      parameters:
        - name: contractId
          in: path
          required: true
          schema:
            type: integer
        - name: sectionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Deleted.
        '403':
          description: Forbidden — locked sections require a venue admin, or caller lacks manage_contracts.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Contract or section not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/contracts/{contractId}/email-pdf:
    post:
      operationId: contracts_emailPdf
      summary: Email the current contract preview PDF as an attachment
      description: >-
        Renders the live preview to PDF and emails it to the given address (independent of the
        counterparty email on the contract — always taken from the request body). Logged to the
        contract audit log as `pdf_emailed`. Requires `manage_contracts`.
      tags:
        - Contracts
      parameters:
        - name: contractId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContractEmailPdfRequest'
      responses:
        '200':
          description: Emailed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  email:
                    type: string
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Contract not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Missing or invalid recipient email address.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: PDF generation or mail send failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/contracts/{contractId}/send:
    post:
      operationId: contracts_send
      summary: Send the contract for e-signature
      description: >-
        Creates signer records (from the request body, or from the contract's counterparty if
        `signers` is omitted), generates a per-signer signing token (only the sha256 hash is
        persisted; TTL is `SIGNATURE_TOKEN_TTL_HOURS`, default 168h/7 days), emails each signer a
        `/sign.html?token=...` link, voids any previously pending signers on this contract (re-send
        scenario), attempts to create an envelope with the configured external signature provider
        (best-effort — failures are logged to the audit log but do not fail the request), sets
        contract status to `sent`, and notifies venue admins. Requires an existing rendered version.
        Cannot be used on a `fully_executed`, `voided`, or `canceled` contract. Requires
        `manage_contracts`.
      tags:
        - Contracts
      parameters:
        - name: contractId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContractSendRequest'
      responses:
        '200':
          description: Sent for signature.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Contract not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: >-
            Contract not sendable in its current state, no rendered version exists, or no
            signers/counterparty email available.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/contracts/{contractId}/resend:
    post:
      operationId: contracts_resend
      summary: Resend signing links to unsigned signers
      description: >-
        Regenerates signing tokens and re-sends the signing email for every signer still in `sent`,
        `viewed`, or `pending` status. Not allowed for `fully_executed`, `voided`, `canceled`, or
        `draft` contracts, or when there are no unsigned signers. Requires `manage_contracts`.
      tags:
        - Contracts
      parameters:
        - name: contractId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Links resent.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  resent:
                    type: integer
                    description: Number of signers re-emailed.
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Contract not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Contract state does not allow resending, or no unsigned signers.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/contracts/{contractId}/void:
    post:
      operationId: contracts_void
      summary: Void the contract
      description: >-
        Marks the contract `voided`, invalidates every pending signer's token (nulls the hash +
        expiry), appends a `contract_voided` audit entry, and notifies venue admins with the
        optional reason. Not allowed once already `fully_executed` or `voided`. Requires
        `manage_contracts`.
      tags:
        - Contracts
      parameters:
        - name: contractId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContractVoidRequest'
      responses:
        '200':
          description: Voided.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Contract not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Contract is already fully_executed or voided.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/contracts/{contractId}/countersign:
    post:
      operationId: contracts_countersign
      summary: Record the venue's countersignature
      description: >-
        Records the venue-side signature directly for the already-authenticated admin (no magic link
        needed) by upserting a `role='venue'` `contract_signers` row. Only allowed when the contract
        is in `sent`, `viewed`, `partially_signed`, `signed_by_client`, or already `countersigned`
        status. If this was the last unsigned signer, the contract is finalized to `fully_executed`,
        the final signed PDF is rendered/hashed/stored, and (for event-linked contracts) the event
        status advances to `booked`. Otherwise the contract moves to `countersigned`. Requires the
        `approve_contracts` capability (not just `manage_contracts` — countersigning is treated as
        an approval action).
      tags:
        - Contracts
      parameters:
        - name: contractId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContractCountersignRequest'
      responses:
        '200':
          description: Countersigned.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        '403':
          description: Forbidden — only approvers (approve_contracts) can countersign.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Contract not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: >-
            Signer name is required (and no fallback available), or contract cannot be countersigned
            in its current state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/contracts/{contractId}/audit:
    get:
      operationId: contracts_auditLog
      summary: Get the contract's immutable audit log
      description: >-
        Returns every recorded action (sent, viewed, signed, declined, voided, countersigned, PDF
        generated/emailed, webhook events, etc.) in chronological order, joined with the signer's
        name/email/role where applicable. The stored `user_agent` is intentionally stripped before
        returning to the admin UI. Requires `manage_contracts`.
      tags:
        - Contracts
      parameters:
        - name: contractId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Audit log entries.
          content:
            application/json:
              schema:
                type: object
                properties:
                  audit_log:
                    type: array
                    items:
                      $ref: '#/components/schemas/ContractAuditLogEntry'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Contract not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/contracts/{contractId}/download:
    get:
      operationId: contracts_downloadFinalPdf
      summary: Download the final, fully-executed signed PDF
      description: >-
        Streams the stored final signed PDF (generated once all signers have signed) from disk.
        Appends a `contract_previewed` audit entry. Returns 404 if no final PDF has been generated
        yet, or if the stored file is missing on disk. Requires `manage_contracts`.
      tags:
        - Contracts
      parameters:
        - name: contractId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: PDF bytes.
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Contract not found, no final PDF generated yet, or the file is missing on disk.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/contracts/{contractId}/signers:
    get:
      operationId: contracts_listSigners
      summary: List signers for a contract
      description: >-
        Returns all signer records for the contract (signing token hashes are never exposed).
        Requires `manage_contracts`.
      tags:
        - Contracts
      parameters:
        - name: contractId
          in: path
