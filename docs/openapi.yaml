          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Unknown payment provider, or currency is not a 3-letter ISO code.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /promote/events:
    get:
      operationId: promoteCampaign_list
      summary: List events with Panic Promote activity
      description: >-
        Returns up to 200 events (most recent 200 by date) scoped to the caller: venue_admin and
        global_viewer roles see every event, everyone else sees only events they own or collaborate
        on (BaseEndpoint::eventScopeSql). No explicit capability check is applied beyond
        authentication — access is enforced purely by the ownership/collaborator scope filter, not
        by requireEventCapability. Each row is a LEFT JOIN of `events` with `promote_settings` (so
        `promote_status`/`goal_tickets` are null for events that have never had Promote settings
        saved) plus COUNT subqueries for posts and broadcasts.
      tags:
        - Promote
      responses:
        '200':
          description: List of events with their promote status summary.
          content:
            application/json:
              schema:
                type: object
                properties:
                  events:
                    type: array
                    items:
                      $ref: '#/components/schemas/PromoteCampaignListItem'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
