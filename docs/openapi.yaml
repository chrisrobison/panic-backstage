  /promote/credentials/{destKey}:
    put:
      operationId: promoteCredential_upsert
      summary: Save or update a platform credential
      description: >-
        Upserts `promote_credentials` for (venue_id, destKey). All body fields are optional — only
        provided fields are updated (existing config/tokens are preserved otherwise). `destKey` must
        reference an existing `promote_destinations` row (404 if unknown). Tokens are encrypted at
        rest via Panic\CredentialEncryption when `CREDENTIAL_ENCRYPTION_KEY` is configured, else
        stored in plaintext as a dev-mode fallback. Saving a non-empty `access_token` also flips the
        corresponding `promote_destinations.status` row to `connected` so the broadcast modal
        reflects reality immediately. This same storeCredential() path is used internally by the
        Twitter OAuth callback (below), so a real "Connect" flow and a manually-pasted token produce
        identical rows. Gated by the `manage_users` global capability (venue_admin only).
      tags:
        - Promote
      parameters:
        - $ref: '#/components/parameters/PromoteDestKey'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PromoteCredentialUpsertRequest'
      responses:
        '200':
          description: Save result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromoteCredentialUpsertResponse'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Caller lacks the manage_users global capability.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Unknown destination_key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: destination_key missing from the path, or config is not a JSON object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      operationId: promoteCredential_disconnect
      summary: Disconnect a platform credential
      description: >-
        Clears stored tokens (plaintext and encrypted) and resets both `promote_credentials.status`
        and the matching `promote_destinations.status` back to `needs_auth` for this destKey. Note
        this UPDATE is not scoped to a venue_id in the SQL — it clears the credential row(s)
        matching destKey regardless of venue. Gated by the `manage_users` global capability
        (venue_admin only). Always returns 200 with `{"disconnected": true}`, even if no credential
        existed for this destKey.
      tags:
        - Promote
      parameters:
        - $ref: '#/components/parameters/PromoteDestKey'
      responses:
        '200':
          description: Disconnected.
          content:
            application/json:
              schema:
                type: object
                properties:
                  disconnected:
                    type: boolean
                    example: true
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Caller lacks the manage_users global capability.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: destination_key missing from the path.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
