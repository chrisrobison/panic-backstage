              schema:
                $ref: '#/components/schemas/Error'
    patch:
      operationId: contractTemplates_update
      summary: Update a template (optionally replacing its module wiring)
      description: >-
        When the body includes a `modules` array, the template's entire clause wiring
        (`contract_template_modules`) is deleted and rebuilt from it — omit `modules` to update only
        name/description/type/etc. without touching wiring. Requires the global
        `manage_contract_library` capability.
      tags:
        - Contract Templates
      parameters:
