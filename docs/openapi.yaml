  /promote/events/{eventId}/posts/{postId}/action/{destKey}/send:
    post:
      operationId: promoteAction_send
      summary: Send the destination's variant copy by server email
      description: >-
        Fires a real side effect: sends an email via PHP `mail()` from `events@panicbooking.com`
        (not a queued/adapter call — synchronous, best-effort, no retry). Subject/body come from the
        matching channel variant, falling back to the post's own title/master_text if no variant
        exists. The recipient is `to` from the request body if given, else the destination's stored
        `contact_email` config; a 422 is returned if neither resolves to a valid address, and a 422
        if there is no content to send at all. A 500 is returned if the host's mail transport
        (sendmail/postfix) is not configured — this is a real infra dependency, not a stub. Requires
        the `edit_event` event capability. Logs a `promote_action_email_sent` activity entry on
        success.
