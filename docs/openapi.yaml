                              $ref: '#/components/schemas/ContractTemplateModule'
                  modules:
                    type: array
                    items:
                      $ref: '#/components/schemas/ContractModuleSummary'
                  types:
                    type: array
                    items:
                      type: string
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
