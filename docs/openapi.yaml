openapi: 3.0.3
info:
  title: Panic Backstage API
  version: 1.0.0
  description: |
    JSON API for **Panic Backstage** — a venue/event-operations system covering
    the full lifecycle of a show: lead intake, booking, contracts and
    e-signature, day-of run sheets, ticketing, promotion, settlement, and
    closeout.

    ## Conventions

    - All request/response bodies are `application/json` unless noted
      otherwise (a handful of routes return `text/html`, `text/calendar`,
      `application/rss+xml`, `image/svg+xml`, `image/png`, or a file
      download).
    - Errors are `{"error": "<message>"}`, sometimes with extra fields, using
      the HTTP status code to signal the category (401 not authenticated, 403
      forbidden/capability gate failed, 404 not found, 409 conflict, 422
      validation error, 500 server error).
    - Most routes require a Bearer JWT (see **Authentication** below) *and* a
      role/capability check performed inside the endpoint — operations note
      the specific capability required where one applies. Capabilities come
      in two flavors: **global** (`venue_admin`-style, venue-wide) and
      **event** (scoped to one event, granted via ownership or a
      per-event collaborator role — see README "Roles And Collaborator
      Access").
    - A number of routes are intentionally public/unauthenticated: booking
      inquiry email intake is out of scope here, but contract e-signature
      links, ticket purchase, ticket/QR display, calendar/RSS feeds, webhook
      receivers, and the client portal all use their own token- or
      signature-based verification instead of the staff JWT — each such
      operation says so explicitly.
    - This spec is maintained by hand alongside `src/Kernel.php` (the actual
      router) — if you add or change a route, please update the matching
      section here in the same change.

    ## Authentication

    Staff-facing routes use a stateless HS256 JWT passed as
    `Authorization: Bearer <token>`, issued by `POST /api/auth/login` (or the
    magic-link / passkey flows under `/api/auth/*`) and good for 60 minutes;
    pair it with the refresh-token flow to stay signed in longer. A token is
    immediately invalidated venue-wide if the user's `token_version` is
    bumped (e.g. on password change), even before it expires.

    The separate `/api/super/*` surface (multi-tenant SaaS administration,
    off by default) uses an entirely different mechanism — a server-side PHP
    session cookie set by `POST /api/super/login` — see the **Super Admin**
    tag.
  contact:
    name: Panic Backstage
tags:
  - name: Auth
    description: Login, magic-link, passkey/WebAuthn, refresh, logout, and password/email verification flows.
  - name: Account
    description: GDPR self-service actions (export/delete/accept-privacy) on the signed-in user's own account.
  - name: Users
    description: Admin CRUD over staff login accounts, plus duplicate detection/merge.
  - name: Events
    description: The core event resource — create/list/get/update a show.
  - name: Event Tasks
    description: Per-event checklist/task items, including applying a task template.
  - name: Event Blockers / Open Items
    description: >-
      Blockers that must be cleared before an event is considered ready (also reachable at the
      `open-items` alias).
  - name: Event Lineup
    description: Performer/lineup entries for an event.
  - name: Event Schedule
    description: Day-of schedule entries for an event.
  - name: Event Assets
    description: Uploaded files/artwork for an event, plus AI flyer and public-page QR generation.
  - name: Event Invites
    description: >-
      Admin-side collaborator invite management for an event (create/list/resend). See "Invite
      Accept" for the public accept flow.
  - name: Event Guest List
    description: Door guest list management for an event.
  - name: Event Staffing
    description: Crew/staff assignment for an event, including auto-populate from capacity tiers.
  - name: Event Series
    description: Recurring-event series management.
  - name: Event Flyer & QR
    description: AI flyer generation and public-page QR code generation for an event.
  - name: Event Payments
    description: Deposit and payment records against an event, including the deposit gate.
  - name: Event Ledger
    description: >-
      The financial ledger (revenue/cost/payment line items) for an event, plus closeout
      finalize/reopen.
  - name: Event Settlement
    description: Post-show settlement view for an event.
  - name: Event Vendors
    description: Vendor tracking for an event, including COI (Certificate of Insurance).
  - name: Event Execution
    description: Live "run of night" execution records for an event.
  - name: Event Contracts (Link)
    description: >-
      Lightweight event-scoped view of the contracts linked to an event (the full deal-builder
      resource is under the "Contracts" tag).
  - name: Event Templates
    description: Reusable event templates used to pre-fill new events.
  - name: Venue Policy
    description: Versioned venue policy configuration (rooms, policy fields).
  - name: Venues
    description: Venues and their bookable resources/rooms.
  - name: Leads
    description: >-
      The lead pipeline — inquiries prior to becoming a booked event, including the deal evaluator
      and lead-to-event conversion.
  - name: CRM Profiles
    description: Longer-lived CRM profiles for bands/promoters/vendors, independent of any one event.
  - name: Contacts
    description: Marketing/CRM contacts used for campaigns and mailing lists.
  - name: Campaigns
    description: Email marketing campaigns.
  - name: Mailing Lists
    description: Static and smart (segment) mailing lists.
  - name: Contracts
    description: >-
      The deal-builder — contract documents, clauses, e-signature workflow, and the contract status
      ladder.
  - name: Contract Modules
    description: Admin-managed reusable contract clause library.
  - name: Contract Templates
    description: Admin-managed contract templates.
  - name: Contract Signing
    description: Public, token-authenticated contract e-signature flow (no staff JWT).
  - name: Contract Webhooks
    description: >-
      Inbound webhooks from e-signature providers (e.g. DropboxSign), authenticated by provider
      signature.
  - name: Client Portal
    description: Token-gated read-only event view shared with promoters/clients.
  - name: Ticketing
    description: >-
      Venue-staff ticketing management for an event — tiers, sales dashboard, issued tickets, comps,
      refunds.
  - name: Public Events
    description: Public read-only event page data.
  - name: Public Ticketing
    description: Public ticket browsing and checkout.
  - name: Scanner
    description: >-
      Door-scanner ticket redemption (scanner-token auth) and staff management of scanner links
      (JWT).
  - name: Ticket View
    description: Public, token-authenticated single-ticket HTML view (the page a phone camera opens).
  - name: QR Codes
    description: Public on-the-fly QR code image generation.
  - name: Payment Webhooks
    description: >-
      Inbound webhooks from payment providers (Stripe/Square) and Square POS, authenticated by
      provider signature.
  - name: POS Location Map
    description: Admin mapping of POS terminal locations to the active event.
  - name: Payment Settings
    description: Global payment-provider configuration (admin).
  - name: Promote
    description: >-
      Panic Promote — the social/event promotion sub-app (campaigns, posts, broadcasts,
      destinations, analytics, credentials).
  - name: Dashboard
    description: The landing-page summary/KPI view.
  - name: Wizard Defaults
    description: Admin-configurable defaults for the event-creation wizard.
  - name: Staff Roster
    description: The venue's staff roster.
  - name: Systems Inventory
    description: Venue equipment/systems tracking, including renewal dates.
  - name: Outbox
    description: Sent-mail log.
  - name: Database Browser
    description: Read-only tenant database inspector (admin).
  - name: DB History
    description: Audit-trigger change log with undo/redo (admin).
  - name: Messages
    description: In-app staff messaging (inbox/archive/sent).
  - name: Feeds
    description: Public calendar/RSS syndication of publicly-visible events.
  - name: Invite Accept
    description: Public collaborator invite-acceptance flow (token-authenticated, no staff JWT).
  - name: Super Admin
    description: >-
      Multi-tenant SaaS administration — off by default (only active when `SUPER_DB_NAME` is
      configured). Session-cookie authenticated, entirely separate from the staff Bearer JWT used
      everywhere else.
servers:
  - url: https://{host}/api
    description: >-
      A single-tenant install's own domain, or one SaaS tenant's own domain in multi-tenant mode. If
      the app is mounted under a sub-path (`APP_BASE_PATH`), include it in `host`'s path portion.
    variables:
      host:
        default: your-venue.example.com
security:
  - bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >-
        HS256 JWT, 60-minute lifetime, issued by `POST /api/auth/login` (and the magic-link/passkey
        equivalents). Send as `Authorization: Bearer <token>`. Immediately invalid venue-wide if the
        user's `token_version` has been bumped since issuance (e.g. a password change), even if the
        token hasn't expired yet.
    superAdminSession:
      type: apiKey
      in: cookie
      name: backstage_super_sid
      description: >-
        PHP server-side session cookie set by `POST /api/super/login`. Used ONLY by the
        `/api/super/*` multi-tenant administration surface — has no relationship to the staff Bearer
        JWT.
  schemas:
    Error:
      type: object
      description: The standard error envelope returned by every non-2xx JSON response in this API.
      required:
        - error
      properties:
        error:
          type: string
          description: Human-readable error message.
      additionalProperties: true
    AuthOkResponse:
      type: object
      required:
        - ok
      properties:
        ok:
          type: boolean
          example: true
    AuthCapabilities:
      type: object
      description: >-
        Map of global capability key -> whether the current user's role grants it. Keys observed in
        source: view_all_events, create_events, manage_templates, manage_users, manage_staff_roster,
        manage_contract_library, view_all_contracts, manage_contacts, manage_campaigns,
        manage_leads, view_leads, manage_crm_profiles, manage_venue_policy,
        manage_systems_inventory, admin_credential_encryption, reopen_settlement, manage_db_history.
      additionalProperties:
        type: boolean
    AuthUserSummary:
      type: object
      required:
        - id
        - name
        - email
        - role
        - has_password
        - has_passkey
        - hide_credential_setup_prompt
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          description: >-
            One of: venue_admin, event_owner, promoter, band, artist, designer, staff, viewer,
            global_viewer
        has_password:
          type: boolean
        has_passkey:
          type: boolean
        hide_credential_setup_prompt:
          type: boolean
    AuthTokenPair:
      type: object
      required:
        - access_token
        - refresh_token
        - expires_in
        - user
        - capabilities
      properties:
        access_token:
          type: string
          description: HS256 JWT, 90-day expiry
        refresh_token:
          type: string
          description: Opaque hex token, 180-day expiry, single use (revoked on next refresh/logout)
        expires_in:
          type: integer
          description: Access token lifetime in seconds (7776000 = 90 days)
        user:
          $ref: '#/components/schemas/AuthUserSummary'
        capabilities:
          $ref: '#/components/schemas/AuthCapabilities'
    AuthMagicLinkRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
    AuthTokenRequest:
      type: object
      required:
        - token
      properties:
        token:
          type: string
          description: Raw (unhashed) single-use token from the emailed link
    AuthVerifyStatusRequest:
      type: object
      properties:
        token:
          type: string
    AuthVerifyStatusResponse:
      type: object
      required:
        - valid
      properties:
        valid:
          type: boolean
        email:
          type: string
          format: email
        name:
          type: string
          nullable: true
        has_password:
          type: boolean
        has_passkey:
          type: boolean
    AuthVerifyEmailResponse:
      type: object
      required:
        - ok
        - email
      properties:
        ok:
          type: boolean
          example: true
        email:
          type: string
          format: email
    AuthLookupRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
    AuthLookupResponse:
      type: object
      required:
        - has_password
        - has_passkey
        - magic_link_eligible
      properties:
        has_password:
          type: boolean
        has_passkey:
          type: boolean
        name:
          type: string
          description: Only present when the email matches an existing user
        magic_link_eligible:
          type: boolean
          description: True if a magic-link request for this email would actually send mail
    AuthRequestAccessRequest:
      type: object
      required:
        - name
        - email
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        notes:
          type: string
    AuthRequestAccessResponse:
      type: object
      required:
        - ok
        - message
      properties:
        ok:
          type: boolean
          example: true
        message:
          type: string
    AuthLoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
    AuthSetPasswordRequest:
      type: object
      required:
        - password
      properties:
        password:
          type: string
          format: password
          minLength: 8
        current_password:
          type: string
          format: password
          description: Required (and verified) only if the account already has a password set
    AuthPasskeyCredentialDescriptor:
      type: object
      properties:
        type:
          type: string
          example: public-key
        id:
          type: string
          description: Base64url-encoded credential id
        transports:
          type: array
          items:
            type: string
    AuthPasskeyRegisterBeginResponse:
      type: object
      required:
        - challenge
        - rp
        - user
        - pubKeyCredParams
        - excludeCredentials
        - authenticatorSelection
        - timeout
        - attestation
      properties:
        challenge:
          type: string
          description: Base64url-encoded random challenge
        rp:
          type: object
          properties:
            name:
              type: string
            id:
              type: string
        user:
          type: object
          properties:
            id:
              type: string
              description: Base64url-encoded 4-byte big-endian user id
            name:
              type: string
              description: The user's email
            displayName:
              type: string
        pubKeyCredParams:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                example: public-key
              alg:
                type: integer
                description: COSE algorithm id (-7 = ES256, -257 = RS256)
        excludeCredentials:
          type: array
          items:
            $ref: '#/components/schemas/AuthPasskeyCredentialDescriptor'
        authenticatorSelection:
          type: object
          properties:
            authenticatorAttachment:
              type: string
              example: platform
            residentKey:
              type: string
              example: preferred
            requireResidentKey:
              type: boolean
            userVerification:
              type: string
              example: preferred
        timeout:
          type: integer
          example: 60000
        attestation:
          type: string
          example: none
    AuthWebauthnRegistrationResponse:
      type: object
      required:
        - clientDataJSON
        - attestationObject
      description: >-
        The `PublicKeyCredential.response` object from `navigator.credentials.create()`,
        base64url-encoded fields.
      properties:
        clientDataJSON:
          type: string
        attestationObject:
          type: string
        transports:
          type: array
          items:
            type: string
    AuthPasskeyRegisterCompleteRequest:
      type: object
      required:
        - response
      properties:
        response:
          $ref: '#/components/schemas/AuthWebauthnRegistrationResponse'
        name:
          type: string
          description: Friendly label for the passkey; defaults to "Passkey"
    AuthPasskeyLoginBeginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          description: Optional — narrows allowCredentials to this account's passkeys
    AuthPasskeyLoginBeginResponse:
      type: object
      required:
        - challenge
        - timeout
        - rpId
        - allowCredentials
        - userVerification
      properties:
        challenge:
          type: string
        timeout:
          type: integer
          example: 60000
        rpId:
          type: string
        allowCredentials:
          type: array
          items:
            $ref: '#/components/schemas/AuthPasskeyCredentialDescriptor'
        userVerification:
          type: string
          example: preferred
    AuthWebauthnAssertionResponse:
      type: object
      required:
        - clientDataJSON
        - authenticatorData
        - signature
      description: >-
        The `PublicKeyCredential.response` object from `navigator.credentials.get()`,
        base64url-encoded fields.
      properties:
        clientDataJSON:
          type: string
        authenticatorData:
          type: string
        signature:
          type: string
    AuthPasskeyLoginCompleteRequest:
      type: object
      required:
        - id
        - response
      properties:
        id:
          type: string
          description: Base64url-encoded credential id
        response:
          $ref: '#/components/schemas/AuthWebauthnAssertionResponse'
    AuthPasskeySummary:
      type: object
      required:
        - id
        - name
        - created_at
        - last_used_at
      properties:
        id:
          type: integer
        name:
          type: string
        created_at:
          type: string
          format: date-time
        last_used_at:
          type: string
          format: date-time
          nullable: true
    AuthListPasskeysResponse:
      type: object
      required:
        - passkeys
        - has_password
      properties:
        passkeys:
          type: array
          items:
            $ref: '#/components/schemas/AuthPasskeySummary'
        has_password:
          type: boolean
    AuthRemovePasskeyRequest:
      type: object
      required:
        - id
      properties:
        id:
          type: integer
    AuthUpdateProfileRequest:
      type: object
      required:
        - name
        - email
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
    AuthUpdateProfileResponse:
      type: object
      required:
        - ok
        - user
      properties:
        ok:
          type: boolean
          example: true
        user:
          type: object
          required:
            - id
            - name
            - email
            - phone
          properties:
            id:
              type: integer
            name:
              type: string
            email:
              type: string
              format: email
            phone:
              type: string
              nullable: true
    AuthUpdatePreferencesRequest:
      type: object
      description: All fields optional individually, but at least one must be present.
      properties:
        hide_credential_setup_prompt:
          type: boolean
        onboarding_dismissed:
          type: boolean
        default_landing:
          type: string
          enum:
            - dashboard
            - calendar
            - pipeline
            - events
            - templates
            - ''
          description: Empty string clears the override (falls back to the app default)
        nav_collapsed:
          type: boolean
        events_sort:
          type: string
          enum:
            - asc
            - desc
            - ''
        dashboard_metrics:
          type: array
          nullable: true
          description: >-
            Subset of known dashboard metric-card keys (newLeads, nextShow, openItems, empty,
            needsFlyer, unsettled, utilized, readyToAnnounce, published, contractsAwaitingSignature,
            depositsOverdue, eventsAwaitingCloseout, overdueFollowups). Unknown keys are silently
            dropped; explicit null resets to the default set.
          items:
            type: string
        notify_event_updates:
          type: boolean
        notify_contracts:
          type: boolean
        notify_access_requests:
          type: boolean
    AuthRefreshRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
    AuthLogoutRequest:
      type: object
      properties:
        refresh_token:
          type: string
          description: Optional — if omitted, the call is a no-op that still returns ok:true
    MeUser:
      type: object
      description: Null when the caller is unauthenticated.
      nullable: true
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
        phone:
          type: string
          nullable: true
        has_password:
          type: boolean
        has_passkey:
          type: boolean
        hide_credential_setup_prompt:
          type: boolean
        default_landing:
          type: string
          nullable: true
        nav_collapsed:
          type: boolean
        events_sort:
          type: string
          nullable: true
        dashboard_metrics:
          type: array
          nullable: true
          items:
            type: string
        notify_event_updates:
          type: boolean
        notify_contracts:
          type: boolean
        notify_access_requests:
          type: boolean
    MeResponse:
      type: object
      required:
        - user
        - capabilities
      properties:
        user:
          $ref: '#/components/schemas/MeUser'
        capabilities:
          $ref: '#/components/schemas/AuthCapabilities'
    AccountExportResponse:
      type: object
      required:
        - exported_at
        - account
        - passkeys
        - event_collaborations
        - messages
        - activity
      properties:
        exported_at:
          type: string
          format: date-time
        account:
          type: object
          description: Full users row (password_hash removed; alt_emails decoded to an array)
          additionalProperties: true
        passkeys:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              created_at:
                type: string
                format: date-time
              last_used_at:
                type: string
                format: date-time
                nullable: true
        event_collaborations:
          type: array
          items:
            type: object
            properties:
              event_id:
                type: integer
              role:
                type: string
              created_at:
                type: string
                format: date-time
        messages:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              subject:
                type: string
              body:
                type: string
              created_at:
                type: string
                format: date-time
        activity:
          type: array
          items:
            type: object
            properties:
              event_id:
                type: integer
              action:
                type: string
              created_at:
                type: string
                format: date-time
    AccountDeleteRequest:
      type: object
      required:
        - confirm
        - email
      properties:
        confirm:
          description: Must be true (boolean true, or "true"/1/"1")
          oneOf:
            - type: boolean
            - type: string
            - type: integer
        email:
          type: string
          format: email
          description: Must match the caller's current account email (case-insensitive)
    AccountDeleteResponse:
      type: object
      required:
        - success
        - message
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
    AccountAcceptPrivacyResponse:
      type: object
      required:
        - success
        - privacy_policy_version
      properties:
        success:
          type: boolean
          example: true
        privacy_policy_version:
          type: string
          example: '2026-06-25'
    UserRole:
      type: string
      description: >-
        One of: venue_admin, event_owner, promoter, band, artist, designer, staff, viewer,
        global_viewer
      enum:
        - venue_admin
        - event_owner
        - promoter
        - band
        - artist
        - designer
        - staff
        - viewer
        - global_viewer
    UserListItem:
      type: object
      required:
        - id
        - name
        - email
        - role
        - access_status
        - created_at
        - updated_at
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
          nullable: true
        role:
          $ref: '#/components/schemas/UserRole'
        access_status:
          type: string
          enum:
            - active
            - requested
        request_notes:
          type: string
          nullable: true
        alt_emails:
          type: string
          nullable: true
          description: Raw JSON string of alias-email entries (not decoded server-side for this list endpoint)
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        has_password:
          type: boolean
        passkey_count:
          type: integer
        owned_event_count:
          type: integer
        collaborator_event_count:
          type: integer
    UserListResponse:
      type: object
      required:
        - users
        - roles
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/UserListItem'
        roles:
          type: array
          description: The full set of assignable roles
          items:
            $ref: '#/components/schemas/UserRole'
    UserDetail:
      type: object
      required:
        - id
        - name
        - email
        - role
        - created_at
        - updated_at
        - has_password
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/UserRole'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
