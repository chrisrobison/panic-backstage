        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: name is required, or module_key already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/contract-modules/{moduleId}:
    patch:
      operationId: contractModules_update
      summary: Update a clause-library module
      description: >-
        Only fields present in the body are considered; `module_key` may be renamed as long as the
        new key isn't already in use by another module. Requires the global
        `manage_contract_library` capability.
      tags:
        - Contract Modules
      parameters:
