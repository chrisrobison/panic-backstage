  /payment-settings:
    get:
      operationId: paymentSettings_get
      summary: Get global payment provider settings
      description: >-
        Returns the active payment provider + default currency (from the single-row payment_settings
        table, 'square'/'USD' if unset yet), per-provider configuration status (whether required Env
        keys are present — never their values), and the raw current .env values for every
        Stripe/Square key for read-only admin display. Requires the global 'manage_users' capability
        (the venue_admin admin-role gate). WARNING: the `env` block is returned exactly as read from
        the environment and is NOT redacted by this endpoint — for Stripe/Square this includes live
        secret values (e.g. STRIPE_SECRET_KEY, SQUARE_ACCESS_TOKEN); treat this response as
        sensitive.
      tags:
        - Payment Settings
      responses:
        '200':
          description: Current payment settings.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentSettingsResponse'
        '403':
          description: Caller lacks the manage_users global capability.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    patch:
      operationId: paymentSettings_update
      summary: Switch the active payment provider / default currency
      description: >-
        Upserts the single payment_settings row. Requires the global 'manage_users' capability.
        active_provider, if supplied, must be one of PaymentProviders::available() (422 otherwise,
        e.g. 'Unknown payment provider'); currency, if supplied, must match a 3-letter ISO code (422
        otherwise). Either field may be omitted to leave it unchanged. This endpoint only accepts
        these two fields — it does not accept or write any secret/credential values (those live in
