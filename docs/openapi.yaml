  /api/events/{id}/staffing/from-capacity:
    post:
      operationId: eventStaffing_fromCapacity
      summary: Auto-populate staffing shifts from capacity-based tiers
      description: >-
        Requires the `manage_staffing` event capability. Looks up the recommended headcount-by-role
        tier for the event's (or body-supplied) `capacity` and inserts missing shifts
        (`source=generated`, `status=scheduled`), each tagged with its own `shift_date`.
        For a multi-day event (`events.end_date` set), the tier is applied once per calendar day
        in the event's date range — a 3-day event gets three full crews, not one shared across
        the whole run. Non-destructive by default — only adds shifts for roles that are short of
        the tier's recommended count on that day; pass `{"replace": true}` (or `?replace=1`) to
        first delete all existing shifts and rebuild from scratch.
      tags:
        - Event Staffing
      parameters:
        - $ref: '#/components/parameters/EventIdPath'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                capacity:
                  type: integer
                  description: Overrides the event's stored capacity for this calculation.
                replace:
                  type: boolean
                  default: false
      responses:
        '200':
          description: Staffing rebuilt.
          content:
            application/json:
              schema:
                type: object
                properties:
                  staffing:
                    type: array
                    items:
                      $ref: '#/components/schemas/EventStaffing'
                  shifts_added:
                    type: integer
        '403':
          description: Missing manage_staffing capability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: capacity is required (set it on the event or pass it in the request body)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Staffing update failed (transaction rolled back)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/events/{id}/staffing/preview:
    post:
      operationId: eventStaffing_previewCapacity
      summary: Preview the capacity-based staffing recommendation (non-destructive)
      description: >-
        Requires the `manage_staffing` event capability. Computes the same tier-based recommendation
        as `from-capacity` and diffs it against current shifts, but writes nothing to the database.
        For a multi-day event, `suggested`/`existing`/`delta`/`suggested_count` are totals across
        every day in the event's date range (one tier per day); `dates` lists each day counted.
      tags:
        - Event Staffing
      parameters:
        - $ref: '#/components/parameters/EventIdPath'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                capacity:
                  type: integer
      responses:
        '200':
          description: Preview diff.
          content:
            application/json:
              schema:
                type: object
                properties:
                  capacity:
                    type: integer
                  suggested:
                    type: array
                    items:
                      type: object
                      properties:
                        role:
                          type: string
                        count:
                          type: integer
                  diff:
                    type: array
                    items:
                      type: object
                      properties:
                        role:
                          type: string
                        suggested:
                          type: integer
                        existing:
                          type: integer
                        delta:
                          type: integer
                        action:
                          type: string
                          enum:
                            - add
                            - increase
                            - decrease
                            - no_change
                            - remove
                  has_manual_shifts:
                    type: boolean
                  current_count:
                    type: integer
                  suggested_count:
                    type: integer
                  dates:
                    type: array
                    items:
                      type: string
                      format: date
                    description: Every calendar day in the event's date range that the tier was applied to.
        '403':
          description: Missing manage_staffing capability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: capacity is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/events/{id}/staffing/export:
    get:
      operationId: eventStaffing_export
      summary: Download a payroll CSV for the event's staffing shifts
      description: >-
        Requires the `manage_staffing` event capability. Returns a `text/csv` attachment (Event ID,
        Event Title, Shift Date, Staff Name, Email, Phone, Role, Source, Clock In, Clock Out, Actual
        Hours, Est Hours, OT Hours, Notes), not a JSON body. Shift Date is each shift's own
        `shift_date` (falling back to the event's start date), not a single event-wide date.
      tags:
        - Event Staffing
      parameters:
        - $ref: '#/components/parameters/EventIdPath'
      responses:
        '200':
          description: Payroll CSV file.
          content:
            text/csv:
              schema:
                type: string
                format: binary
        '403':
          description: Missing manage_staffing capability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/events/{id}/series:
    get:
      operationId: eventSeries_get
      summary: Get the recurring series this event belongs to (if any)
      description: >-
        Requires the `read_event` event capability. Returns `{"series": null}` when the event is not
        part of a series.
      tags:
        - Event Series
      parameters:
        - $ref: '#/components/parameters/EventIdPath'
      responses:
        '200':
          description: Series info.
          content:
            application/json:
              schema:
                type: object
                properties:
                  series:
                    type: object
                    nullable: true
                    allOf:
                      - $ref: '#/components/schemas/EventSeries'
                  events:
                    type: array
                    description: >-
                      Present only when series is non-null — every occurrence in the series (id,
                      title, date, status, slug, external_id).
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        title:
                          type: string
                        date:
                          type: string
                          format: date
                        status:
                          type: string
                        slug:
                          type: string
                        external_id:
                          type: string
                          nullable: true
        '403':
          description: Missing read_event capability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Event not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      operationId: eventSeries_create
      summary: Turn this event into the anchor of a new recurring series
      description: >-
        Requires the `edit_event` event capability. Fails with 422 if the event is already part of a
        series. `dates` (a list of `YYYY-MM-DD` strings, none equal to the anchor's own date, capped
        at 52) is required; the recurrence pattern itself is computed client-side and stored only as
        a display label — this endpoint never derives dates from a pattern. Every date is
        pre-validated for room conflicts (409, nothing created) before any row is written. On
        success, one new `events` row is cloned per date (status reset to `proposed`; a fixed
        allowlist of fields is copied from the anchor — deposit, contract/ settlement docs,
        walkthrough flag, and estimated guests are NOT copied) and linked via `series_id`,
        atomically.
      tags:
        - Event Series
      parameters:
        - $ref: '#/components/parameters/EventIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - dates
              properties:
                dates:
                  type: array
                  items:
                    type: string
                    format: date
                  description: Occurrence dates to create as sibling events. Max 52.
                description:
                  type: string
                  nullable: true
                  description: Human label, e.g. "Every other Tuesday".
                pattern:
                  description: >-
                    Opaque client-computed recurrence pattern, stored as JSON purely for later
                    display.
                end_type:
                  type: string
                  enum:
                    - on_date
                    - after_count
                  default: after_count
                end_date:
                  type: string
                  format: date
                  nullable: true
                  description: Used when end_type=on_date.
                occurrence_count:
                  type: integer
                  description: Used when end_type=after_count; defaults to count(dates) + 1.
      responses:
        '200':
          description: Series created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  series_id:
                    type: integer
                  created_event_ids:
                    type: array
                    items:
                      type: integer
        '403':
          description: Missing edit_event capability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Event not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Room conflict on one or more requested dates — nothing was created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Already in a series, no dates supplied, too many dates, or an invalid/duplicate date.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Series creation failed and was rolled back
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      operationId: eventSeries_remove
      summary: Remove this one event from its series
      description: >-
        Requires the `edit_event` event capability. Unlinks only this occurrence; sibling events are
        untouched. If this was the last event referencing the series, the now-orphaned
        `event_series` row is deleted too.
      tags:
        - Event Series
      parameters:
        - $ref: '#/components/parameters/EventIdPath'
      responses:
        '200':
          description: Removed from series.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        '403':
          description: Missing edit_event capability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Event not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: This event is not part of a series
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /events/{eventId}/payments:
    parameters:
      - name: eventId
        in: path
        required: true
        schema:
          type: integer
    get:
      operationId: eventPayments_list
      summary: List event payments
      description: >-
        Requires `read_event`. Returns non-voided payment records for the event plus a
        server-computed summary (deposit totals) and the deposit_status snapshot from the events
        table. Voided payments are excluded from the list (they are soft-deleted, not hard-deleted).
      tags:
        - Event Payments
      responses:
        '200':
          description: Payments, summary, and deposit status
          content:
            application/json:
              schema:
                type: object
                properties:
                  payments:
                    type: array
                    items:
                      $ref: '#/components/schemas/EventPayment'
                  summary:
                    $ref: '#/components/schemas/EventPaymentSummary'
                  deposit_status:
                    type: string
                    description: Snapshot of events.deposit_status (not_required if unset).
                  payment_types:
                    type: array
                    items:
                      type: string
                  methods:
                    type: array
                    items:
                      type: string
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Missing read_event capability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Event not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      operationId: eventPayments_create
      summary: Record a payment
      description: >-
        Requires `manage_payments`. amount must be greater than 0. If payment_type is `deposit`,
        events.deposit_status is re-derived server-side after insert (see the deposit gate: an event
        cannot move to Booked/Confirmed unless deposit_status is `received` or `waived`). Writes an
        event_payment_audit row and an activity log entry as side effects.
      tags:
        - Event Payments
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventPaymentCreateRequest'
      responses:
        '200':
          description: Payment created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Missing manage_payments capability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Event not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Invalid payment_type/method, or amount not greater than 0
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /events/{eventId}/payments/{paymentId}:
    parameters:
      - name: eventId
        in: path
        required: true
        schema:
          type: integer
      - name: paymentId
        in: path
        required: true
        schema:
          type: integer
    patch:
      operationId: eventPayments_update
      summary: Update a payment record
      description: >-
        Requires `manage_payments`. All body fields are optional — only fields present in the body
        are updated (partial patch); an empty body returns `{"ok":true}` without writing. If status
        is set to `received` and received_at was previously null, received_at is auto-stamped to
        NOW(). If the payment's payment_type is `deposit`, events.deposit_status is re-derived after
        the update. Writes an event_payment_audit row.
      tags:
        - Event Payments
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventPaymentUpdateRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Missing manage_payments capability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Payment or event not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      operationId: eventPayments_delete
      summary: Void a payment
      description: >-
        Requires `manage_payments`. Soft-delete: sets status to `voided` rather than removing the
        row (the row is then excluded from GET list results). Writes an event_payment_audit row. If
        the payment's payment_type is `deposit`, events.deposit_status is re-derived after voiding.
      tags:
        - Event Payments
      responses:
        '204':
          description: Voided
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Missing manage_payments capability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Payment or event not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /events/{eventId}/payments/{paymentId}/waive-deposit:
    parameters:
      - name: eventId
        in: path
        required: true
        schema:
          type: integer
      - name: paymentId
        in: path
        required: true
        schema:
          type: integer
        description: >-
          Required by the URL router but not actually read by the handler — waiving the deposit is
          an event-level action (it updates events.deposit_status), not tied to a specific payment
          row. Any numeric value routes correctly.
    post:
      operationId: eventPayments_waiveDeposit
      summary: Waive the event's deposit requirement
      description: >-
        Requires the high-privilege `waive_deposit` capability (distinct from `manage_payments`). A
        non-empty `reason` is mandatory (422 if blank). Sets events.deposit_status to `waived` and
        records deposit_waived_by_id / deposit_waived_reason. Once waived, syncDepositStatus() will
        no longer overwrite deposit_status from payment records until it is reset. All waivers are
        audited via the activity log.
      tags:
        - Event Payments
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - reason
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Deposit waived
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  deposit_status:
                    type: string
                    example: waived
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Missing waive_deposit capability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Event not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: reason is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /events/{eventId}/payments/{paymentId}/send-link:
    parameters:
      - name: eventId
        in: path
        required: true
        schema:
          type: integer
      - name: paymentId
        in: path
        required: true
        schema:
          type: integer
        description: If 0/omitted-equivalent, the handler falls back to `payment_id` in the request body.
    post:
      operationId: eventPayments_sendLink
      summary: Create/send a Stripe payment link for a payment record
      description: >-
        Requires `manage_payments`. Creates a one-time Stripe Price + Payment Link for the payment's
        amount/currency, marks the payment as `invoiced`, stores the Stripe link id in external_ref,
        and appends a note. Not idempotent — calling again creates a new Stripe Price/Payment Link
        each time. Returns 503 if STRIPE_SECRET_KEY is not configured, 502 if the Stripe API call
        fails.
      tags:
        - Event Payments
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                payment_id:
                  type: integer
                  description: Fallback payment id if paymentId path segment is not a real id.
      responses:
        '200':
          description: Payment link created
          content:
            application/json:
              schema:
                type: object
                properties:
                  payment_link:
                    type: string
                    format: uri
                  stripe_link_id:
                    type: string
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Missing manage_payments capability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Payment record not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: payment_id missing, or payment amount not greater than 0
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '502':
          description: Stripe API call failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: Stripe not configured (STRIPE_SECRET_KEY unset)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /events/{eventId}/ledger:
    parameters:
      - name: eventId
        in: path
        required: true
        schema:
          type: integer
    get:
      operationId: eventLedger_list
      summary: List event ledger entries
      description: >-
        Requires `read_event`. Returns non-void entries ordered by line_type (revenue, cost,
        payment, receivable), then category, then created_at, plus the event_closeout_state row
        (creates none if absent — this endpoint does not auto-create it; that happens on first
        write).
      tags:
        - Event Ledger
      responses:
        '200':
          description: Ledger entries, closeout state, and category lists
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items:
                      $ref: '#/components/schemas/EventLedgerEntry'
                  closeout:
                    $ref: '#/components/schemas/EventLedgerCloseoutState'
                  revenue_categories:
                    type: array
                    items:
                      type: string
                  cost_categories:
                    type: array
                    items:
                      type: string
                  payment_categories:
                    type: array
                    items:
                      type: string
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Missing read_event capability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Event not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      operationId: eventLedger_create
      summary: Add a ledger entry
      description: >-
        Requires `manage_ledger`. The ledger is append-only — corrections are new entries, not
        edits. Rejected with 409 if closeout is already `finalized` and the caller lacks
        `finalize_closeout` (finalizers can still add entries to a finalized closeout). line_type is
        derived from category unless explicitly overridden in the body. Creates the
        event_closeout_state row (status `open`) if it does not already exist. Returns the freshly
        recalculated P&L summary.
      tags:
        - Event Ledger
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventLedgerCreateRequest'
      responses:
        '200':
          description: Entry created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  summary:
                    $ref: '#/components/schemas/EventLedgerSummary'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Missing manage_ledger capability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Event not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Closeout is finalized and caller lacks finalize_closeout
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Invalid category, or amount is zero
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /events/{eventId}/ledger/{entryId}:
    parameters:
      - name: eventId
        in: path
        required: true
        schema:
          type: integer
      - name: entryId
        in: path
        required: true
        schema:
          type: integer
    delete:
      operationId: eventLedger_void
      summary: Void a ledger entry
      description: >-
        Requires `manage_ledger`. Sets is_void=1 with an optional void_reason (audit trail preserved
        — the row is not deleted). Returns the freshly recalculated P&L summary rather than a 204,
        unlike most other void/delete endpoints in this API.
