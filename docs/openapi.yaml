  /api/events/{id}/assets:
    get:
      operationId: eventAssets_list
      summary: List an event's assets
      description: Requires the `read_event` event capability.
      tags:
        - Event Assets
      parameters:
        - $ref: '#/components/parameters/EventIdPath'
      responses:
        '200':
          description: Asset list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  assets:
                    type: array
                    items:
                      $ref: '#/components/schemas/EventAsset'
        '403':
          description: Missing read_event capability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      operationId: eventAssets_create
      summary: Upload an asset
      description: >-
        Requires the `upload_assets` event capability. Multipart upload; the file field must be
        named `asset`. Max 10MB. The MIME type is sniffed from the file's actual bytes (never
        trusted from the client filename) and restricted to image/jpeg, image/png, image/gif,
        image/webp, and application/pdf — the stored extension is derived from the detected type.
        New uploads are stored with `approval_status=needs_review`.
      tags:
        - Event Assets
      parameters:
        - $ref: '#/components/parameters/EventIdPath'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - asset
              properties:
                asset:
                  type: string
                  format: binary
                asset_type:
                  type: string
                  description: One of the event_assets.asset_type enum values. Defaults to `other`.
                title:
                  type: string
                  description: Defaults to the uploaded filename.
                notes:
                  type: string
      responses:
        '200':
          description: Asset stored.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  file_path:
                    type: string
        '403':
          description: Missing upload_assets capability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: No/invalid file, too large, or an unsupported MIME type.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Could not store upload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/events/{id}/assets/{assetId}:
    patch:
      operationId: eventAssets_update
      summary: Update an asset's approval status/notes
      description: >-
        Requires the `manage_assets` event capability. Logs an "asset approved" activity entry when
        `approval_status` becomes `approved`.
      tags:
        - Event Assets
      parameters:
        - $ref: '#/components/parameters/EventIdPath'
        - name: assetId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                approval_status:
                  type: string
                  enum:
                    - draft
                    - needs_review
                    - approved
                    - rejected
                notes:
                  type: string
                  nullable: true
      responses:
        '200':
          description: Asset updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        '403':
          description: Missing manage_assets capability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      operationId: eventAssets_delete
      summary: Delete an asset
      description: Requires the `manage_assets` event capability. Also unlinks the stored file from disk.
      tags:
        - Event Assets
      parameters:
        - $ref: '#/components/parameters/EventIdPath'
        - name: assetId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Deleted.
        '403':
          description: Missing manage_assets capability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/events/{id}/assets/generate-flyer:
    get:
      operationId: eventFlyer_previewPrompt
      summary: Preview the auto-built AI flyer prompt
      description: >-
        Requires the `upload_assets` event capability. Builds (but does not submit) the
        natural-language prompt from the event title, active lineup, and public description, so the
        UI can show it for editing before generation.
      tags:
        - Event Flyer & QR
      parameters:
        - $ref: '#/components/parameters/EventIdPath'
      responses:
        '200':
          description: Auto-built prompt.
          content:
            application/json:
              schema:
                type: object
                properties:
                  prompt:
                    type: string
        '403':
          description: Missing upload_assets capability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Event not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      operationId: eventFlyer_generate
      summary: Generate an AI flyer and store it as an event asset
      description: >-
        Requires the `upload_assets` event capability. Synchronous — shells out to `codex exec` (an
        AI image generation CLI) with either the supplied `prompt` or the auto-built one, waits for
        it to finish (up to ~180s), and registers the resulting PNG as an `event_assets` row with
        `asset_type=flyer`, `approval_status=needs_review`, `generation_source=codex-ai`. This is a
        slow, non-idempotent, resource-intensive call — each invocation creates a new asset row.
      tags:
        - Event Flyer & QR
      parameters:
        - $ref: '#/components/parameters/EventIdPath'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                prompt:
                  type: string
                  description: Overrides the auto-built prompt when non-empty.
      responses:
        '200':
          description: Flyer generated and stored.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventFlyer'
        '403':
          description: Missing upload_assets capability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Event not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Codex failed or produced no image
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/events/{id}/assets/generate-qr:
