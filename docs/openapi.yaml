        id:
          type: integer
        broadcast_id:
          type: integer
        destination_key:
          type: string
        destination_group:
          type: string
        status:
          type: string
          enum:
            - queued
            - sent
            - manual_required
            - needs_auth
            - failed
            - skipped
        external_url:
          type: string
          nullable: true
        error_message:
          type: string
          nullable: true
        response_json:
          type: string
          nullable: true
          description: Raw JSON-encoded adapter response, not decoded server-side.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    PromoteBroadcastCreateResult:
      type: object
      description: >-
        Abbreviated result shape embedded only in the immediate POST /broadcasts response (no
        response_json, created_at, or updated_at — fetch the broadcast via GET for the full rows).
      properties:
        id:
          type: integer
        broadcast_id:
          type: integer
        destination_key:
          type: string
        destination_group:
          type: string
        status:
          type: string
          enum:
            - queued
            - sent
            - manual_required
            - needs_auth
            - failed
            - skipped
        external_url:
          type: string
          nullable: true
        error_message:
          type: string
          nullable: true
    PromoteBroadcastCreateRequest:
      type: object
      required:
        - post_id
        - destinations
      properties:
        post_id:
          type: integer
          description: Must belong to the event in the path.
        destinations:
          type: array
          items:
            type: string
          minItems: 1
          description: List of promote_destinations.destination_key values to send/queue to.
          example:
            - facebook_page
            - instagram
            - eventbrite
        send_mode:
          type: string
          enum:
            - now
            - scheduled
          default: now
        scheduled_at:
          type: string
          format: date-time
          nullable: true
          description: >-
            Only stored when send_mode is "scheduled". No worker currently processes scheduled
            broadcasts at their scheduled time.
    PromoteDestination:
      type: object
      description: A promote_destinations registry row (shared across all events/venues, not per-event).
      properties:
        id:
          type: integer
        destination_key:
          type: string
        destination_group:
          type: string
          enum:
            - direct_post
            - event_platform
            - editorial_submission
            - email
        label:
          type: string
        status:
          type: string
          enum:
            - connected
            - needs_auth
            - manual_submission
            - disabled
        config_json:
          type: string
          nullable: true
          description: Raw JSON-encoded destination config, not decoded server-side.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    PromoteHealth:
      type: object
      properties:
        score:
          type: integer
          description: round(complete/total*100).
        complete:
          type: integer
        total:
          type: integer
          example: 20
        items:
          type: array
          items:
            type: object
            properties:
              key:
                type: string
                example: panic_page_published
              label:
                type: string
              status:
                type: string
                enum:
                  - done
                  - missing
              severity:
                type: string
                enum:
                  - success
                  - warning
                  - error
                  - info
              detail:
                type: string
    PromoteAnalytics:
      type: object
      properties:
        broadcast_count:
          type: integer
        destinations_reached:
          type: integer
          description: sent + queued (deduplicated to latest result per destination).
        listings_live:
          type: integer
          description: Count of deduplicated results with a non-empty external_url.
        manual_pending:
          type: integer
        needs_setup:
          type: integer
        failed_count:
          type: integer
        ticket_sales:
          type: integer
          nullable: true
          description: Always null — no Eventbrite ticket-sales read-back implemented.
        luma_rsvps:
          type: integer
          nullable: true
          description: Always null — no Luma RSVP read-back implemented.
        email_opens:
          type: integer
          nullable: true
          description: Always null — no Mailchimp/SendGrid open-tracking read-back implemented.
        email_clicks:
          type: integer
          nullable: true
          description: Always null — no email click-tracking read-back implemented.
        status_counts:
          type: object
          properties:
            sent:
              type: integer
            queued:
              type: integer
            manual_required:
              type: integer
            needs_auth:
              type: integer
            failed:
              type: integer
        destination_results:
          type: array
          description: Deduplicated (latest result per destination_key), sorted by group then key.
          items:
            type: object
            properties:
              destination_key:
                type: string
              destination_group:
                type: string
              status:
                type: string
                enum:
                  - queued
                  - sent
                  - manual_required
                  - needs_auth
                  - failed
                  - skipped
              external_url:
                type: string
                nullable: true
              error_message:
                type: string
                nullable: true
              updated_at:
                type: string
                format: date-time
        website_clicks:
          type: integer
          description: Currently always equal to destinations_reached — not a real click-tracking metric.
        rsvps:
          type: integer
          description: Always 0 — placeholder, not wired to any data source.
        ticket_conversions:
          type: integer
          description: Always 0 — placeholder, not wired to any data source.
        email_opens_legacy:
          type: integer
          description: Always 0 — legacy placeholder field, superseded by the nullable email_opens above.
    PromoteCredential:
      type: object
      description: >-
        One merged destination+credential row from GET /promote/credentials. Tokens are never
        included.
      properties:
        destination_key:
          type: string
        destination_group:
          type: string
        label:
          type: string
        dest_status:
          type: string
          enum:
            - connected
            - needs_auth
            - manual_submission
            - disabled
          description: promote_destinations.status (DB-level, drives the broadcast modal).
        cred_status:
          type: string
          enum:
            - connected
            - needs_auth
            - error
          description: promote_credentials.status, or "needs_auth" if no credential row exists yet.
        config:
          type: object
          nullable: true
          additionalProperties: true
          description: Decoded credential config JSON, or null if no credential row / no config stored.
        error_message:
          type: string
          nullable: true
        connected_at:
          type: string
          format: date-time
          nullable: true
        has_token:
          type: boolean
          description: >-
            True if either the plaintext or encrypted access_token column is set. The only indicator
            of token presence — the token itself is never returned.
    PromoteCredentialUpsertRequest:
      type: object
      description: >-
        All fields optional — only provided fields are written; anything omitted keeps its current
        stored value.
      properties:
        venue_id:
          type: integer
          default: 1
        access_token:
          type: string
          description: >-
            API key or OAuth access token. Encrypted at rest when CREDENTIAL_ENCRYPTION_KEY is
            configured.
        refresh_token:
          type: string
          description: OAuth refresh token, if applicable.
        config:
          type: object
          additionalProperties: true
          description: >-
            Platform-specific JSON (org IDs, page IDs, contact_email, submission URLs, etc.). Must
            be a JSON object, not a scalar/array.
    PromoteCredentialUpsertResponse:
      type: object
      properties:
        saved:
          type: boolean
          example: true
        status:
          type: string
          enum:
            - connected
            - needs_auth
          description: connected if a non-empty access_token was stored, else needs_auth.
    PromoteAutoPublish:
      type: object
      description: The promote_auto_publish_settings singleton row (id is always 1).
      properties:
        id:
          type: integer
          example: 1
        auto_publish_enabled:
          type: integer
          description: 0 or 1 (MySQL tinyint).
        auto_publish_destinations:
          type: string
          nullable: true
          description: Raw JSON-encoded array of destination_key strings, or null.
        auto_publish_destinations_array:
          type: array
          items:
            type: string
          description: >-
            Convenience decoded form of auto_publish_destinations, added by the endpoint alongside
            the raw column.
        updated_at:
          type: string
          format: date-time
    PromoteAutoPublishUpdateRequest:
      type: object
      properties:
        auto_publish_enabled:
          type: boolean
        auto_publish_destinations:
          type: array
          items:
            type: string
          description: List of destination_key strings to auto-broadcast to.
    PromoteEventbriteOrgResponse:
      type: object
      properties:
        eventbrite_user:
          type: object
          properties:
            id:
              type: string
              nullable: true
            name:
              type: string
              nullable: true
            email:
              type: string
              nullable: true
        organizations:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
        current_org_id:
          type: string
          nullable: true
          description: The currently-configured EVENTBRITE_ORG_ID env var, if set.
        instructions:
          type: string
    PromoteTwitterOAuthStartRequest:
      type: object
      properties:
        venue_id:
          type: integer
          default: 1
    PromoteTwitterOAuthStartResponse:
      type: object
      properties:
        authorize_url:
          type: string
          description: >-
            X (Twitter) OAuth 2.0 PKCE authorize URL; the frontend should navigate the browser to
            it.
    PromoteActionInfo:
      type: object
      properties:
        dest_key:
          type: string
        dest_label:
          type: string
        dest_group:
          type: string
        dest_status:
          type: string
          enum:
            - connected
            - needs_auth
            - manual_submission
            - disabled
        channel:
          type: string
          description: The promote_post_variants.channel this destKey maps to (e.g. facebook_page → facebook).
        variant:
          type: object
          allOf:
            - $ref: '#/components/schemas/PromotePostVariant'
          nullable: true
          description: Null if no variant exists yet for this channel — call variants/generate first.
        config:
          type: object
          additionalProperties:
            type: string
          description: >-
            Non-sensitive credential config fields only (contact_email, submission_url, partner_url,
            promoter_url, artist_url, artist_page_url, event_platform_url).
        can_email:
          type: boolean
          description: >-
            True if a contact_email is configured, or the destKey is inherently email-based (press,
            email_adhoc, sf_chronicle, sf_station).
        can_form:
          type: boolean
          description: True if any of the known form/platform URL config fields is set.
    PromoteActionSendRequest:
      type: object
      properties:
        to:
          type: string
          format: email
          description: >-
            Overrides the destination's stored contact_email. One of this or a stored contact_email
            is required, or the request 422s.
    PromoteActionSendResponse:
      type: object
      properties:
        sent:
          type: boolean
          example: true
        to:
          type: string
          format: email
        subject:
          type: string
    DashboardResponse:
      type: object
      properties:
        cards:
          $ref: '#/components/schemas/DashboardCards'
        events:
          type: array
          items:
            $ref: '#/components/schemas/DashboardEvent'
        highlights:
          type: object
          properties:
            next_empty_date:
              type: string
              format: date
              nullable: true
              description: Date of the soonest upcoming event with status empty/hold, in the caller's scope.
            oldest_unsettled:
              type: object
              nullable: true
              description: >-
                Oldest completed-but-unsettled event in the caller's scope (id, title, date), or
                null if none.
              properties:
                id:
                  type: integer
                title:
                  type: string
                date:
                  type: string
                  format: date
        onboarding:
          $ref: '#/components/schemas/DashboardOnboarding'
          nullable: true
    DashboardCards:
      type: object
      description: KPI counters, all scoped to the caller's visible events unless noted.
      properties:
        empty:
          type: integer
          description: Events in the next 14 days with status empty/hold.
        needsAssets:
          type: integer
          description: Events confirmed/needs_assets with no approved flyer.
        ready:
          type: integer
          description: Events with status ready_to_announce.
        blockers:
          type: integer
          description: Open/waiting event_blockers rows.
        urgentItems:
          type: integer
          description: Open/waiting blockers due within 2 days.
        published:
          type: integer
          description: Published events with a future date.
        unsettled:
          type: integer
          description: Completed events with no event_settlements row.
        newLeads:
          type: integer
          description: Global (unscoped) count of leads with status=new; 0 unless caller has view_leads.
        leadsNeedingReview:
          type: integer
          description: >-
            Global count of leads in new/triage/evaluating/needs_review; 0 unless caller has
            view_leads.
        contractsAwaitingSignature:
          type: integer
        depositsOverdue:
          type: integer
          description: Pending deposit payments past their due_date.
        eventsAwaitingCloseout:
          type: integer
        overdueFollowups:
          type: integer
          description: Global count of overdue client_notes tasks/followups; 0 for non-venue_admin callers.
        utilizedDays:
          type: integer
          description: Distinct days in the next 14 with at least one non-empty/hold show.
        utilizationPct:
          type: integer
          description: utilizedDays as a percentage of 14.
    DashboardEvent:
      type: object
      description: A row from `events` (SELECT e.*) plus derived fields; property list below is non-exhaustive.
      properties:
        id:
          type: integer
        title:
          type: string
        date:
          type: string
          format: date
        show_time:
          type: string
          nullable: true
        status:
          type: string
        owner_user_id:
          type: integer
          nullable: true
        owner_name:
          type: string
          nullable: true
        primary_blocker:
          type: string
          nullable: true
          description: Title of the earliest open/waiting blocker, if any.
        incomplete_tasks:
          type: integer
        open_items:
          type: integer
        approved_flyers:
          type: integer
        capabilities:
          type: object
          description: >-
            Caller's event-scoped capabilities for this event (BaseEndpoint::eventCapabilities),
            keyed by capability name.
          additionalProperties:
            type: boolean
      additionalProperties: true
    DashboardOnboarding:
      type: object
      description: >-
        Getting-started checklist; only ever returned for venue_admin callers who have not dismissed
        it.
      properties:
        steps:
