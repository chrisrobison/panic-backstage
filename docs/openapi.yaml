          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Lead not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      operationId: leads_evaluation_save
      summary: Create a deal evaluation (server-calculated)
      description: >-
        Requires the `manage_leads` global capability. Inserts a new evaluation row (there is no
        update-in-place; each save is a new row, and GET always returns the most recent). Every
        derived figure (`gross_revenue`, `estimated_cost`, `venue_net`, `margin_pct`, break-even
        attendance, minimum tickets for guarantee, and risk flags) is computed server-side from the
        raw inputs — client-supplied totals are never trusted.
      tags:
        - Leads
      parameters:
        - $ref: '#/components/parameters/LeadIdPath'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LeadEvaluationRequest'
      responses:
        '200':
          description: Newly created evaluation with server-calculated figures.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeadEvaluationResult'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Missing the manage_leads capability.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Lead not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /leads/{leadId}/convert:
    post:
      operationId: leads_convert
      summary: Convert a lead into a booked event
      description: >-
        Requires the `manage_leads` global capability. Not idempotent: a lead already in `converted`
        status returns 409. The lead must currently be in `approved`, `evaluating`, or
        `needs_review` status, otherwise 422. Runs atomically in a DB transaction: creates a new
        `events` row (status `proposed`) seeded from lead fields (overridable via the request body),
        marks the lead `converted` with `converted_event_id`/`converted_at`, appends an audit note
        on the lead, and writes an `event_activity_log` entry on the new event. On any failure the
        whole operation rolls back and a 500 is returned.
      tags:
        - Leads
      parameters:
        - $ref: '#/components/parameters/LeadIdPath'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LeadConvertRequest'
      responses:
        '200':
          description: Event created from the lead.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeadConvertResult'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Missing the manage_leads capability.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Lead not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Lead has already been converted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Lead is not in a convertible status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Conversion failed and was rolled back.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
