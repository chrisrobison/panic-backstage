          type: string
          nullable: true
        status:
          type: string
          enum:
            - draft
            - ready
            - needs_review
            - approved
          description: Any other value is silently ignored and the existing status is kept (no 422).
    PromoteBroadcast:
      type: object
      properties:
        id:
          type: integer
        event_id:
          type: integer
        post_id:
          type: integer
        created_by_user_id:
          type: integer
          nullable: true
        created_by_name:
          type: string
          nullable: true
          description: Only present on list responses (joined from users).
        send_mode:
          type: string
          enum:
