      summary: List broadcasts for a campaign
      description: >-
        Returns every `promote_broadcasts` row for this event, newest first, each with its full
        `promote_broadcast_results` rows embedded (including `response_json`, `created_at`,
        `updated_at` — the full DB row, unlike the abbreviated result objects returned inline by
