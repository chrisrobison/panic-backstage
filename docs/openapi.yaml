      description: >-
        Merges the active `promote_destinations` registry with this venue's `promote_credentials`
        rows. Access tokens/refresh tokens are never returned — only a `has_token` presence flag,
        non-sensitive `config`, `cred_status`, and `error_message`/`connected_at`. Gated by the
