          type: string
          enum:
            - draft
            - queued
            - processing
            - completed
            - partial_failure
            - failed
          description: >-
            This endpoint only ever sets queued (on insert) then completed/partial_failure/failed;
            draft/processing are DB-enum values not produced by this code path.
