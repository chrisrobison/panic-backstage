                $ref: '#/components/schemas/Error'
  /venue-policy:
    get:
      operationId: venuePolicy_getActive
      summary: Get the active venue policy
      description: >-
        Any authenticated user may read. Resolves the venue as the first row of `venues` ordered by
        id (the app is effectively single-venue-per-tenant at the policy layer despite the
        multi-venue `venues` table). Returns null policy with an explanatory note if none has ever
        been created (defaults apply).
      tags:
        - Venue Policy
      responses:
        '200':
          description: Active policy
          content:
            application/json:
              schema:
                type: object
                properties:
                  policy:
                    type: object
                    nullable: true
                    allOf:
                      - $ref: '#/components/schemas/VenuePolicy'
                  has_verified:
                    type: boolean
                  note:
                    type: string
                    nullable: true
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      operationId: venuePolicy_create
      summary: Create a new venue policy version
      description: >-
        Requires the global `manage_venue_policy` capability. Creates a new, incrementing version
        and marks it active; the previously active version (if any) is deactivated and its
        effective_to is set to the day before effective_from of the new version. Events snapshot the
        active policy at booking time (events.policy_snapshot_json) so this never retroactively
        changes existing bookings.
      tags:
        - Venue Policy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VenuePolicySaveRequest'
      responses:
        '200':
          description: New version created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  version:
                    type: integer
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Missing manage_venue_policy capability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /venue-policy/{policyId}:
    parameters:
      - name: policyId
        in: path
        required: true
        schema:
          type: integer
    get:
      operationId: venuePolicy_getVersion
      summary: Get one venue policy version
      description: Any authenticated user may read.
      tags:
        - Venue Policy
      responses:
        '200':
          description: Policy version
          content:
            application/json:
              schema:
                type: object
                properties:
                  policy:
                    $ref: '#/components/schemas/VenuePolicy'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Policy version not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    patch:
      operationId: venuePolicy_update
      summary: Update a venue policy version in place
      description: >-
        Requires the global `manage_venue_policy` capability. Unlike POST, this mutates an existing
        version's row directly rather than creating a new version — intended for editing a
        draft/current version. Partial patch; only fields present are updated.
        `rooms`/`staffing_rates` are re-encoded to JSON only if provided as non-empty.
      tags:
        - Venue Policy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VenuePolicyUpdateRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Missing manage_venue_policy capability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Policy version not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /venue-policy/history:
    get:
      operationId: venuePolicy_history
      summary: List all venue policy versions
      description: >-
        Requires the global `manage_venue_policy` capability (unlike the other GET routes on this
        resource, history is not open to all authenticated users). Ordered newest version first.
