  /events/{eventId}/ticketing/comp:
    post:
      operationId: ticketing_issueComp
      summary: Issue (or resend) complimentary tickets
      description: >-
        Two modes selected by the body shape. Requires the 'manage_ticketing' event capability. (1)
        Guest-list-driven: pass guest_list_id (> 0) to issue comps sized to the guest's party_size
        from the event's preferred comp tier ("Comps" tier by name, else any tier), mailed to the
        guest's email and linked back via event_guest_list.comp_order_id; if the guest was already
        comped (or resend=true is passed), the existing comp tickets are re-emailed instead of
        issuing new ones. (2) Direct admin comp: pass ticket_type_id + quantity (+ optional
        holder_name/holder_email) to issue comps for an explicit tier; emailed only if holder_email
        is supplied. 409 on TicketingService::issueComp() failures (e.g. insufficient inventory),
        422 if a guest has no email on file, 404 if the guest/tier is not found.
      tags:
        - Ticketing
      parameters:
        - $ref: '#/components/parameters/TicketingEventId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TicketCompRequest'
      responses:
        '200':
          description: Comp tickets issued or resent.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketCompResponse'
        '403':
          description: Caller lacks the manage_ticketing capability on this event.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Event, guest, or ticket type not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: >-
            Comp issuance failed (e.g. tier has insufficient inventory), or no comp-eligible ticket
            type exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Guest has no email on file, or has not been comped yet when resend was requested.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /events/{eventId}/ticketing/refund:
    post:
      operationId: ticketing_refundCancelEvent
      summary: Refund and void all paid ticket orders for a canceled event
      description: >-
        Cancel-event refund flow: iterates every fulfilled/paid, non-comp order for the event,
        refunds the captured payment through the SAME provider that originally processed it (stored
        on the order, not necessarily the currently-active provider), then voids that order's
        tickets (returning inventory) and marks the order 'refunded'. Idempotent per order —
        already-refunded orders are skipped by the status filter. Requires the 'manage_ticketing'
        event capability. Recomputes event_settlements ticket figures from live data afterward.
        Returns HTTP 207 (Multi-Status) if any individual order's refund failed, 200 if all
        succeeded; per-order results are always included.
      tags:
        - Ticketing
      parameters:
        - $ref: '#/components/parameters/TicketingEventId'
      responses:
        '200':
          description: All orders refunded successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketRefundCancelResponse'
        '207':
          description: One or more orders failed to refund; see results[].error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketRefundCancelResponse'
        '403':
          description: Caller lacks the manage_ticketing capability on this event.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Event not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /events/{eventId}/scanner-links:
