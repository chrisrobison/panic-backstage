      description: >-
        Deletes the module definition. Sections already built from this module on existing contracts
        keep their copied text (`contract_sections.module_id` is set NULL via FK). Requires the
        global `manage_contract_library` capability.
      tags:
        - Contract Modules
      parameters:
        - name: moduleId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Deleted.
        '403':
          description: Forbidden
