        `incident`/`safety_note` (or explicit is_restricted) require
        `view_incidents`/`manage_incidents`/venue_admin to create (403 otherwise). title is
        mandatory (422 if blank). Creating an `incident` record emails all venue admins with
        notify_event_updates=1 (side effect, uses body.summary as the email blurb — summary is not
        persisted). Creating a `change_order`, `overage`, or `damage` record with a non-zero
        `amount` auto-creates a linked revenue ledger entry (event_ledger_entries,
        source=change_order_link) and stamps linked_ledger_entry_id back onto the execution record.
      tags:
