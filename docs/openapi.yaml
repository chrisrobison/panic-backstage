    EventContractLink:
      type: object
      description: >-
        Lightweight projection of a contracts row for the event-scoped list — not the full Contract*
        resource owned by the deal-builder agent.
      properties:
        id:
          type: integer
        title:
          type: string
        contract_type:
          type: string
          enum:
            - private_event
            - promoter_show
            - artist_performance
            - recurring_night
            - fundraiser
            - house_show
            - other
        status:
          type: string
          enum:
            - draft
            - needs_review
            - approved
            - sent
            - signed
            - canceled
            - superseded
            - ready_to_send
            - viewed
            - partially_signed
            - signed_by_client
            - countersigned
            - fully_executed
            - voided
            - declined
            - expired
            - error
        provider:
          type: string
          description: >-
            'internal' (default) for contracts generated/signed through this app's deal builder;
            'manual_upload' for a contract that was signed outside the system and linked to an
            event_assets row via asset_id instead (see attachUploaded create path below). Also
            'mock'/'dropbox_sign'/'docusign' for e-signature providers.
        asset_id:
          type: integer
          nullable: true
          description: Set only for provider='manual_upload' — the event_assets row holding the signed document.
        asset_title:
          type: string
          nullable: true
          description: Joined from event_assets.title when asset_id is set.
        asset_file_path:
          type: string
          nullable: true
          description: Joined from event_assets.file_path when asset_id is set — resolve with assetUrl() client-side.
        asset_filename:
          type: string
          nullable: true
        counterparty_name:
          type: string
          nullable: true
        updated_at:
          type: string
          format: date-time
        current_version_id:
          type: integer
          nullable: true
    EventContractLinkCreateRequest:
      type: object
      description: >-
        Either the "generate in system" fields (template_id/contract_type/counterparty_*) OR
        asset_id (the "contract signed and attached" path — links an already-uploaded
        event_assets row as a manually-attached, already-signed contract via
        ContractService::attachUploaded; title falls back to "{event title} — Uploaded Contract").
        Sending asset_id ignores template_id/contract_type/counterparty_*.
      properties:
        asset_id:
          type: integer
          nullable: true
          description: >-
            ID of an event_assets row belonging to this event (any asset_type, typically 'contract').
            When set, creates a status='signed', provider='manual_upload' contract row instead of
            generating one — this alone is enough to satisfy the "booked" status contract gate.
        template_id:
          type: integer
          nullable: true
        contract_type:
          type: string
          enum:
            - private_event
            - promoter_show
            - artist_performance
            - recurring_night
            - fundraiser
            - house_show
            - other
          default: other
        title:
          type: string
          description: >-
            Falls back to "{event title} — Contract" (generate path) or
            "{event title} — Uploaded Contract" (asset_id path) if blank/omitted.
        counterparty_name:
          type: string
          nullable: true
        counterparty_org:
          type: string
          nullable: true
        counterparty_email:
          type: string
          nullable: true
    EventTemplate:
