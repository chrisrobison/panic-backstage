    get:
      operationId: promoteCampaign_show
      summary: Fetch the Promote campaign overview for an event
      description: >-
        Returns the full Promote workspace payload for one event: settings, the event row (joined
        with venue name/city/state), all posts (each with its variants), the event's non-approval
        assets, the active destination registry, the computed 20-item promotion-health checklist,
        and real broadcast analytics. Requires the `read_event` event capability.

        # TODO: README's endpoint-reference table describes a separate `campaign` resource #
        reachable at `/api/promote/campaigns[/{campaignId}]` with its own numeric campaign id, # and
        a `POST /api/promote/events/{eventId}/campaign` "create campaign (idempotent)" # action.
        Neither exists in Kernel.php: there is no `campaigns` segment handler at all, # and Kernel's
        own routing sends any `/api/promote/events/{id}/campaign` request to the # generic `default`
        arm (Promote::class), whose handle() only implements GET/PATCH — a # POST there falls
        through to Response::methodNotAllowed() (405). In the actual code # there is no separate
        "campaign" entity or id: the campaign IS the event, addressed # directly by eventId, and its
        settings live in the singleton-per-event # `promote_settings` table (keyed by event_id, not
        by its own campaign id). This fragment # documents the real eventId-addressed routes only.
      tags:
        - Promote
      parameters:
        - $ref: '#/components/parameters/PromoteEventId'
      responses:
        '200':
          description: Campaign overview.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromoteCampaignOverview'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Caller lacks the read_event capability for this event.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Event not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    patch:
      operationId: promoteCampaign_update
      summary: Update Promote campaign settings for an event
      description: >-
        Upserts the one `promote_settings` row for this event (INSERT ... ON DUPLICATE KEY UPDATE —
        idempotent, effectively "create campaign settings if missing, else update them"). Only
