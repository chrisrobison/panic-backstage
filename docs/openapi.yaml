  /venues:
    get:
      operationId: venues_list
      summary: List all venues with their active resources
      description: >-
        Any authenticated user may read (used by the calendar zone map and sidebar venue label).
        Each venue object has a `resources` array attached client-side from a second query,
        containing only active (non-archived) rooms.
      tags:
