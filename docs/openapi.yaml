      summary: Update an event's ticketing/payment settings
      description: >-
        Updates events.ticketing_mode / ticket_url / ticket_system. Requires the 'manage_ticketing'
        event capability. At least one of ticketing_mode, ticket_url, or ticket_system must be
        present (else 422). Switching ticketing_mode to 'internal' on a genuinely fresh event (no
        ticket_types rows yet) auto-seeds default Advance/Door/Comps tiers and a default "Door"
        scanner link so the operator can sell and scan immediately — reported via
