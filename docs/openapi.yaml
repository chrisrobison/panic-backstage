            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  summary:
                    $ref: '#/components/schemas/EventLedgerSummary'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Missing manage_ledger capability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Ledger entry or event not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /events/{eventId}/ledger/summary:
    parameters:
      - name: eventId
        in: path
        required: true
        schema:
          type: integer
    get:
      operationId: eventLedger_summary
      summary: Get the server-computed P&L summary
      description: >-
        Requires `read_event`. All totals (gross_revenue, total_costs, venue_net, margin_pct) are
        computed server-side from non-void ledger entries — never trust client-submitted totals.
        Also folds in ticketing data (non-comp paid/fulfilled orders) converted from cents to
        dollars.
      tags:
        - Event Ledger
      responses:
        '200':
          description: P&L summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  summary:
                    $ref: '#/components/schemas/EventLedgerSummary'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Missing read_event capability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Event not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /events/{eventId}/ledger/finalize:
    parameters:
      - name: eventId
        in: path
        required: true
        schema:
          type: integer
    post:
      operationId: eventLedger_finalize
      summary: Finalize the event closeout
      description: >-
        Requires `finalize_closeout`. Returns 409 if already finalized. By default, requires all 7
        checklist items (actual_hours_confirmed, bar_revenue_reconciled, ticket_revenue_reconciled,
        vendor_costs_entered, incidents_reviewed, final_invoice_prepared,
        payment_obligations_recorded) to be true either already on the closeout state or passed
        truthy in the body — pass `force: true` to bypass and finalize anyway (checklist items are
        then force-set to true). On success, flips events.status from `completed` to `settled`
        (no-op otherwise) and triggers an outbound accounting sync (Accounting::onCloseoutFinalized)
        if a provider is configured — this is a side effect, not reflected in the response body.
      tags:
        - Event Ledger
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                force:
                  type: boolean
                  description: Bypass incomplete-checklist validation.
                notes:
                  type: string
                actual_hours_confirmed:
                  type: boolean
                bar_revenue_reconciled:
                  type: boolean
                ticket_revenue_reconciled:
                  type: boolean
                vendor_costs_entered:
                  type: boolean
                incidents_reviewed:
                  type: boolean
                final_invoice_prepared:
                  type: boolean
                payment_obligations_recorded:
                  type: boolean
      responses:
        '200':
          description: Finalized
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  status:
                    type: string
                    example: finalized
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Missing finalize_closeout capability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Event not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Already finalized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Closeout checklist incomplete (missing items listed)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Error'
                  - type: object
                    properties:
                      missing:
                        type: array
                        items:
                          type: string
  /events/{eventId}/ledger/reopen:
