  /api/db-browser:
    get:
      operationId: dbBrowser_listTables
      summary: List every base table in the caller's tenant database, with approximate row counts
      description: >-
        Gated by manage_users (venue_admin / tenant instance admin). Read-only. Connection follows
        the standard tenant-resolution pattern (TenantContext) so this always reads the caller's own
        tenant database, never another tenant's.
      tags:
        - Database Browser
      responses:
        '200':
          description: Table list
          content:
            application/json:
              schema:
                type: object
                properties:
                  tables:
                    type: array
                    items:
                      $ref: '#/components/schemas/DbBrowserTable'
        '403':
          description: Missing manage_users capability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/db-browser/{table}:
    parameters:
      - name: table
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: dbBrowser_getRows
      summary: Paginated rows and column metadata for one table
      description: >-
        Gated by manage_users. `table` and every `filter[...]` / `sort` column name are validated
        against the live information_schema for this tenant before being interpolated (they cannot
        be bound as SQL parameters) and are then back-tick quoted — an unknown table or column is
        rejected rather than passed through.
      tags:
        - Database Browser
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
        - name: sort
          in: query
          description: Must be a real column of this table, or it is silently ignored (unsorted).
          schema:
            type: string
        - name: dir
          in: query
          schema:
            type: string
            enum:
              - asc
              - desc
            default: asc
        - name: filter
          in: query
          style: deepObject
          explode: true
          description: >-
            Per-column substring filter, e.g. filter[name]=text (LIKE %text%). Unknown columns are
            ignored.
          schema:
            type: object
            additionalProperties:
              type: string
      responses:
        '200':
          description: Rows and columns
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DbBrowserRowsResponse'
        '403':
          description: Missing manage_users capability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Unknown table
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/db-browser/{table}/export:
    parameters:
      - name: table
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: dbBrowser_export
      summary: Download rows matching the same sort/filter as the table view, as a file
      description: >-
        Gated by manage_users. Applies the same filter[...]/sort/dir query params as GET
        /api/db-browser/{table} but returns a file attachment (Content-Disposition attachment)
        instead of JSON, capped at 20000 rows (MAX_EXPORT_ROWS; the .sql export adds a truncation
        comment when the cap is hit). `xls` is actually an HTML table served with an .xls
        extension/MIME type, opened directly by Excel/Sheets/LibreOffice — not a real binary XLS.
      tags:
        - Database Browser
      parameters:
        - name: format
          in: query
          schema:
            type: string
            enum:
              - csv
              - xls
              - sql
            default: csv
        - name: sort
          in: query
          schema:
            type: string
        - name: dir
          in: query
          schema:
            type: string
            enum:
              - asc
              - desc
        - name: filter
          in: query
          style: deepObject
          explode: true
          schema:
            type: object
            additionalProperties:
              type: string
      responses:
        '200':
          description: File download (filename "{table}-{YYYY-MM-DD}.{ext}")
          content:
            text/csv:
              schema:
                type: string
                format: binary
            application/vnd.ms-excel:
              schema:
                type: string
                format: binary
            application/sql:
              schema:
                type: string
                format: binary
        '400':
          description: format was not one of csv, xls, sql
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Missing manage_users capability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Unknown table
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/db-history:
    get:
      operationId: dbHistory_list
      summary: Browse the audit-trigger log (paginated, filterable)
      description: >-
        Gated by manage_db_history (venue_admin only) — a separate, more sensitive capability than
        manage_users because this resource can execute writes (via the undo action). Entries are
        written by AFTER INSERT/UPDATE/DELETE triggers (see scripts/generate-audit-triggers.php)
        into db_history. List rows include a `changed_fields` diff summary (UPDATE rows only) but
        not the full old/new JSON — fetch the single entry for that.
      tags:
        - DB History
      parameters:
        - name: table
          in: query
          schema:
            type: string
        - name: pk
          in: query
          description: Filter by primary-key value of the audited row.
          schema:
            type: string
        - name: actor
          in: query
          description: Substring match against the actor string (e.g. "user:12").
          schema:
            type: string
        - name: action
          in: query
          schema:
            type: string
            enum:
              - INSERT
              - UPDATE
              - DELETE
        - name: from
          in: query
          description: created_at >= this value.
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          description: created_at <= this value.
          schema:
            type: string
            format: date-time
        - name: undone
          in: query
          schema:
            type: string
            enum:
              - any
              - 'yes'
              - 'no'
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
      responses:
        '200':
          description: Paginated audit-log entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items:
                      $ref: '#/components/schemas/DbHistoryEntrySummary'
                  total:
                    type: integer
                  page:
                    type: integer
                  limit:
                    type: integer
                  tables:
                    description: >-
                      Distinct table_name values seen in the audit log, for building a filter
                      picker.
                    type: array
                    items:
                      type: string
        '403':
          description: Missing manage_db_history capability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/db-history/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    get:
      operationId: dbHistory_get
      summary: Get one audit-log entry, including full old/new row JSON and the undo SQL
      description: >-
        Gated by manage_db_history. If this entry has already been undone, `undo_result` identifies
        the later db_history entry produced by that undo (looked up via undo_of_id) so the UI can
        link forward to it.
      tags:
        - DB History
      responses:
        '200':
          description: Audit-log entry detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DbHistoryEntryDetail'
        '403':
          description: Missing manage_db_history capability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: History entry not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/db-history/{id}/undo:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    post:
      operationId: dbHistory_undo
      summary: Execute the stored undo SQL for one audit-log entry
      description: >-
        Gated by manage_db_history. Runs `undo_sql` (built server-side by the audit trigger from
        QUOTE()'d historical values, not user input, so it is executed directly rather than
        parameterized) inside a transaction, marks this entry `undone_at`/`undone_by_actor`, and
        links the new db_history row that the undo SQL itself triggers (same table+pk, next id after
        this one) back to this entry via that new row's undo_of_id. There is no separate "redo"
        endpoint: undoing a change is itself a real write that fires the same audit trigger and
        produces its own db_history entry — to redo the original change, call this same undo action
        again, but on *that resulting entry's* id. Returns 409 if this entry was already undone.
      tags:
        - DB History
      responses:
        '200':
          description: Undo executed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DbHistoryUndoResult'
        '403':
          description: Missing manage_db_history capability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: History entry not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: This entry has already been undone
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Undo failed (undo_sql execution threw); the transaction was rolled back
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/messages:
    get:
      operationId: messages_list
      summary: List the caller's messages (Inbox / Archive / Outbox)
      description: >-
        Any authenticated user; no global capability required — each user only ever sees their own
        inbox/sent (scoped by recipient_user_id / sender_user_id). `box=inbox` (default) returns
        undelivered/unarchived messages addressed to the caller; `box=archive` returns archived
        inbox messages; `box=sent` returns messages the caller composed. The row shape differs
        slightly by box (sent rows carry recipient_name/recipient_email, inbox/archive rows carry
        sender_name/sender_email and archived_at).
      tags:
        - Messages
      parameters:
        - name: box
          in: query
          schema:
            type: string
            enum:
              - inbox
              - archive
              - sent
            default: inbox
        - name: q
          in: query
          description: Free-text search across subject and the other party's name/email.
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
      responses:
        '200':
          description: Message list
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items:
                      $ref: '#/components/schemas/MessageListItem'
                  total:
                    type: integer
                  page:
                    type: integer
                  limit:
                    type: integer
                  box:
                    type: string
                    enum:
                      - inbox
                      - archive
                      - sent
        '403':
          description: Not authenticated (Messages returns 403, not 401, when there is no user id)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      operationId: messages_compose
      summary: Compose a new message or reply to an existing one
      description: >-
        Any authenticated user. Recipients are restricted server-side to users the sender is allowed
        to message (see BaseEndpoint::accessibleUsers / Messages::recipientRows — roughly:
        venue_admins can message anyone active; everyone else can reach venue admins plus people
        they share an event with). Any requested recipient not in that allow-list is silently
        dropped from the send; if that empties the recipient list entirely the whole request is
        rejected with 403. One `messages` row is inserted per resolved recipient. Each recipient
        with a valid email also gets an outbound copy via Mailer (delivery failures there are
        swallowed and do not fail the in-app message).
      tags:
        - Messages
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MessageComposeInput'
      responses:
        '200':
          description: Message(s) created
          content:
            application/json:
              schema:
                type: object
                properties:
                  created:
                    type: integer
                    description: Number of messages rows inserted (one per resolved recipient).
                  ids:
                    type: array
                    items:
                      type: integer
        '403':
          description: Not authenticated, or none of the requested recipients are addressable by the caller
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Missing recipients or empty body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/messages/recipients:
    get:
      operationId: messages_recipients
      summary: List users the caller is allowed to address
      description: >-
        Any authenticated user. venue_admins get every active user; everyone else gets active
        venue_admins plus everyone they share an event with (owner or collaborator), via
        BaseEndpoint::accessibleUsers.
      tags:
        - Messages
      responses:
        '200':
          description: Addressable users
          content:
            application/json:
              schema:
                type: object
                properties:
                  recipients:
                    type: array
                    items:
                      $ref: '#/components/schemas/MessageRecipient'
        '403':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/messages/unread-count:
    get:
      operationId: messages_unreadCount
      summary: Get the caller's unread inbox message count
      description: Any authenticated user. Counts non-archived inbox messages with read_at IS NULL.
      tags:
        - Messages
      responses:
        '200':
          description: Unread count
          content:
            application/json:
              schema:
                type: object
                properties:
                  unread:
                    type: integer
        '403':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/messages/{messageId}:
    parameters:
      - name: messageId
        in: path
        required: true
        schema:
          type: integer
    get:
      operationId: messages_get
      summary: Get a single message
      description: >-
        Only the sender or recipient may view a message (403 otherwise). If the caller is the
        recipient and the message is unread, it is marked read as a side effect of this GET (read_at
        is set to now and reflected in the response).
      tags:
        - Messages
      responses:
        '200':
