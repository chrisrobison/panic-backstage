      summary: Save the event settlement summary (upsert)
      description: >-
        Requires `edit_settlement`. Identical handler to POST on this same path — an upsert keyed on
        event_id, not a true partial patch (omitted fields default to 0/null on the values used in
        the INSERT, but ON DUPLICATE KEY UPDATE means an existing row's other columns are only
