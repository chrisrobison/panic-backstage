                $ref: '#/components/schemas/Error'
        '403':
          description: Caller is not a venue_admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Venue not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      operationId: venueResources_create
      summary: Create a room in a venue
      description: >-
        venue_admin role only. name is required (422 if blank). slug is auto-generated from name and
        de-duplicated within the venue by appending `-2`, `-3`, etc. sort_order defaults to (current
        max + 1) within the venue if not supplied. zone defaults to `primary` if not supplied.
      tags:
        - Venues
      requestBody:
        required: true
        content:
          application/json:
