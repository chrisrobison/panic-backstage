            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Event not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      operationId: eventQr_generate
      summary: Generate (or regenerate) the public-page QR code asset
      description: >-
        Requires the `upload_assets` event capability. Renders a 600px PNG QR code encoding the
        event's public page URL and stores it as this event's single `asset_type=qr_code` asset
        (`approval_status=approved`). Idempotent in effect: re-running replaces the existing qr_code
        asset row/file in place rather than creating a duplicate, since the encoded URL is keyed by
