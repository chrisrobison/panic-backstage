                      $ref: '#/components/schemas/PromoteBroadcast'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Caller lacks the read_event capability for this event.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Event not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      operationId: promoteBroadcasts_create
      summary: Create a broadcast — fires real adapters for live destinations
      description: >-
        Fires real, non-idempotent side effects: for each key in `destinations`, dispatches through
        Promote\BroadcastAdapters, which makes a real outbound API call for the six "live"
        destinations (facebook_page, instagram, tiktok, eventbrite, luma, and the two email
        destinations email_general/email_press via Mailchimp/SendGrid) and produces a deterministic
        stub result (`manual_required`) for every other destination. Runs inside a DB transaction:
        one `promote_broadcasts` row plus one `promote_broadcast_results` row per destination are
        inserted atomically, and the broadcast's own `status` is derived from the per-destination
        outcomes (`failed` if all failed, `partial_failure` if some failed, else `completed`).
        `post_id` and a non-empty `destinations` array are required (422 otherwise); `post_id` must
        belong to this event (422 otherwise). `send_mode` is `now` (default) or `scheduled`; when
        `scheduled` and `scheduled_at` is supplied it is stored on the broadcast, but no cron/queue
        worker currently exists to act on it at the scheduled time — it just sits as
        `queued`/`scheduled`. Requires the `edit_event` event capability. Calling this again for the
        same post+destinations sends again — it is not idempotent, unlike variants/generate.
      tags:
        - Promote
      parameters:
        - $ref: '#/components/parameters/PromoteEventId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PromoteBroadcastCreateRequest'
      responses:
        '200':
          description: Created broadcast with per-destination results (abbreviated result shape).
          content:
            application/json:
              schema:
                type: object
                properties:
                  broadcast:
                    allOf:
                      - $ref: '#/components/schemas/PromoteBroadcast'
                      - type: object
                        properties:
                          results:
                            type: array
                            items:
                              $ref: '#/components/schemas/PromoteBroadcastCreateResult'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Caller lacks the edit_event capability for this event.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Event not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Missing post_id/destinations, or post_id does not belong to this event.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
