        type: integer
    LeadNoteIdPath:
      name: noteId
      in: path
      required: true
      schema:
        type: integer
    CrmProfileIdPath:
      name: profileId
      in: path
      required: true
      schema:
        type: integer
    CrmProfileNoteIdPath:
      name: noteId
      in: path
      required: true
      schema:
        type: integer
    ContactIdPath:
      name: contactId
      in: path
      required: true
      schema:
        type: integer
    CampaignIdPath:
      name: campaignId
      in: path
      required: true
      schema:
        type: integer
    MailingListIdPath:
      name: listId
      in: path
      required: true
