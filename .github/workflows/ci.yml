name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  PHP_VERSION: '8.2'
  PHP_EXTENSIONS: mbstring, pdo_mysql, gd, curl, openssl, json

jobs:
  # ── Fast syntax check across every PHP file ─────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: ${{ env.PHP_EXTENSIONS }}
          coverage: none
      - name: php -l every source file
        run: |
          set -e
          find src public scripts database tests -name '*.php' -print0 \
            | xargs -0 -n1 -P4 php -l

  # ── Hermetic PHP tests: no DB, no network, no seed data ─────────────────────
  unit-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: ${{ env.PHP_EXTENSIONS }}
          coverage: none
      - name: tests/run-php-tests.sh
        run: ./tests/run-php-tests.sh

  # ── Full stack: MariaDB + a real dev server, seeded fresh each run ──────────
  # Mirrors production, which runs MariaDB (not MySQL) — see database/schema.sql
  # and database/migrations/*.sql, written/verified against MariaDB syntax.
  #
  # Runs the bash integration suite AND the headless-Chromium UI suite against
  # the SAME MariaDB service and the SAME running dev server (tests/ui/run.mjs
  # reuses whatever server is already reachable at APP_URL instead of starting
  # a second one — see startDevServer() in tests/ui/browser.mjs), so this job
  # seeds/migrates exactly once instead of running the full stack twice.
  integration-tests:
    runs-on: ubuntu-latest
    needs: lint
    services:
      mariadb:
        image: mariadb:10.7
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: panic_backstage
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -uroot -proot"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: ${{ env.PHP_EXTENSIONS }}
          coverage: none
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Confirm a Chrome/Chromium binary is on PATH
        # tests/ui/browser.mjs's findChromium() looks for exactly these names.
        # ubuntu-latest ships google-chrome-stable; this just fails fast with
        # a clear message instead of a cryptic CDP-connect error if a future
        # runner image ever drops it.
        run: |
          command -v chromium || command -v chromium-browser \
            || command -v google-chrome || command -v google-chrome-stable \
            || { echo "no Chrome/Chromium binary found on PATH" >&2; exit 1; }

      - name: Write CI .env
        # Starts from .env.example (the documented blank/default single-tenant
        # config — no APP_BASE_PATH, no SUPER_DB_NAME) and overrides only what
        # points it at this job's MariaDB service and local dev server.
        run: |
          cp .env.example .env
          {
            echo "DB_HOST=127.0.0.1"
            echo "DB_PORT=3306"
            echo "DB_USER=root"
            echo "DB_PASSWORD=root"
            echo "DB_NAME=panic_backstage"
            echo "APP_URL=http://127.0.0.1:8090"
            echo "JWT_SECRET=$(openssl rand -hex 48)"
            echo "SUPER_DB_NAME="
            echo "APP_BASE_PATH="
            echo "TRUST_PROXY=false"
          } >> .env

      - name: Seed database (schema + demo data)
        # Captures the UI_EVENT_ID=<id> line seed.php prints (the richly
        # populated "Local Band Showcase" demo event) so 10-workspace.test.mjs
        # and 20-ticketing.test.mjs get a real event instead of skipping.
        run: php database/seed.php | tee /tmp/seed-output.log

      - name: Apply migrations
        run: php scripts/migrate.php

      - name: Export UI_EVENT_ID
        run: grep '^UI_EVENT_ID=' /tmp/seed-output.log >> "$GITHUB_ENV"

      - name: Start local dev server
        run: |
          php -S 127.0.0.1:8090 -t public public/router.php > /tmp/php-server.log 2>&1 &
          echo $! > /tmp/php-server.pid
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8090/api/me >/dev/null 2>&1 && exit 0
            sleep 1
          done
          echo "server did not become ready in time" >&2
          cat /tmp/php-server.log >&2
          exit 1

      - name: DB-backed PHP tests (RateLimiter)
        run: RUN_DB_TESTS=1 ./tests/run-php-tests.sh

      - name: Bash integration suite
        env:
          TEST_BASE_URL: http://127.0.0.1:8090
          TEST_EMAIL: admin@venue.local
        run: ./run-tests.sh

      - name: UI tests
        # UI_BASE matches the dev server already started above, so
        # startDevServer() in tests/ui/browser.mjs detects it's reachable and
        # reuses it rather than launching a second PHP process.
        env:
          UI_EMAIL: admin@venue.local
          UI_BASE: http://127.0.0.1:8090
          UI_PORT: '8090'
          UI_CDP_PORT: '9344'
        run: node tests/ui/run.mjs

      - name: Dev server log
        if: always()
        run: cat /tmp/php-server.log || true
