<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>W-9 &amp; Mailing Address Received: {{event_title}}</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
         background: #f5f4f0; margin: 0; padding: 24px 16px; color: #111; }
  .wrap { max-width: 560px; margin: 0 auto; background: #fff;
          border-radius: 6px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
  .hd   { background: #15803d; padding: 20px 32px; }
  .hd h1 { color: #fff; margin: 0; font-size: 1.1rem; }
  .bd   { padding: 24px 32px; }
  .bd p { line-height: 1.6; margin: 0 0 12px; font-size: .95rem; }
  .meta { background: #f9f8f5; border-radius: 4px; padding: 14px 16px;
          font-size: .9rem; margin: 16px 0; }
  .meta dt { color: #555; font-size: .8rem; }
  .meta dd { margin: 0 0 10px; font-weight: 600; }
  .meta dd:last-child { margin: 0; }
  .cta  { display: inline-block; background: #15803d; color: #fff; text-decoration: none;
          padding: 10px 20px; border-radius: 5px; font-weight: 600; font-size: .9rem; }
  .ft  { background: #f5f4f0; padding: 14px 32px; font-size: .78rem; color: #888; }
</style>
</head>
<body>
<div class="wrap">
  <div class="hd"><h1>W-9 &amp; Mailing Address Received</h1></div>
  <div class="bd">
    <p>Hi {{admin_name}},</p>
    <p>A payee has submitted their mailing address and W-9 for an upcoming payout.</p>
    <dl class="meta">
      <dt>Event</dt> <dd>{{event_title}}</dd>
      <dt>Payee</dt> <dd>{{payee_name}}</dd>
    </dl>
    <p><a href="{{event_url}}" class="cta">View Event in Backstage →</a></p>
  </div>
  <div class="ft">Mabuhay Backstage · automated notification</div>
</div>
</body>
</html>
