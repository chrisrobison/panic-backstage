<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{venue_name}}</title>
</head>

<body style="margin:0;padding:0;background:#151515;font-family:Arial,Helvetica,sans-serif;color:#f5f0e8;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background:#151515;padding:24px 0;">
    <tr>
      <td align="center" style="padding:0 14px;">

        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="max-width:680px;background:#211f1f;border:1px solid #3a3434;border-radius:18px;overflow:hidden;">

          <!-- Header -->
          <tr>
            <td style="background:#111;padding:28px 32px;border-bottom:4px solid #c1121f;">
              <div style="font-size:13px;letter-spacing:2px;text-transform:uppercase;color:#c9b27e;font-weight:bold;">
                {{venue_name}}
              </div>
            </td>
          </tr>

          <!-- Main Content -->
          <tr>
            <td style="padding:32px;font-size:15px;line-height:1.6;color:#d8d1c8;">
              {{body_html}}
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background:#171717;padding:20px 32px;border-top:1px solid #342e2e;">
              <div style="font-size:12px;line-height:1.5;color:#80766e;">
                {{venue_name}} &middot; {{venue_address_line}}<br>
                Punk rock, paperwork, and the occasional miracle.
              </div>
              <div style="margin-top:12px;font-size:12px;line-height:1.5;color:#5f5850;">
                {{footer_note}}
              </div>
            </td>
          </tr>

        </table>

      </td>
    </tr>
  </table>
</body>
</html>
