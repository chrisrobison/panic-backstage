<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Contract: {{contract_title}}</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
         background: #f5f4f0; margin: 0; padding: 24px 16px; color: #111; }
  .wrap { max-width: 560px; margin: 0 auto; background: #fff;
          border-radius: 6px; overflow: hidden;
          box-shadow: 0 2px 8px rgba(0,0,0,.08); }
  .hd   { background: #1a56c4; padding: 24px 32px; }
  .hd h1 { color: #fff; margin: 0; font-size: 1.2rem; font-weight: 700; }
  .bd   { padding: 28px 32px; }
  .bd p { line-height: 1.6; margin: 0 0 16px; font-size: .95rem; }
  .doc  { display: inline-block; background: #f5f4f0; border: 1px solid #e8e7e3;
          border-radius: 6px; padding: 12px 16px; font-size: .9rem; margin: 8px 0 4px; }
  .doc .ico { margin-right: 8px; }
  .notice  { font-size: .8rem; color: #888; border-top: 1px solid #e8e7e3;
             padding-top: 16px; margin-top: 24px; }
  .ft  { background: #f5f4f0; padding: 16px 32px; font-size: .78rem; color: #888; }
</style>
</head>
<body>
<div class="wrap">
  <div class="hd"><h1>Your Contract</h1></div>
  <div class="bd">
    <p>Hello,</p>
    <p>Please find the following agreement attached to this email as a PDF:</p>
    <p><strong>{{contract_title}}</strong></p>
    {{message}}
    <p class="doc"><span class="ico">&#128206;</span>The contract PDF is attached to this message.</p>
    <div class="notice">
      <p>If you have any questions about this agreement, simply reply to this email.</p>
    </div>
  </div>
  <div class="ft">{{venue_name}}</div>
</div>
</body>
</html>
